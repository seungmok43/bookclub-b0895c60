<h1>불안세대</h1>
<div class="meta"><span>🗓 2024-09-11 (수요 오전)</span><span>📖 1회 · 「불안세대」 도입 — 스마트폰과 자녀 양육</span><span>✍ 조너선 하이트</span></div>
<div class="lead"><span class="qm">“</span>스마트폰에 아이를 빼앗긴 부모들이, 완벽할 순 없어도 꾸준할 순 있다는 말에 기대어 없앨 수 없는 것을 말씀으로 대체하며 다시 깨어나기로 다짐한다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>예전에는 인터넷에 접속하려면 컴퓨터 앞에 가서 부팅하고 기다려야 했는데, 지금은 아무 곳에서나 그냥 접속한다. 마치 내 영혼이 하나 더 생긴 것 같은 느낌이다.</p><figcaption>디지털 중독</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>완벽할 수는 없다. 하지만 꾸준할 수는 있다. 하나님이 요구하는 것은 완벽함이 아니다.</p><figcaption>꾸준함</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>결과에 집착하지 않고 과정의 지루함을 즐겨라. 그리고 나는 혼자가 아니다.</p><figcaption>습관</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>청소년기에 높아진 스트레스 감수성은 사춘기의 뇌를 오히려 유연하게 만든다. 가소성을 높이는 기회의 창이다.</p><figcaption>사춘기</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>딸은 폰을 안 주고 애써 키웠는데 아들은 너무 힘들어 방치를 많이 했다. 아들은 눈을 뜨면 먼저 핸드폰을 들고 유튜브를 손에 쥔 채 화장실을 간다. 핸드폰과 공존하는 사람과 함께 사는 것 같다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>이 책 때문에 불안해서라기보다, 원래 했어야 하는 일이었다. 기준은 성경에 다 있었는데 내가 거기서 좀 멀어졌던 것이다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>그땐 뭣도 모르고 좋은 건 줄 알고 일부러 아이에게 스마트폰을 쥐어줬다. 이제 와서 그게 아이를 망친다니, 내가 아이를 치고 있었다는 사실이 너무 불편하고 미안하다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>안 믿는 사람이 성경에 다 나와 있는 얘기를 성경만 빼고 논리적으로 설명하려니 이렇게까지 애를 쓰는구나 싶었다. 사회적 학문들이 성경의 진리를 뒤따라오고 있음을 느꼈다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>5세까지 못 만든 뇌를 사춘기 때 다시 말랑말랑하게 하셔서 제2의 육아를 할 수 있게 도우시는구나 싶었다. 이 예민함이 부정적인 게 아니라 다시 소통할 기회의 창이었다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>없앨 수는 없어요. 대체되어야 돼요. 성경은 항상 대체되어야 한다고 말합니다. 우리는 우상 만드는 공장이기 때문에, 입맛이 대체되도록 교회가 애를 써야 합니다.</p><figcaption>진행자(이승목 목사)가 무조건 금지가 아닌 대체의 원리를 강조</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>엄마 혼자 예배를 드려도, 아빠가 물 마시러 나왔다 들어가고 아들이 화장실 갔다 들어가는 그 시간에도 계속 그 자리를 지키다 보면 한 명씩 성도가 늘어나더라.</p><figcaption>가정예배의 꾸준함에 관한 나눔</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>그 찰나의 시간에 말씀을 먹여야 한다는 생각이 지금 번뜩 드네요. 아이가 큐티한 것을 매일 함께 찍어 올려봅시다.</p><figcaption>큐티를 방에서 함께 이어가기로 결단하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>안 믿는 자의 상처 앞에서 진리를 다 꺼낼 필요는 없어요. 진리는 풍성하니 다른 진리를 더 풍성히 전하면 됩니다.</p><figcaption>불신 가정 위로를 두고 나눈 대화</figcaption></figure></div></section>
