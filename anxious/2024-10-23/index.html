<h1>불안세대</h1>
<div class="meta"><span>🗓 2024-10-23 (수요 오전)</span><span>📖 2회 · 「불안세대」 — 부모의 불안·예배와 은혜의 수단·성화</span><span>✍ 조너선 하이트</span></div>
<div class="lead"><span class="qm">“</span>안 믿는 저자조차 붙든 아이들의 불안 앞에서, 계명을 다 지킬 수 없음이 도리어 은혜임을—철을 불에 달구시는 하나님의 손길을—고백하는 시간.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">3</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>자율 방목 아동기는 안전 지상주의와 두려움, 늘 어른의 감독을 받는 아동기보다 자신감이 넘치고 유능한 어른을 낳을 가능성이 더 높다.</p><figcaption>자율 방목</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>가장 큰 장애물은, 어른의 보호 없이 자녀가 시야에서 벗어났을 때 부모 자신이 느끼는 불안이다.</p><figcaption>부모의 불안</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>성령께서는 말씀 읽는 것과 특히 설교를 효과적인 수단으로 삼으신다. 말씀은 하나님께서 인간에게 주신 선물 중 가장 값진 것이다.</p><figcaption>은혜의 수단</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>아이와 길이 엇갈려 어디 있는지 모르니 너무 불안했다. 그 불안감 때문에 결국 핸드폰을 쥐어준 케이스다. 이걸 놓아야 아이에게 좋다는데 과연 내가 놓을 수 있을까.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나눔에서 누군가의 해석이 잘못됐다고 생각해본 적이 한 번도 없다. 그냥 그런가 보다, 나와 좀 다르네 하고 넘겼지 이게 이상하다는 생각을 해본 적이 없어 내가 좀 이상한가 싶다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>그리스도인과 옛 자아가 매일 공존하며 왔다 갔다 한다. 계기가 따로 있는 게 아니라 매 순간 내 모습에서 그것을 느낀다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나는 거룩한 쪽에 가깝게 산다고 생각했는데, 아주 미미하게 떨어졌을 때 나락으로 떨어지는 나를 보았다. 1과 99 사이에 있던 사람을 너무 과대평가했던 것이다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>내 신앙생활이 가짜였구나 느끼던 순간의 고통이 너무 심했다. 하나님 자녀인 척했지만 사실은 내 의로, 착한 사람이라는 이미지로 살았던 것이다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>예배의 유일한 구조는 넷입니다. 인내, 부르심, 말씀의 예전, 성찬의 예전, 그리고 파송. 이 사중 구조 안에 사도신경도 헌금도 여러 요소가 들어갑니다.</p><figcaption>진행자(이승목 목사)가 예배의 필수 구조를 설명</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>영광은 히브리어로 카보드, 곧 무게라는 뜻입니다. 하나님께 영광을 돌린다는 것은 하나님을 무겁게 여긴다는 것이고, 내 삶이 다른 사람으로 하여금 하나님을 중요하게 여기게 만드는 것입니다.</p><figcaption>'하나님의 영광을 위해 산다'는 말의 의미를 풀며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>철덩어리를 불에 달구면 이게 철인가 불인가. 내 안에 여전히 악이 있으니 철이지만, 하나님이 달구셔서 불의 속성이 생겼습니다. 그 불에 초점을 맞출 때 나도 기뻐할 수 있습니다.</p><figcaption>성화 가운데 죄와 거룩함의 공존을 비유로</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>니가 나를 사랑하느냐. 그 질문 앞에 대답을 못하는 걸 넘어, 아버지가 이 씨름을 다 알고 계시는구나 하는 순간 다 해결됐어요.</p><figcaption>진행자가 목회 부르심 받던 씨름을 회고</figcaption></figure></div></section>
