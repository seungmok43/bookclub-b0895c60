<h1>불안세대</h1>
<div class="meta"><span>🗓 2025-03-28 (금요 저녁)</span><span>📖 3회 · 「불안세대」 — 과잉보호·디지털 차단·복음적 대안</span><span>✍ 조너선 하이트</span></div>
<div class="lead"><span class="qm">“</span>아이를 폰에서 지구로 돌려보내려면 '조금만 더'의 무한 스크롤을 끊는 결단이 필요하다—복음만이 도피를 멈추고 눈앞의 사람에게 집중하게 한다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>인간 안에는 그런 유전자가 있어서 굳이 막지 마라, 그러면 자기가 조율한다. 위험을 스스로 대처하며 다음 위기를 이겨낼 능력이 길러진다.</p><figcaption>안티프래질</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>왕따를 당하더라도 차라리 폰을 주지 마라. 그만큼 이 피해가 더 크다.</p><figcaption>디지털 차단</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>아이들을 지구로 돌려보내자. 폰 안에 갇히지 말고 현실 세계로.</p><figcaption>맺음말</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>문명의 이기를 덜 누린 원주민의 기능이 오히려 올라간다. 장난감이 없으면 창의적으로 만들어 쓰기 때문이다.</p><figcaption>창의성</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>언니의 불안이 그대로 아이들에게 흘러가는 것 같다. 큰애는 우울증 약을, 아래 애들도 정서적 어려움을 겪는데, 부모의 양육 태도 속에서 그 불안이 유전되듯 전해진 게 아닌가 싶다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>지금 이 시대에는 이것이 영적 전쟁이라고 생각한다. 그래서 성인이 될 때까지, 차단할 수 있을 때까지 최대한 차단하는 것이 우리 목표다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>똑같은 제품이라도 더 싼 걸 찾겠다며 하루 종일 검색하다가, 알뜰하게 산다는 이것이 곧 우상일 수도 있겠구나 하는 생각이 딱 들었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>부자와 나사로 본문을 묵상하며, 옷을 사는 데 시간과 마음을 투자하는 것 자체가 내 허영이구나 깨달았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>교회 생활이 일상이다 보니 SNS에 늘 교회 이야기만 올렸더니, 세상 친구들이 나를 다른 세상 사람처럼 여기더라. 그 뒤로 SNS 올리는 걸 줄여야겠다 싶었다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>결단하면 됩니다. 결단한 사람들이 모여서 같이 문화를 만들면 돼요. 결단이 어렵지, 결단하면 옆에 동역자들이 와서 마음을 모으고 진짜 할 수 있습니다.</p><figcaption>진행자(이승목 목사)가 공동 주거·대안 공동체의 꿈을 나누며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>바벨탑도 조금만 더, 조금만 더 쌓다가 인류가 끝났을 겁니다. 하늘에 닿을 수 없으니까요. 그래서 하나님이 언어를 흩으신 것이 도리어 구속 사역입니다. 밤에 핸드폰을 멀리 던져놓고 자는 것도 내 영혼을 향한 구속일 수 있죠.</p><figcaption>'조금만 더'의 끝없음을 끊는 절제를 설교와 검색 중독에 빗대어</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>하나님을 깊이 경험하면 옆 사람에게 옷이 없는 게 보입니다. 하나님을 사랑하는 것은 이웃 사랑으로 증명되는 것이지, 이웃에게 관심 없이 하나님만 사랑한다는 사람은 사실 하나님을 사랑하는 게 아닙니다.</p><figcaption>복음이 현실의 이웃에게로 돌이키게 함</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>기독교는 현실을 직시하고 도피하지 못하게 합니다. 복음 말고는 이 앞 사람에게 완전히 집중하게 만드는 것이 없어요. 예배도 사랑방도, 이 시간만큼은 서로에게 몰입하는 것이 이제는 대안입니다.</p><figcaption>빠른 미디어 세대 속 '느리게 집중함'을 대안으로 제시</figcaption></figure></div></section>
