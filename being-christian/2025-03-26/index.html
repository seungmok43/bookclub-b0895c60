<h1>그리스도인이 된다는 것</h1>
<div class="meta"><span>🗓 2025-03-26 (수요 오전)</span><span>📖 2회 · 세례·성경·성찬례·기도 마무리 — 교단의 시선과 건져냄의 세례</span><span>✍ 로완 윌리엄스</span></div>
<div class="lead"><span class="qm">“</span>우리는 이미 물속에서 태어나 죽어가는 인생, 세례란 그 물에서 건져내어 다시 세상 속으로 함께 헤엄쳐 들어가라는 부름이다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">7</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>인생은 태어나는 순간 이미 물속에서 죽어간다. 세례는 굳이 들어가는 것이 아니라, 그 물에서 우리를 건져내시는 것이다.</p><figcaption>건져냄의 세례</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>나는 초대받은 손님인 줄만 알았는데, 이제 우리에게도 초대할 자유가 허락되었다. 그래서 세상에 나가 모든 관계를 잇는 역할을 해야 한다.</p><figcaption>성찬과 환대</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>세례는 성공을 추구하고 지배하려는 인간성이 아니라, 하나님께 손을 뻗어 내어 맡기는 자녀로의 새로운 창조 사역이다.</p><figcaption>세례</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리의 고난과 죽음이 곧 우리가 받아야 할 세례다.</p><figcaption>고난의 세례</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>성경을 부분 부분만 보면 큰 그림을 놓친다. 하나님은 이미 그 이야기의 시작점에서 전체를 바라보시니, 늘 예수 그리스도가 기준이 되어야 한다.</p><figcaption>성경 읽기</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>모든 말은 다 사라지지만, 하나님이 세상을 아름답게 지으신 그 말씀만은 영원 전부터 영원까지 지속되며 결국 승리한다.</p><figcaption>말씀</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리 교단은 이성이 사라지는 황홀경을 추구하지 않는다. 지성이 날카로워지고 감성이 풍성해지며 영성이 깊어지는 것이 우리 기도의 방향이다.</p><figcaption>기도의 방향</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>손톱을 물어뜯는 아이에게 스트레스를 내던 대신 '주여' 하고 기도로 언어를 바꿨더니, 내 화가 먼저 가라앉았다. 안 고쳐져도 하나님 뜻이 있겠지 하는 믿음이 생겼다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>매주 여기 와서 운다. 큰 사연도 없는데 내 편을 찔찔 짜는 내 모습이 보기 싫어 집에 가면 우울했다. 그래도 이 자리에 와야 나를 마주 본다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>인생의 아버지 같던 분이 세상을 떠나셨다. 해드린 것도 없는데 늘 내 사진을 품고 다니셨다는 말에, 이유 없이 조건 없이 사랑하는 것—그게 예수님의 사랑임을 처음 깨달았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>아이가 묵상을 대충 하는 게 불안해 잔소리했지만, 효과가 없을 걸 알면서도 왜 그러고 있었나 싶다. 결국 내 불안이 문제였고, '주여' 하며 차라리 기도하기로 했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>천 명이 넘는 교구를 돌보느라 만나고 또 만나야 하지만, 나는 구름 보고 텃밭 가꾸며 가만히 있는 게 맞는 사람이다. 7대 악덕 중 '나태'가 가장 찔린다—분주히 뛰어다니는 것도 한 사람에게 집중하지 못하면 나태라니.</p><figcaption>— 이승목 목사</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>로완 윌리엄스는 우리와 교단이 다릅니다. 황홀경이나 관상 기도를 우리 교단은 인정하지 않아요. 그래서 이 책을 읽으며 느낀 낯섦은 당연한 겁니다.</p><figcaption>이승목 목사가 저자와 교단의 신학적 차이를 짚어줌</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>선교지 명상관 훈련에서, 감정을 끝까지 끌어올렸다 침묵시키면 내 속의 것이 떠나고 다른 영이 들어옵니다. 그때 목사님이 '우리는 비워질 수 없으니 성령으로 채워져야 한다'고 가르치셨어요.</p><figcaption>한 참석자가 선교지 경험으로 '비움'과 '채움'의 차이를 나눔</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>허영이야말로 이 시대가 가장 숭배하는 가치입니다. 여행도 책도 운동도 조용히 못 하고, 온 세상이 허영으로 치장하라 난리를 치죠.</p><figcaption>이승목 목사가 다음 책 「매혹적인 악덕들」을 소개하며 7대 악덕을 언급</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>명절에는 무조건 가야 합니다. 안 가면 멀어져요. 죽이 되든 밥이 되든 싸우더라도, 기도하며 가면 하나님이 계속 지혜를 주십니다.</p><figcaption>이승목 목사가 개인화되는 신앙을 경계하며 환대를 강조</figcaption></figure></div></section>
