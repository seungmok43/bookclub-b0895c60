<h1>무례한 기독교</h1>
<div class="meta"><span>🗓 2026-01-23 (금요 저녁)</span><span>📖 1회 · 「무례한 기독교」 1~3장 — 신념과 시민 교양</span><span>✍ 리처드 마우</span></div>
<div class="lead"><span class="qm">“</span>타협할 수 없는 신념을 붙든 채로 나와 다른 사람을 젠틀하게 끌어안는 것 — 그 좁은 평형대를 걷느라 머리가 아픈 것이 오히려 이 책을 제대로 읽었다는 증거였다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>베레아 교회는 굉장히 신사적이어서 날마다 말씀을 상고했다. 인격적·영적·말씀의 포용성을 갖춘 그 젠틀한 태도 때문에 사람들이 교회로 왔다.</p><figcaption>신념 있는 교양</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>신념과 교양을 함께 지키는 것이 얼마나 힘든지, 저자 스스로 막판에는 조금이라도 빨려 들어갈까 봐 글을 엄청 조심하며 최소한으로만 말한다.</p><figcaption>신념과 교양</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>동성애 자체는 반대할 수 있지만, 동성애자를 미워해서는 안 된다.</p><figcaption>죄와 사람</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>모든 사람을 좋아하라는 뜻이 아니다 — 좋아하지 않아도 우리는 끝까지 사랑해야 한다.</p><figcaption>사랑과 호오</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>하나님은 천천히, 느리게 일하신다.</p><figcaption>하나님의 속도</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>복음의 사랑의 선과 교양의 사랑의 선이 있는데, 교회 안에 교양의 선이 너무 두터워지고 견고해져서 다들 복음을 가장한 교양에서 상처를 받고 있다.</p><figcaption>교양의 선</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>이 책 읽기 전에는 나와 안 맞는 사람은 그냥 회피하거나 차단해 버렸는데, 예수님이라면 그 사람들을 어떻게 바라볼까 하면서 사랑원들이 떠올랐다. 예수님 마음으로 다시 바라봐야겠다는 생각이 들었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>제가 항상 복음 안에서 고민하던 부분이 이 책에 다 있었다. 부족하고 조건은 안 되지만, 갈 수만 있다면 좁은 길을 선택하고 싶다는 저만의 생각을 했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>야성을 품고 선교를 나갔음에도 그 사람들을 용서하지 못하고 비판하는 내 모습을 봤다. 나는 충분히 무례한 사람이었는데, 하나님을 만났기에 그나마 덜 무례한 사람으로 가고 있구나 싶었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>인격적으로 하나님을 만나고 나서 오히려 가까운 가족을 정죄하고 잣대를 들이댔다. 곰곰이 생각하니 내 믿음마저 내 것이 아니라 여러 환경이 엮여 만들어진 것인데, 나는 내 수준에서 남을 평가하고 있었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>책을 안 읽고 개요만 봐도, 제일 핵심적인 가치는 결국 겸손인 것 같다. '내 생각이 틀릴 수 있다'는 마음으로 경청하다 보면 결국 복음으로 만날 수 있지 않겠나.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>불편함을 끌어안고 가는 게 교회입니다. 불편하니까 떠나가는 게 세상의 논리죠. 사실은 불편함이 많아야 하는데, 북클럽이 너무 편안해지면 도리어 문제가 될 수도 있습니다.</p><figcaption>공동체의 불편함에 대한 진행자 이승목 목사의 응답</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>우리 개혁주의는 이 책이 나에게 온 것도 하나님의 섭리라고 믿습니다. 하나님이 우리 한 명 한 명에게 알려주고 싶은 게 있기 때문입니다.</p><figcaption>책을 대하는 태도 — 섭리로 받는 것</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>신념은 하나님의 사랑이고, 교양은 하나님의 사랑이 아니라 인간적 사랑이다 — 그렇게 정리하니 깔끔하다.</p><figcaption>한 참석자의 정리에 진행자가 공감한 대목</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>칼빈이 사람을 많이 죽인 것을 우리가 어디까지 정당화할 수 있나. 하나님이 마지막 최종 판결을 내리실 때, 세종대왕이고 이순신이고 칼빈이고 아무도 반박할 수 없을 것이다.</p><figcaption>신 칼뱅주의·종교전쟁을 둘러싼 문답 — 판단은 하나님께</figcaption></figure></div></section>
