<h1>무례한 기독교</h1>
<div class="meta"><span>🗓 2026-03-18 (수요 오전)</span><span>📖 4회 · 열린 마음과 진리의 기준 — 자녀 양육과 AI 시대를 지나며</span><span>✍ 리처드 마우</span></div>
<div class="lead"><span class="qm">“</span>잠깐 보고 '아니다' 싶은 것을 끝까지 판단해버리는 우리가, 가장 못난 꽃이 결국 활짝 피는 것을 보며 자기 무례를 회개한 밤.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>열린 마음은 상대에게 감정을 이입하고 호기심을 가지며, 그 사람에게서 배우려는 자세다. 그 사람에 관해 배우는 것이 아니라 그에게서 배워야 한다.</p><figcaption>열린 마음</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>그 모든 태도의 바탕은, 하나님이 그 사람을 창조하셨다는 데 있다. 하나님의 창조물이기에 우리는 관심을 가지고 그를 알아가야 한다.</p><figcaption>창조와 존중</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>무례한 기독교인은 잠깐 보고 '아니다' 싶은 것을 끝까지 아니라고 판단해버린다. 도리어 집에 가서 활짝 필 수도 있는데.</p><figcaption>성급한 판단</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리가 믿기 때문에 하는 것이 아니라, 주님이 우리를 충분히 사랑해 주시기 때문에 그 사랑을 계속 맛보며 하는 것이다.</p><figcaption>사랑의 방향</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>6장 마지막의 기도의 중요성처럼, 우리는 이 사랑을 스스로 할 수 없기에 기도로 구하며 나아가야 한다.</p><figcaption>기도</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>자녀가 노란 머리에 화장한 친구와 팔짱을 끼고 나오는 걸 보고 순간 판단해버렸다. 학교 끝나고 나니 마음에 남는 게 있었다. 나는 무례한 기독교인의 행동을 하고 있었구나, 그 아이의 이면적인 사랑을 읽으려는 생각조차 하지 않는 배척이 벌써 들어갔구나 회개했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>세례식 때 가장 못난 꽃이라 여겨 계속 바꾸자 했던 꽃이, 햇볕에 두니 마지막에 제일 예쁘게 피어났다. 그걸 보며 '참으로 무례했다'를 계속 묵상했다. 내가 보는 관점이 다가 아니고, 때가 되면 도리어 더 놀랍게 피어날 수 있는데.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>처음 이 책을 다 읽었을 땐 '왜 기독교인이라서 이렇게까지 해야 하지' 했다. 그런데 큐티 중에 '네가 예수를 믿기로 했지 않냐, 내가 너를 사랑하는 만큼 너도 서로 사랑하라'는 마음을 주셨다. 그 기준이 십자가의 사랑이라고.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>양육 교재의 찬양 중 '하나님이 지으신 목적대로, 그 목적은 하나님을 찬양하게 하시는 것'이라는 구절에서, 아이를 향한 집착을 내려놓게 됐다. 이 아이가 하나님의 계획대로 걸어갈 수 있도록 손잡고 갈 수 있게만 해달라 붙드니 갑자기 마음이 자유해졌다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나도 어릴 땐 유약하고 방황했고, 자라온 신앙의 바운더리를 결국 넘지 못했다. 어느 시점에 갑자기 시간의 밀도가 높아졌다. 아이가 노란 머리를 해도 괜찮다. 어차피 천국이 끝이니, 그저 하나님께 쓰임받기를 원하는 마음이다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>한 참석자: '걔는 노란 머리와 화장을 빼고 나쁜 짓은 뭐가 있어?'</p><figcaption>자녀 친구를 향한 두려움의 실체를 되물으며, 문제는 외형이 아니라 권위에 대한 순종·두려움임을 함께 짚어감.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이승목 목사: '묵상해서 하나님을 찾는 것보다 사람의 인정을 더 기뻐하면, 묵상할 시간보다 GPT에게 하는 게 훨씬 빠릅니다. 넘어갈 이유가 전부 산재해 있죠.'</p><figcaption>AI 시대에 큐티·묵상이 위협받는 현실을 진단하며, 시간을 드려도 된다는 마음가짐을 빚어주는 것이 큐티임을 강조.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>한 참석자: '챗GPT나 목사님 설교나 채널만 다를 뿐 똑같지 않냐' — 이승목 목사: '인격이고 하나님의 인격이라고 생각하면 다릅니다. 나를 위해 기도했던 이들의 기도로 신앙의 깊이가 깊어진 것이지, 다 주워듣다가 갑자기 내 묵상으로 된 게 아닙니다.'</p><figcaption>AI·자기 묵상을 둘러싼 긴 논쟁. 종교개혁의 정신(성경을 성도에게)과 공동체의 중보기도를 함께 붙듦.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이승목 목사: '제2, 제3의 동역자를 세워 나가는 게 목양의 핵심이죠.'</p><figcaption>가장 못난 꽃이 활짝 핀 이야기와 이어, 눈앞의 판단이 아니라 사람을 길게 세워가는 목양을 나눔.</figcaption></figure></div></section>
