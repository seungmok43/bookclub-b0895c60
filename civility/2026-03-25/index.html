<h1>무례한 기독교</h1>
<div class="meta"><span>🗓 2026-03-25 (수요 오전)</span><span>📖 5회 · 다원주의·타종교·경청하는 리더십 (7~10장)</span><span>✍ 리처드 마우</span></div>
<div class="lead"><span class="qm">“</span>'수용하고 배우면서 내 중심을 지키라'는데 이건 못하겠다는 솔직한 고백 위로, 진리가 선포될 때 흘러나오는 기쁨을 함께 배운 시간.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>다양성 가운데도 하나님의 뜻이 있다. 다른 문화를 받아들이되 내 안에 하나님이 중심이 되어 분별할 수 있는 힘이 있어야 한다.</p><figcaption>다원주의</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>전도의 목적만으로 다가가면 받는 사람은 기분이 상할 수 있다. 열린 마음과 호기심, 사랑이 있어야 한다.</p><figcaption>전도의 태도</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>진정한 경청은 듣는 내용에 의해 기꺼이 변화되려는 자세다. 내가 하나님의 뜻을 전하기보다, 그들의 말을 들어 하나님께 전달하는 것을 먼저 해야 한다.</p><figcaption>예언자적·제사장적 리더십</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>네가 왜 그렇게 하는지 누군가 물을 때, '나는 이것 때문이야'라고 당당히 말할 수 있는 동기가 나에게 있어야 한다.</p><figcaption>행동의 동기</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>확신이 강할수록 상대를 억누르는 무례함이 나올 수 있다. 잘 알수록 오히려 겸손하게 낮아져 섬기며 나아가야 한다.</p><figcaption>확신과 겸손</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>기독교인은 좋은 이웃이자 책임 있는 시민이어야 한다. 교회 안이 아니라 사회 관계 안에서 확장해 나가야 한다.</p><figcaption>좋은 시민</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>노방전도를 왜 하냐고, 부끄러워 안 했으면 했다. 그런데 '전도는 그냥 하는 것이고 인도는 하나님 몫'이라는 말씀을 듣고 나도 하고 싶어졌다. 유럽 길거리에서 스피커도 없이 추운 광장에서 찬양했는데, 사람도 없이 힘들었지만 다 하고 나니 안에 기쁨이 있었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>8시에 30분만 파는 그릇을 놓쳐 신경질이 났는데, 그 순간 '샬롬은 내 뜻이 아니라 하나님 뜻대로 되는 것'이라는 배움이 떠올라 마음이 안정됐다. 아이가 '하나님이 못 사게 하셨을 수도 있어'라고 하니 너무 신기했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>인도에서 사귄 다른 종교의 친구와 예수님 얘기를 해도, 뭐가 잘못됐는지 모르겠고 결국 '하나님만 아신다'가 됐다. 이 책은 수용하고 배우면서 분별력으로 대화하라는데, 솔직히 이건 못하겠더라.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>거짓말 문제로 주일 아침 아이와 싸웠다. 대표 기도 전이라 아이를 두고 갈 수도 없었다. 올라가서 보니 나의 의만 내세우니 모든 게 다 싸움이더라. 내 생각만 옳다고 추구하니 소통이 안 됐다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>큐티 학교에서 처음 하시는 분들이 엉뚱하게 적용하시니 순간 화가 나 '미쳤어' 했다. 그러다 깨달았다. 내가 있는 자리가 말하는 자리가 아니라 듣는 자리인데 자꾸 말하고 싶구나. 사랑이 참 부족했구나. 다시 사랑하기로 결단해야겠다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>이승목 목사: '하나님은 앉혀놓고 공부시키는 분이 아니에요. 진리가 선포될 때 우리에게 기쁨이 흘러나옵니다.'</p><figcaption>타종교·이단과의 대화에서 머리싸움에 밀려도 괜찮다며, 진리가 주는 기쁨과 살아가는 의지의 결과물이 다름을 강조.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이승목 목사: '우리는 오직 성경입니다. 목사도 안 되고 아무것도 안 되고, 그 무엇도 성경과 권위가 같아지면 안 됩니다.'</p><figcaption>다른 경전을 둔 종교 얘기 중 sola scriptura를 분명히 하며, 좋은 책조차 성경 급으로 올라가는 순간을 경계.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>한 참석자: '이분은 수용하고 배우면서 내 중심을 지키고 분별력으로 대화하라는데, 이건 못하겠는데요' — 이승목 목사: '어렵죠.'</p><figcaption>타종교와의 대화를 실제로 살아내는 일의 막막함을 솔직히 인정.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이승목 목사: '평생 젖먹이 이유식만 먹다가 주님께 갈 수도 있죠. 그래도 계속 더 먹어보자 하며 가는 게 교회와 천국인데, 세상은 아직 곱셈도 못하니 다그치죠.'</p><figcaption>신앙 성장의 속도차를 정죄 없이 인정하고 서로를 귀하게 여기는 공동체를 그림.</figcaption></figure></div></section>
