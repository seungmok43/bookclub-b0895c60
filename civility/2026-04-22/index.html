<h1>무례한 기독교</h1>
<div class="meta"><span>🗓 2026-04-22 (수요 오전)</span><span>📖 6회 · 완독 — 지옥·승리주의·느린 하나님 (마지막 파트)</span><span>✍ 리처드 마우</span></div>
<div class="lead"><span class="qm">“</span>남에게는 잘 꺾이면서 가장 가까운 가족에게만 꺾이기 싫어하던 우리가, 지옥마저 은혜의 거절임을 배우며 느린 하나님과 나란히 걷기로 한 마지막 밤.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>지옥은 하나님이 벌하시는 것이 아니라, 모두에게 주어진 은혜를 인간이 스스로 거절해 내린 결단이다. 하나님은 우리가 벌받기를 원하지 않으신다.</p><figcaption>지옥</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>다른 한편이 존재하지 않을 때, 내 명분은 정당한가, 동기는 순수한가, 시민 교양의 선을 넘는 것이 과연 최선인가를 물어야 한다.</p><figcaption>정당한 정쟁</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>카이퍼는 사회 구조로, 테레사 수녀는 개인적 긍휼로 나아갔지만, 서로에게 귀를 기울일 필요가 있다.</p><figcaption>승리주의와 긍휼</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>느리게 걷는 하나님과 가다 보면 마침내 모든 속도를 추월한다. 서두르는 사람은 결코 천국에 들어갈 수 없다.</p><figcaption>느린 하나님</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>좁은 문으로 들어가기를 힘쓰라는 명령에 사람들이 어떻게 반응하는지 관심을 기울이는 것이 전도다.</p><figcaption>전도</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>미안한 감정이 있을 때는 바로 미안하다고 해야 한다.</p><figcaption>실천</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>내 신념을 남에게는 잘 꺾으면서, 남편과 자녀에게는 참 꺾이기 싫어하는 내 모습을 봤다. 이게 참 지혜롭지 못하다는 생각이 들었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>시험 기간에 아프고 힘들어하는 아이에게 짜증을 내고 있었다. 어제 이 책을 외면했다면 오늘 적응 못 했을 텐데, 아침에 읽고 있으니 그럴 수가 없었다. 예수님의 마음으로 애처로운 자리에 있는 아이를 대해야겠구나. 다만 남편에게는 회피했으니, 그건 온유하게 목표하고 가야겠다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>지옥을 늘 유황불로 끌려가는 처벌의 이미지로만 알았다. 그런데 하나님이 '이 길로 가지 말라' 이미 말씀하셨는데도 달려간 나의 선택이라는 관점이 새로웠다. 그러면서도 '그렇게까지 처벌하셔야 하나' 하는 세상 사람의 마음도 살짝 피어나더라.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>달란트 비유를 묵상하며, 오래 기쁘게 섬긴 자리에 일이 한꺼번에 몰리니 내 마음속에 구분 짓는 것들이 생겼음을 처음 알았다. 나는 양가감정으로 조율 자체를 안 해 충돌이 없어 보였을 뿐, 중립지대 없이 회피하고 배제하던 것이 그리스도인의 마음이 아니었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>세상이 왜 이렇게 작은지 모르겠다. 파고들수록 시야가 좁아지는 느낌이다. 아이가 커서 1차 독립이 시작되니 멀리 보려 하는데, 그러니 내 자신이 갑자기 작아지고 두렵다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>이승목 목사: '구원 말고는 다 대가를 지불하는 겁니다. 선교를 갔잖아요, 감당하는 거예요.'</p><figcaption>자녀의 글쓰기 소재 논의 중, 중심과 세계관이 탄탄하면 어떤 소재도 쓸 수 있으나 그 후폭풍은 감당해야 함을 짚음.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이승목 목사: '마르다·마리아를 일 중심·관계 중심으로 나누는 건 잘못된 해석입니다. 유대 맥락에서 여자가 남자들 사이에 앉은 것은 선을 넘은 것이고, 예수님은 가장 좋은 것을 선택했으니 걱정 말라고 마르다를 안심시킨 겁니다.'</p><figcaption>본문을 원문 맥락으로 되짚어, 흔한 이분법 해석을 교정.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>한 참석자: '망이 큰 어망처럼 바닷물이 왔다 갔다 하는 사람이 되고 싶은데, 완전히 미세망이라 물 안에 혼자 떠 있어요.'</p><figcaption>포용력의 한계를 솔직히 내어놓음.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이승목 목사: '촘촘한 망도 넓은 망도 다 필요합니다. 조도에 목숨 거는 장인과 넓게 보는 사람이 함께 있어야 교회입니다.'</p><figcaption>은사와 개성의 다양성이 함께 있어야 하는 공동체론으로 위로.</figcaption></figure></div></section>
