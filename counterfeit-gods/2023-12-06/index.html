<h1>내가 만든 신</h1>
<div class="meta"><span>🗓 2023-12-06 (수요 오전)</span><span>📖 1회 · 「내가 만든 신」 도입 — 레아와 라헬, 우상과 고난, 해석되지 않는 고통</span><span>✍ 팀 켈러</span></div>
<div class="lead"><span class="qm">“</span>우상이 바뀔 뿐 늘 우상을 품고 사는 나를, 맷돌처럼 느리지만 반드시 고운 가루로 갈아 새롭게 하시는 하나님 앞에 함께 앉은 밤.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>하나님의 맷돌은 느리게 보일지라도, 반드시 모든 걸 갈아서 고운 가루로 만들어 내신다. 우리를 새로운 피조물로 만들어 버리신다.</p><figcaption>섭리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리는 라헬이 예쁘고 라헬에게 마음이 가지만, 하나님 관점에서 보면 사실 복된 인생은 레아의 인생이었다.</p><figcaption>우상과 복</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>죽음이 끝이면 그 말이 맞다. 그러나 죽음이 끝이 아니면 이야기는 완전히 달라진다.</p><figcaption>부활 소망</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>고통당하는 이 곁에서 첫 번째로 할 일은 아무 말도 하지 말라는 것이다. 해석하려는 시도 자체가 교만일 수 있다. 그저 곁에 같이 있으라.</p><figcaption>고통</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>세상이 알 수 없는 그 무능함, 무익함을 선택하는 지혜 — 그것이 예수 그리스도의 지혜고 우리의 지혜다.</p><figcaption>지혜</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>어제 다시 읽으니 나는 우상이 바뀔 뿐 늘 우상이 있었구나 싶었다. 맛있는 것으로 나를 채우려는 모습에 눈물이 났다가, 또 다른 날은 아무 죄책감 없이 즐기기도 한다. 이렇게 부족하고 두렵지만 결국 하나님이 해가신다는 게 소망이다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>이 책을 읽으며 내가 진짜 하나님을 영화롭게 하려고 살고 있지 않다는 걸, 나의 편안함을 위해 살고 있었다는 걸 놀라며 보게 됐다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>가까운 이가 오랜 투병 끝에 세상을 떠났는데, 성경 어디를 봐도 위로를 받을 수 없다고 했던 그 말이 아직도 잊히지 않는다. 신앙이 자라는 게 두렵다는 물음에 나도 답을 하지 못했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>성경 말씀으로 인도받는 게 얼마나 큰데, 족장 시대 사람들에게는 말씀이 전파될 기회조차 없지 않았나 — 그런 물음이 계속 마음에 남는다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>변하지 않는 것들에 대한 찔림과 고민은 죽을 때까지 갑니다. 그런데 그것보다 더 큰 것은, 변하지 않는 나를 무조건적으로 창세 전에 영원히 사랑하신 그분이 놀랍구나 하는 것 — 사실은 그게 제일 큽니다.</p><figcaption>진행자(이승목 목사)가 변화 없음의 죄책보다 앞선 은혜를 짚음</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>예수님도 앉아서 설명해 주지 않으셨어요. 그냥 같이 아파하고 울고 먹고 자고 살아가셨죠. 목사가 참 무기력한데, 믿음을 묻는 그 무능함을 선택하는 것이 지혜입니다.</p><figcaption>해석되지 않는 고통 앞에서의 목양</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>구약은 공부할수록 신앙이 흔들릴 수 있어요. 그러나 정경화 과정 가운데 성령께서 개입하셔서 성경의 권위가 새겨졌고, 우리는 그 권위를 따라 하나님을 발견합니다.</p><figcaption>모세오경·정경화를 묻는 질문에 답하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>그 새가족이 세례 문답 때 '이전으로 돌아가고 싶지 않다'고 했어요. 저는 그 충격을 잊을 수가 없습니다. 저는 큰 집에서 작은 집으로도 돌아가기 싫은데.</p><figcaption>고난 중에 나온 한 성도의 고백을 회상</figcaption></figure></div></section>
