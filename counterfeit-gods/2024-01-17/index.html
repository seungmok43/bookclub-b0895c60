<h1>내가 만든 신</h1>
<div class="meta"><span>🗓 2024-01-17 (수요 오전)</span><span>📖 2회 · 하나님의 속성과 자유의지 — 요나·가롯유다·삼위일체, 그리고 은혜의 절대성</span><span>✍ 팀 켈러</span></div>
<div class="lead"><span class="qm">“</span>삼위일체도 자유의지도 다 헤아릴 수 없지만, 냄새 나는 티끌 같은 나를 우주보다 귀히 여기시는 그 사랑 앞에 무릎 꿇은 저녁.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>내가 한 게 진짜 아무것도 없다면, 주님께서 나에게 무엇을 요구하시든 제가 거부할 근거가 하나도 없네요. 그래서 저는 주님께 완전히 순종하여 함께 살아갑니다.</p><figcaption>은혜와 순종</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>어떤 면에서 삼위일체는 우리 머리로 완전한 이해가 되지 않아야 정상이다.</p><figcaption>삼위일체</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>헬라는 불변을, 히브리 구약은 역동을 말한다. 그 그리스 철학과 히브리 신앙의 종합된 존재론을 통해 우리는 삼위일체 하나님을 깨달아 간 것이다.</p><figcaption>교리사</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>독생자라는 표현도 원어로 보면 독존자 — 독특한 존재라는 뜻이다.</p><figcaption>그리스도론</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>돈도 사명, 외모도 사명, 똑똑한 자녀도 사명, 힘없는 자녀도 사명 — 다 사명이고, 마지막에 다 뒤집힐 것이다.</p><figcaption>사명</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>이 약한 것도 하나님이 쓰신다는 게 무슨 말인지 알겠고, 이 약함이 강함이 된다는 것을 이제 조금 알 것 같다.</p><figcaption>약함</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>요나를 그저 건방진 선지자로만 봤는데, 소신이 뚜렷한 사람이었구나 새로 봤다. 그러면서 내가 옳고 그름의 잣대가 너무 세서 자녀와 남편을 자꾸 잰다는 걸 깨달았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>하나님이 자유의지를 주신 것도 사랑이라는 건 알겠는데, 부모 마음으로 부딪히면 이해가 안 되는 한 끝이 있다. 왜 끝까지 타락조차 허락하시는 걸까.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>약을 먹으면 일어나지 못해 밤을 새워서라도 예배 자리에 나오는 분들을 보며, 3대째 편안한 신앙 가정에서 자란 나와 똑같이 하나님이 사랑하시고 그 고백의 시간도 나와 똑같다는 생각이 들었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>늘 하나님과 공원을 손잡고 걷는 상상을 했는데, 하나님이 영이시고 지금도 나를 이렇게 사랑하신다는 게 너무 따뜻했다. 아이에게 '온 우주를 다스리는 존재'라는 말을 해주지 못했음을 새삼 놀랐다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나는 하나님이 택하셨어도 자유의지로 거부하면 구원받을 수 없다고 생각했는데, 그게 잘못된 생각이었다. 내 한정된 지식과 경험으로 하나님을 자꾸 틀 안에 가두고 있었구나 느꼈다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>자유 의지는 무조건 사랑과 연결해서 생각하셔야 해요. 짜증도 반항도 못 하게 잘라 놓고 받는 사랑은 사랑이 아니라 기계적인 거죠. 등에 칼을 꽂을 가능성까지 열어 두신 그 자리에서 하나님을 택하는 것이 진짜 사랑입니다.</p><figcaption>진행자(이승목 목사)가 자유의지와 사랑을 연결</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>가롯 유다가 돌이켜 은을 던진 그 장면은 마태복음에만 기록되어 있어요. 유대인 독자에게 '당신들도 아직 늦지 않았으니 돌아오라'는 회심의 초청인 겁니다.</p><figcaption>성경 수신자 관점으로 유다를 다시 읽음</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>비행기 원리를 몰라도 그냥 타면 날아가요. 신앙도 다 몰라도 사랑방과 교회 좋은 친구들과 함께 있으면 그 비행기를 타고 가는 겁니다.</p><figcaption>다 이해하지 못해도 공동체로 나아감</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>예수님 오셨을 때 이단이 치고 나오려 하자, 초대 교부들은 그 시대의 철학을 도구 삼아 교리를 지켜냈어요. 그렇게 삼위일체가 선물처럼 우리에게 주어진 겁니다.</p><figcaption>헬라 철학과 삼위일체 교리의 형성</figcaption></figure></div></section>
