<h1>창조론 연대기</h1>
<div class="meta"><span>🗓 2026-06-19 (금요 저녁)</span><span>📖 1회 · 「창조론 연대기」 완독 — 창조·진화, 과학과 신앙의 자리</span><span>✍ 만화 · 새물결</span></div>
<div class="lead"><span class="qm">“</span>창조냐 진화냐로 상처받고 외로웠던 시간들 — 결론은 설득이 아니라, 신앙의 영역에서 서로를 품는 것이었다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>과학은 자연의 영역을 탐구하는 것이지, 자연 너머의 존재를 탐구하는 것이 아니다.</p><figcaption>과학의 자리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>과학은 새로운 게 발견되면 이전 것이 폐기된다. 창조 과학은 과학으로 성경을 뒷받침하려다, 그 과학 자료가 어그러지면 성경까지 함께 흔들린다.</p><figcaption>창조과학의 위태로움</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>결국 이건 신앙의 영역이라 어느 선을 넘으면 대화가 안 된다. 이 사람이 예수를 믿고 안 믿고는 창조 과학에 설득당해서 되는 게 아니다.</p><figcaption>신앙의 영역</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>진화는 바뀐 것 자체를 말하는 데이터이고 진화론은 그걸로 이론을 세운 것인데, 진화'주의'는 그것으로 세상 모든 걸 바라보는 관점이다. 그 끝까지 나아가면 안 된다.</p><figcaption>진화 vs 진화주의</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>한국 교회는 미국 교회의 아들이다. 과학이 성경을 난도질하던 홍역을 치르며, '문자적으로 똑같이 믿는다'로 성경을 붙들기 시작했다.</p><figcaption>문자주의의 배경</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>학창 시절 진화론과 부딪히면 100% 졌다. 늘 위축돼 있었고 '내 믿음이 부족해서야, 세상이 잘못된 거다'라고만 여기며 그냥 그렇게 보냈다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>그 외로움과 고립감은 '창조 과학 = 진짜 믿음'이라는 등식 때문이었다. '같은 신앙인도 다르게 생각할 수 있다'고 누가 한 명만 말해줬어도 그렇게 외롭진 않았을 것이다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나는 모태신앙이 아니라 창조 과학을 성인이 돼서 처음 들었다. 양쪽 다 무지한 상태에서 들으니 오히려 '그럴 수도 있겠다' 싶더라. 무지하니 받아들이기가 더 쉬웠다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>내 전공 분야로 보면 과학계 설명이 100% 맞고, 창조 과학 쪽은 필요한 데이터만 짜깁기한 것처럼 느껴졌다. 인지부조화를 못 견뎌 어떻게든 맞는 걸로 만들려는 건 아닐까, 안타깝기도 했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>창조 과학을 안 믿는다고 저 사람이 믿음이 없다고는 할 수 없다. 신앙 안에서 다 같이 고민하는 한 사람 한 사람일 뿐이다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>'넌 원숭이 새끼고 나는 하나님 자녀다' — 중학교 때 그렇게 전도했더니, 그다음부터 '재수 없어' 하면서 전도가 안 되더라.</p><figcaption>이승목 목사가 창조·진화 논쟁에 목숨 걸던 시절을 웃음으로 회상하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>핵심은 창조 과학이 아니다. 회심한 사람은 '하나님이 나를 사랑하시다니', 그 사랑 하나만 기억하지 논증은 기억나지 않는다.</p><figcaption>설득이 아니라 사랑이 사람을 바꾼다는 대목</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>제일 편한 답이 오히려 시험지에 안 적는 것일 수 있다. 그 용기는 칭찬하되, 정작 어려운 신앙의 선택은 우생학적 회로를 거스르는 삶일 수 있다.</p><figcaption>이승목 목사가 문자적 저항과 참된 신앙의 결단을 구분하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이건 지나온 사람만 쓸 수 있는, 실제 있었던 일이다 — 실화다.</p><figcaption>만화가 그 시절을 겪은 사람의 이야기임에 모두 공감하며</figcaption></figure></div></section>
