<h1>창조 타락 구속</h1>
<div class="meta"><span>🗓 2024-02-21 (수요 오전)</span><span>📖 1회 · 「창조 타락 구속」 — 구조와 방향, 그리고 보존</span><span>✍ 알버트 월터스</span></div>
<div class="lead"><span class="qm">“</span>깨어진 세상을 이원론이 아니라 '구조와 방향'으로 바라보니, 하나님이 무너진 창조를 버리지 않고 지금도 '보존'하고 계심이 위로가 되다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>기독교 세계관은 창조·타락·구속의 토대 위에 선 구조와 방향의 문제다. 자동차 자체에 문제가 있는 게 아니라 운전하는 사람이 문제인 것과 같다.</p><figcaption>구조와 방향</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>하나님은 인간의 불순종이 그의 창조를 전적인 혼돈에 빠지게 하는 것을 내버려 두지 않으시고, 모든 파괴 위력 앞에서 자신의 창조 세계를 보존하신다.</p><figcaption>보존</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>죄는 선한 창조 세계와 구별되지만 창조 세계와 분리할 수는 없다. 죄는 창조의 일부가 아니다.</p><figcaption>죄와 창조</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>세계관은 인간의 사고와 행동 전체를 받치고 형성하는 신념 체계다. 세계관이 먼저 있고 그 위에 철학과 과학이 선다.</p><figcaption>세계관</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>타락이라는 어휘의 무게 때문에, 창조에서 굴러떨어져 무로 돌아가지 않고 보존되었다는 뜻으로 '창조-보존-회복'이라 부르기도 한다.</p><figcaption>창조 보존 회복</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>과학이 발전하며 별은 감탄과 경의의 대상이 아니라 '가스 덩어리'가 되었고, 사람은 '단백질 덩어리'가 되어 인격이 아닌 '그것'으로 대하게 되었다.</p><figcaption>경이의 상실</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>분가하며 목자가 된 언니가 '복음을 전하지 않는 관계와 모임은 소용없다'고 선포해 10년 모은 이들이 다 놀랐다. 언니가 하나님 앞에 깨지기 전까지는 주변 말이 안 들어가는데 어떻게 해야 할지 모르겠다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>완벽주의라 처음 상태로 못 갈 바에는, 하는 생각에 낙심했었다. 그런데 모든 것을 방향과 구조로 바라보니 예수님의 피 흘림이 원래보다 더 좋은 상태로 회복시켜 간다는 게 큰 위로가 됐다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>공격성을 무조건 나쁜 것으로만 여겼는데 그것이 인간 구조에 속한 것임을 배웠다. 자녀를 증오로 정죄하지 말고 사랑에 기반한 징계를 해야겠다는 마음이 들었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>극심한 고통으로 마약성 진통제와 술·담배에 의지하는 친구를 섬기며 하루 네 시간씩 같은 이야기를 들어주는 게 힘들어 '이렇게까지 해야 하나' 기도했는데, 새벽에 '내가 내 아들까지 내어줬잖아'라는 마음이 들려 다시 설 수 있었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>아이가 '엄마는 뭐든지 짜증 낸다고 생각할 거야'라고 했다. 여러 가지 고민하고 애써도 사랑이 없으면 아무것도 아니구나, 결국 사랑에 기대게 된다는 걸 다시 느꼈다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>우리가 믿는 건 엑스 니힐로, 무에서 유의 창조가 맞다. 다만 성경은 물과 혼돈(카오스) 가운데서 질서를 부여해 구속을 향해 나아가는 이미지로 그것을 담아낸다.</p><figcaption>'이 책이 무에서 유의 창조를 부정하는 것 같다'는 물음에 이승목 목사가 답한 창조 교리 문답</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>'인생은 독고다이, 네 갈 길 가라'지만 자율(自律)은 없다. 태아가 양수를 먹으며 자라듯 우리는 시대 문화를 먹으며 형성된다 — 참된 권위에 기대어 자라가야 한다.</p><figcaption>세계관은 신념이라는 이승목 목사의 강의 (유명인 축사 비판)</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>진리의 반석 위에 서 있으면 이런 사람 저런 사람 다 있어도 괜찮다. 지금 힘든 건 해결이 안 돼서인데, 그 마음 중심에 몸된 교회와 지체를 사랑하는 마음이 있기 때문이다.</p><figcaption>'언니 말도 맞고 친구 입장도 맞아 헷갈린다, 이게 이원론인가'라는 물음에 대한 응답</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>기도는 내 소원을 올리는 게 아니라 말씀에 반응하는 시간이다. 소견대로 하는 기도는 비극이다.</p><figcaption>기도의 본질을 짚는 나눔</figcaption></figure></div></section>
