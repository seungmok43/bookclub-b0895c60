<h1>용서를 배우다</h1>
<div class="meta"><span>🗓 2026-02-20 (금요 저녁)</span><span>📖 1회 · 「용서를 배우다」 도입 — 심판자의 자리에서 내려오기</span><span>✍ 팀 켈러</span></div>
<div class="lead"><span class="qm">“</span>복수의 카타르시스에 익숙한 시대에, 심판자의 자리에서 내려와 하나님께 정의를 내어드리는 것 — 그것이 우리가 잃어버린 용서다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>문제는 보복 행위 자체가 아니라, 심판의 자리는 하나님의 자리인데 내가 그 정의의 자리에 서 있다는 것이다.</p><figcaption>심판자의 자리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>용서란 내가 정의를 실현하는 것이 아니라, 하나님이 하나님의 방식으로 정의를 실현하시도록 여지를 내어드리는 것이다.</p><figcaption>여지를 내어드림</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>이 시대는 용서를 잃어버렸다. 스스로 잘못을 고백하는 순간 그냥 끝장을 내버린다.</p><figcaption>용서의 퇴조</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>용서는 문화다. 어느 공동체에서 용서가 자연스러운 건 수백 년의 세월이 쌓였기 때문이다.</p><figcaption>용서의 문화</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>용서해야 한다고 말하기는 쉽다 — 정작 용서할 상황을 맞닥뜨리기 전까지는.</p><figcaption>용서의 무게</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>학부모 일로 내 바닥을 봤다. 내가 억울한 걸 못 참고, 광야에 홀로 있는 걸 두려워하는 사람이구나 깨달았다. 그 사람과 나의 관계가 아니라, 나와 하나님의 관계가 먼저 회복돼야 그 사람이 소화된다는 걸 알았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>운전하다 뒤에서 빵빵거리면 확 화가 올라온다. 내려서 한마디 하고 싶다. 그런데 이것도 결국 똑같이 응수하지 않고 하나님께 여지를 내어드려야 하는 용서의 자리라는 생각이 들었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>영화는 다 복수와 뒤통수뿐이라, 진정한 용서는 바보짓이라는 생각을 가슴에 품고 살아온 것 같다. 예수님처럼 하는 건 왜 저러나 싶은.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>극심한 가정의 상처 앞에서 용서는 여전히 내게 숙제로 남아 있다. 더 이상은 안 된다고 결단한 지 오래지만, 이 용서만큼은 아직 풀리지 않은 과제다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>수영로에서 안방(소그룹)에 들어가라. 분명히 개떡 같은 인간도 있고 당신도 상처를 줄 것이다. 하지만 거기서 누군가 당신을 용서하는 경험을 반드시 하게 될 것이다.</p><figcaption>진행자(이승목 목사)의 공동체 권면</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>용서하고 용납받는 마지막 보루는 교회밖에 없다. 세상은 스스로 죄를 고백해도 그냥 매장해 버린다.</p><figcaption>진행자(이승목 목사)가 말한 교회의 자리</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>'긁혔다'는 말은 원래 그가 해야 할 '미안하다'가 사라진 자리에 들어선 책임 전가의 언어 같다. '나는 던졌을 뿐, 네가 예민한 거야'라며.</p><figcaption>시대의 언어를 두고 한 참석자가 나눈 관찰</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>끝까지 싸우다 광야에 둘만 남으니, 알고 보니 너도 비참한 인생이고 나도 비참한 인생이더라 — 그게 드러나자 서로 화를 안 내게 되더라.</p><figcaption>한 참석자가 영화를 빌려 나눈, 불쌍히 여김</figcaption></figure></div></section>
