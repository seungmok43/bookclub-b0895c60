<h1>용서를 배우다</h1>
<div class="meta"><span>🗓 2026-03-20 (금요 저녁)</span><span>📖 완독 · 용서에서 화해로, 은혜 없이는 안 되는 용서</span><span>✍ 팀 켈러</span></div>
<div class="lead"><span class="qm">“</span>내 마음 편하려는 용서를 넘어 그 사람이 잘되기를 비는 자리 — 그것은 은혜 없이는, 복음 없이는 설명되지 않는다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>용서는 혼자서도 할 수 있지만, 화해는 두 사람이 있어야 한다.</p><figcaption>용서와 화해</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>누군가를 용서하지 않고 증오하는 것 자체가 이미 그 사람에게 종속되는 것이다. 저 사람이 잘돼도 짜증 나고, 망하면 통쾌하지만 그 통쾌함의 노예가 된다.</p><figcaption>증오의 종속</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>하나님의 은혜 없이는 용서가 안 된다. 요셉이 형제들을 용서한 것도 하나님의 은혜를 받았기 때문이다.</p><figcaption>은혜</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>용서는 의지적으로 결단하는 것이다. 그 여정이 완성되는 것은 우리 몫이 아니라 성령이 하시는 일이다.</p><figcaption>결단</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>상대가 전혀 사과하지 않아도 용서해야 하는가 — 그래야 한다. 증오의 노예가 되지 않기 위해서다.</p><figcaption>사과 없는 용서</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>용서가 내 힘으로 안 되니 포기했었다. 그런데 그 한 영혼이 하나님 만나 축복 누리길 바라는 마음으로 기도하게 하시더니, 어느 날 그를 보며 안쓰럽고 불쌍히 여기는 사랑의 감정이 생겨 그제야 용서가 됐구나 알았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>한 사람은 보며 웃을 수 있는데, 회사의 다른 한 사람은 부서를 옮겼는데도 여전히 미워하고 있더라. 상처 때문인 것 같다. 그를 어떻게 다시 용서해야 할지 고민이다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>믿기 전이었다면 나도 동생과 똑같이 오빠를 미워했을 것이다. 은혜를 받고 나니 오빠의 사정이 이해가 가더라. 나와 동생의 그 차이가 곧 은혜라는 걸 느꼈다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>신호등 없는 횡단보도에서 차가 먼저 지나가자 '사람이 먼저지' 하며 욕하고 있는 나를 봤다. 은혜가 없으면 내 안에 화가 이렇게 많구나, 그 마음을 멈춰 주신 것 자체가 은혜였다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>믿는 집에 시집갔는데 그 안에서 날아오는 화살들을 용서하지 못하고 있었음을 최근 깨달았다. 예전 같으면 해결 방법을 수십 가지 찾았을 텐데, 지금은 그저 하나님께 다 고발하며 기도하고 있다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>웬만한 건 AI가 다 해줄 것이다. 그러나 이 사람 만나는 것은 못 해준다. 인격과 인격의 관계, 그 시간의 절대량이 진짜 중요해질 것이다.</p><figcaption>진행자(이승목 목사)가 나눈, 관계의 시간</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>용서는 했는데 화해가 부담이었다. 그런데 커피를 나누고 서로 슬쩍 등을 붙여가며 점점 가까워지니, 공동체는 이렇게 하는 거구나 싶었다.</p><figcaption>한 참석자가 그날의 자리에서 경험한 화해</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>우리가 생각한 용서는 너무 거대했다. 교회의 걸림돌 중 하나가 이상주의다. 예수님이 다 하셨으니, 처음 온 사람에게 '어떻게 왔냐' 인사 한 번 건네는 것 — 그 정도면 된다.</p><figcaption>진행자(이승목 목사)가 이상주의를 내려놓으라며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>평생 원수로 지낼 수도 있다. 교회 안에도 원수 관계가 득실득실하다. 그래서 용서와 화해는 그 자체로 기적이다.</p><figcaption>진행자(이승목 목사)의 마무리</figcaption></figure></div></section>
