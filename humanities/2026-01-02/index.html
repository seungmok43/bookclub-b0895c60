<h1>인문학을 하나님께</h1>
<div class="meta"><span>🗓 2026-01-02 (금요 저녁)</span><span>📖 1회 · 「AI」편 도입 — 시대를 이해하고 넘어서기</span><span>✍ 한재욱</span></div>
<div class="lead"><span class="qm">“</span>AI가 지성을 대신하는 시대일수록, 변하지 않는 진리와 얼굴을 맞댄 관계가 우리를 끝내 사람으로 남게 한다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>모든 사람이 확증 편향을 가지고 있습니다. 우리는 유한하기에 자기 쪽으로 굽어 있죠. 그 굽은 것을 활짝 펴서 꽃피우게 하는 것이 공동체이고 타인입니다.</p><figcaption>확증편향</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>시대를 이해하고 활용하고 넘어서라 — 저자가 첫 장에서 가장 하고 싶은 말이 거기 다 담겨 있더라. 나는 이 시대를 이해하고 있고, 활용하고 있고, 넘어서고 있기는 한가.</p><figcaption>시대를 읽기</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>앞으로 시대가 어떻게 변하냐고들 묻지만, 시대가 흘러가도 변하지 않는 것이 무엇이냐고 물은 사람은 없다. 신앙으로 말하면 그것이 진리요 말씀이다.</p><figcaption>진리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>소음은 우리가 진리에 다가서지 못하게 우리의 정신을 산만하게 한다. 내 삶에서 진짜 신호를 방해하는 소음이 무엇인지 분별해 쳐내는 것이 필요하다.</p><figcaption>소음과 신호</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>수트가 없을 때 아무것도 아니라면 수트를 입어선 안 된다 — AI가 없으면 내가 진짜 아무것도 아닌 존재라면, AI를 쓰면 안 되는 것 같다.</p><figcaption>도구의 활용</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>제목만 보고 어렵겠다며 편파적으로 생각했는데, 읽으면서 내가 좋아하는 것만 보려던 확증 편향에 갇혀 있었음을 깨달았다. 북클럽을 통해 더 넓은 세상으로 인도받는 것 같다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>노동의 가치가 십수 년 안에 제로에 수렴할 거라는 이야기를 들으며, 살아남으려면 결국 이 도구를 활용해 내 자리에서 스페셜리스트가 되는 수밖에 없겠다 싶었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>지혜를 솔로몬처럼 갖고 싶어 온갖 지식을 흡수하려 했지만, 변화시킬 수 없는 것을 받아들이고 변화시킬 수 있는 것을 분별하는 지혜를 구하는 그 기도문이 마음에 오래 남았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>영성과 지성은 별개인 것 같다. 말씀이 무슨 의미인지 몰라도 읽으면 그 자체로 내 영에 영향을 끼친다고 나는 생각한다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>휴식할 때면 만만하게 유튜브를 켜는 나를 본다. 끊어야 하는데 잘 안 된다. 이 홍수 같은 정보가 내 신앙을 방해하는 소음일 수 있겠다는 생각이 들었다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">3</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>한 총장이 졸업 전까지 고전 100권을 읽게 했더니, 단순 독해력이 아니라 문해력과 창조 능력이 생겨 그 대학에서 노벨상이 백 명 가까이 나왔다고 한다.</p><figcaption>한 참석자가 나눈, 문해력의 힘에 관한 이야기</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>AI 목사를 추종하고 함께 신앙생활하는 교회가 언젠가 세워질 거라고 나는 예상한다. 하지만 성령이 없기에, 결국 이것은 성경적이지 않아 이단으로 판명될 것이다.</p><figcaption>진행자(이승목 목사)의 AI 시대 교회론</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>설교는 대체될 수 있어도, 하나님의 임재는 대체할 수 없다. 우리가 영으로 깊이 들어가는 그 차원은 좋은 강의의 깨달음과는 완전히 다른 차원이다.</p><figcaption>목회자가 AI로 대체될 수 있는가를 두고 오간 대화</figcaption></figure></div></section>
