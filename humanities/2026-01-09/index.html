<h1>인문학을 하나님께</h1>
<div class="meta"><span>🗓 2026-01-09 (금요 저녁)</span><span>📖 2회 · 「AI」편 — 통제의 두려움과 관계의 회복</span><span>✍ 한재욱</span></div>
<div class="lead"><span class="qm">“</span>AI가 나를 다스릴까 두려워하기 전에, 나는 이미 하나님의 통치 안에 있는가 — 두려움의 시대에 믿음은 도리어 기회가 된다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>AI는 양심이 없다, 그런데 AI가 사랑할 수 있을까 — 저자는 양심과 사랑, 이 두 가지로 인간과 인공지능을 가른다.</p><figcaption>양심과 사랑</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>인간은 통제받는 것 자체를 싫어한다. 하나님이 내 삶을 통제하시는 것조차 싫어한다. AI가 두려운 건 그 통제하는 주체가 점점 고도화됐을 뿐인지도 모른다.</p><figcaption>통제</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>AI가 두려운 건 지배하는 종 자체가 바뀌기 때문이다. 스마트폰은 절제하고 컨트롤할 수 있지만, AI는 특이점을 넘는 순간 우리의 통제 밖으로 나간다.</p><figcaption>두려움의 정체</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>AI를 만든 것도 결국 사람이다. 사람이 문제이기에, 문제 있는 사람들을 복음 안에서 변화시키고 회복시키는 일이 도리어 더 중요해진다.</p><figcaption>사람이 문제</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>'나는 지금 12만 명과 동시에 대화하고 있어' — 완전한 관계라 믿었던 것이 한마디에 차갑게 부서진다.</p><figcaption>거짓 친밀</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>아무 생각 없이 챗봇을 써왔다는 걸 깨달았다. 내가 공짜로 쓰는 게 아니라 내 정보가 그들의 데이터가 되고 있었다. 성경이 말하는 룰 안에서 이것을 어떻게 써야 할지 고민하게 됐다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>아이가 '엄마, 나도 걔랑 대화하고 싶어'라고 했을 때, 책을 안 읽고 AI에게 줄거리를 물어본 내 모습이 너무 부끄러웠다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>종말이 가까운가 생각하니 갑자기 내 신앙이 형편없게 느껴졌다. 그래서 성경을 더 읽고 하나님께 더 가까이 가야겠다는 마음이 들었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>공동체가 무서워 한동안 나오지 못했다. 문화적 충격이 컸지만, 그 안에서 내 믿음을 보게 됐다. 세상과 타협하지 않고 그저 순수함으로 하나님 앞에 가야겠다고 결론 내렸다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>혼자 있으면 좋은 책 읽고 좋은 것만 보며 내가 괜찮은 사람이라 착각한다. 공동체 안에 있어야 내가 얼마나 부족한지, 하나님의 도움이 필요한 존재인지를 깨닫게 된다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">3</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>AI가 아무리 지성을 쌓아도, 새벽에 5분 아이 손을 잡고 하늘을 보며 함께 걷는 이 시간은 줄 수 없다. 갈수록 이런 게 소중해진다.</p><figcaption>진행자(이승목 목사)가 나눈, AI가 대체할 수 없는 것</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>지금 우리가 키워야 할 근육은 인내다. 쿠팡처럼 누르면 바로 오는 시대에, 응답이 더뎌도 하나님을 떠나지 않고 상처받으면서도 버티는 인내.</p><figcaption>진행자(이승목 목사)의 결론 — 관계와 인내</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>AI 시대가 오면 가짜로 믿은 것과 진짜로 믿은 것이 완전히 가려질 것이다. 믿는 사람들은 오히려 더 깊어질 것이다.</p><figcaption>마지막 때를 두고 한 참석자가 나눈 소망</figcaption></figure></div></section>
