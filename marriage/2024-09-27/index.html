<h1>결혼을 말하다</h1>
<div class="meta"><span>🗓 2024-09-27 (금요 저녁)</span><span>📖 1회 · 「결혼을 말하다」 완독 나눔 — 독신·친밀함·성경적 결혼관</span><span>✍ 팀·캐시 켈러</span></div>
<div class="lead"><span class="qm">“</span>세상 어디에도 없는 독보적 친밀함으로서의 결혼, 그 뿌리를 파고들면 결국 은혜였다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>기독교만큼 독신에 대해 무조건 나쁘다고 말하지 않고 긍정하는 세계관은 없었다. 독신도 소망이 아니고 결혼도 소망이 아니며, 오직 예수 그리스도를 만나는 그것이 소망이다.</p><figcaption>독신</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>'하나님 한 분으로 만족하는 삶을 살다 보면 짝을 보내주실 거야'라는 말은, 자족해야 은혜를 받을 수 있다는 율법주의처럼 들린다.</p><figcaption>독신을 향한 말</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>결혼은 실제가 아닌 그림자다. 그러니 결혼을 지나치게 긍정할 필요도, 부정할 필요도 없다.</p><figcaption>결혼의 자리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>결혼은 본질적으로 진실의 힘, 곧 스스로의 실체를 있는 그대로 드러내는 힘을 가지고 있다.</p><figcaption>결혼과 진실</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>서로 성장하도록 돕는 관계를 만들어가는 첫걸음은, 그 안에 내딛는 속성을 인정하고 받아들이는 것이다.</p><figcaption>성장</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>상처를 주는 상대에게서 도망치지 않은 것은 그때가 처음이었다.</p><figcaption>도망치지 않음</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>아들로, 남편으로, 아빠로 자리가 바뀔 때마다 그리스도의 마음과 하나님 아버지의 마음이 조금씩 더 이해됐다. 그러면서 성경 보는 것도, 결혼 보는 것도 달라졌다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>서로 원하는 것이 다르다는 걸 알고 나니, 배우자의 요구를 '사랑받지 못함'으로 여기던 마음이 '선물을 준다'로 바뀌더라. 예수님이 인내하셨듯 나도 인내를 배우게 됐다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>결혼의 가장 큰 축복은 친밀감인 것 같다. 혼자였다면 이렇게 친밀한 관계를 누릴 수 있었을까. 그 한 사람을 만들어가는 과정이 결혼이 아닐까.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>8년 유학 중 4년을 아내와 떨어져 지내며 고생을 많이 시켰다. 빚진 마음이 늘 있어서, 어떻게 그 마음을 갚을 수 있을까 고민하게 된다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>다 해봤지만 안 됐는데, 힘을 빼고 은혜로 한 결혼이 내 인생에서 제일 잘한 일이었다. 결국 은혜구나 싶다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>안 속으면 결혼을 못 합니다. 진짜 모든 걸 다 알면 결혼을 할 수가 없죠.</p><figcaption>이승목 목사가 결혼의 역설을 농담처럼 짚으며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>부부는 세상에 없는 독보적이고 신비로운 관계인데, 이 시대에는 부부마저 언제든 남이 될 수 있게 되어버렸다.</p><figcaption>친밀함의 가치와 그 상실을 이야기하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>요한계시록은 마지막에 결혼식으로 끝난다 — 신랑 예수와 신부 된 교회의 결혼으로.</p><figcaption>부부의 친밀함을 하나님과의 관계에 잇는 대목</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>'좀비 카테고리'라는 말이 있다. 결혼이라는 말은 살아 있지만, 그 개념은 이미 죽어 있다는 것이다.</p><figcaption>한 참석자가 전통적 가정 개념의 붕괴를 인용하며</figcaption></figure></div></section>
