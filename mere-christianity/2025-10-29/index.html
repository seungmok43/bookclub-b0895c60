<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-10-29 (수요 오전)</span><span>📖 1회 · 서문 + 1부 「옳고 그름」 도입</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>확 당겨주지 않으시는 그 더딘 기다림조차, 알고 보면 우리를 향한 사랑의 시간이었다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>오랜 시간 현관 마루에서 기다려야 한다고 생각하는 사람이 있는가 하면, 어떤 문을 두드려야 할지 거의 즉시 알아채는 사람들도 있습니다. 왜 이런 차이가 생기는지 모르겠지만, 하나님께서 그 기다림이 유익하다고 생각하지 않으시는 한 오래 기다리게 하실 리가 없다고 믿습니다.</p><figcaption>기다림 · 서문</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>절대 선이 우주를 다스리지 않는다면 어떤 노력을 해도 우리에게는 소망이 없고, 절대 선이 우주를 다스린다면 우리는 매일 그 선의 원수가 되는 셈이다.</p><figcaption>절대선</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>위안을 구한다고 얻을 수 있는 것이 아니다. 진리를 구한다면 결국 위안을 발견할 것이다.</p><figcaption>진리와 위안</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>무언가가 존재하며, 그 무언가는 내 안에 옳은 일을 하기를 재촉하고 그릇된 일에는 책임감과 불편함을 느끼게 만드는 하나의 법칙으로 나타난다.</p><figcaption>도덕률</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>인간의 욕망이 큰 게 아니다. 인간의 욕망이 너무 작다. 빈민가에서 쓰레기로 집을 짓는 걸로 너무 좋아하고 있다.</p><figcaption>욕망</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>하나님, 나 이렇게 확 당겨주면 좋겠는데 왜 나는 이렇게 더디게 가고 혼자 팽 돌아서 가고 시간이 많이 걸릴까, 늘 그런 딜레마가 있었어요. 그런데 이 서문을 읽으면서 위로를 얻었어요. 기다림도 하나님의 뜻이라면 그것도 순종해야겠구나 하고 한 번 더 생각했습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>저는 오케스트라 연주자로 있었는데, 지휘자가 없다면 그 많은 사람이 어떻게 맞춰 갈 수 있겠어요. 우리 삶에도 분명한 기준과 진리가 있고, 완벽할 수 없지만 실수를 줄여가며 진리에 좀 더 가까이 나아가려 애쓰는 게 아닌가 생각했습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>'나쁜 충동은 없다'는 말이 저는 너무 충격이었어요. 저는 그동안 이 충동을 나쁘게 봤거든요. 그냥 가벼운 신앙 도서라 생각하고 새벽에 졸면서 읽었는데, 그런 책이 아니구나 싶어 긴장도 되고 그 부분이 궁금했어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>저와 반대 기질인 남편의 힘든 점을 이해해 보려고 강의를 들으러 갔는데, 결국 이건 내가 수용하고 이해해야 할 부분이구나, 결론은 또 사랑이구나 싶었어요. 내가 주님 안에서 사랑이 충족돼 있어야 그 면을 또 사랑할 수 있겠더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>이분이 '이럴 수도 있지만 이럴 수도 있다'라고 쓰시니까, 이게 맞다는 건지 저게 맞다는 건지 읽는 내내 계속 헷갈렸어요. 앞부분 도입을 왜 이렇게 어렵게 풀어내시는 건가 싶었습니다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>'어차피 잘될 거니까 내 멋대로 살자'는 사실 방종이죠. 하지만 그렇지 않아요. 부모의 사랑을 정말 아는 아이는 자기 마음대로 안 살아요. 부모가 뭘 원하는지, 뭘 좋아하는지 끊임없이 고민하죠.</p><figcaption>은혜가 방종이 아닌 이유 — 이승목 목사</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>기독교는 시간을 중요하게 생각하고 기다리는 종교, 인내의 종교예요. 요즘 젊은 세대가 은혜를 잘 못 누리는 건, 쿠팡 결제하듯 '이만큼 했으니 와야 한다'고 여기다가 안 오니 거기까지 못 가는 거예요.</p><figcaption>기다림의 신앙 — 이승목 목사</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>창조·타락·구속으로 본다면 욕망 자체는 나쁜 게 아니에요. 다만 세상은 '모든 충동이 옳다'고 하고, 루이스는 하나님이 우리를 욕망하는 존재로 지으셨다고 전제하죠. 같은 말이라도 세계관이 다를 수 있습니다.</p><figcaption>'나쁜 충동은 없다'는 참석자의 충격에 답하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>지금 모습도 아름답지만 나중엔 진짜 빛나는 모습을 소망하며, '찬란하게 빛날 너의 모습을 내가 지금 본다' 하는 마음으로 옆 사람을 대하는 거죠. 그러면 함부로 대할 수 없어요.</p><figcaption>이승목 목사</figcaption></figure></div></section>
