<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-11-07 (금요 저녁)</span><span>📖 2회 · 1부 1장 「인간 본성의 법칙」</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>옳고 그름을 아는 그 마음이 내 안에 있다는 것, 바로 그것이 우주를 여는 실마리였다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>도덕률은 인간 안에 내면적으로 있다. 옳은 일을 재촉하고 그릇된 일에는 불편함을 느끼게 하는 그 법칙은, 사람을 관찰해서가 아니라 자기 내면을 들여다볼 때 발견된다.</p><figcaption>인간 본성의 법칙</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>DNA가 우리 몸의 설계도이듯, 설계도가 있으면 설계자가 있습니다. 옳고 그름에 분명한 기준이 있다는 건 그 기준을 주신 누군가가 있다는 뜻이고, 그것이 우주를 풀어주는 실마리입니다.</p><figcaption>우주의 실마리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>집을 지은 건축가가 곧 그 집의 벽이나 계단일 수 없듯이, 우주 밖에서 우주를 통제하는 힘이 있다면 그 힘은 우주 안에 있는 사실들 중 하나로 나타날 수 없습니다.</p><figcaption>도덕률의 근원</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>내가 배고픔이 있다는 건 음식이 있다는 전제 때문이고, 목마름이 있다는 건 물이 있기 때문이다. 이 땅에서 채울 수 없는 어떤 갈망이 있다는 것은, 우리가 더 큰 것으로부터 지어졌기 때문이다.</p><figcaption>갈망</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>도덕법이 느껴지는데도 이것을 무시하려면, 오히려 엄청난 신앙적 도약이 필요하다.</p><figcaption>도덕법</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>책이 일주일이 넘도록 안 와서, 못 읽었으니 이번엔 한 번 빠질까 생각했어요. 그런데 자꾸 제 안에서 '이건 옳지 않다, 타당하지 않다'는 생각이 드는 거예요. 결국 서점에 가서 읽었는데, 그게 딱 이 책이 말하는 인간 내면의 도덕률 같았어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>하나님이라는 단어를 안 쓰고 인간 본성의 법칙과 보이지 않는 손을 예시로 설득하니까, 오히려 안 믿는 사람한테 더 설득력이 있겠다 싶었어요. 신앙을 가진 저조차 복음보다 더 타당하게 느껴질 정도였거든요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>하나님을 모를 때는 제가 도덕적으로 아주 높은 사람이라 생각했어요. 그런데 주님을 만나고 나서야 그 죄라는 것이 제가 생각했던 게 아니구나 깨달았죠. 답해 줄 사람이 없어 답답했던 그 물음이, 하나님을 만나니 다 해결되더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>요즘 매일 아침 받은 말씀으로 하루를 사는 큐티의 삶이 얼마나 중요한지 가슴으로 확 느꼈어요. 큰 깨달음이라기보다 매일 주시는 작은 깨달음, 그 말씀에 대한 갈망이 조금 생겼습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>극악무도한 범죄자만이 아니라 회사에서도 이기적으로 사는 걸 지혜롭다 여기는 분들이 있어요. 저는 양심 때문에, 소위 쪽팔려서 도저히 못 하겠는데, 그걸 당당하게 하면서 지혜롭게 산다고 여기는 것도 나름의 신앙적 도약 같더라고요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>극악무도한 살인범도, 아들이 '아빠 또 사람 죽이냐'고 천진하게 전화하자 섬뜩함을 느꼈다고 해요. 아무렇지 않게 행동하다 갑자기 자기가 틀렸다는 걸 아는 것, 그 사람도 아직 양심이 살아 있다는 거죠.</p><figcaption>자연법이 모두 안에 있다는 참석자의 예화</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>'나의 아저씨'의 이선균은 미련할 만큼 정직한 길을 뚜벅뚜벅 가잖아요. 사회가 볼 땐 곰탱이 같아도 결정적 순간엔 그 정직함이 강점이 돼요. 세상을 돌아가게 하는 힘은 하나님이시니, 결국 그런 사람이 성취한다고 생각해요.</p><figcaption>권선징악과 하나님의 통치 — 한 참석자</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>CS 루이스 때보다 지금이 더 힘들어요. 그땐 신이 죽냐 마냐 다투던 시대였다면, 지금은 이미 다 죽여 놓고 '도덕법이 없는 사람도 있지 않냐'고까지 말하는 시대가 돼버렸거든요.</p><figcaption>도덕법을 흐리는 시대 — 이승목 목사</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>'나는 저런 짓 안 해'로 끝나는 건 어떤 종교일 수도 있어요. 기독교인은 여기 와서 그런 행동을 안 하는 문화를 만들어내는 게 구속의 관점으로 맞는 거죠. 사실 신앙생활은 그때부터 시작된다고 봅니다.</p><figcaption>이승목 목사</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>종교 없이도 바르게 사는 오타니 같은 사람도 도덕법으로 설명할 수 있어요. 다만 우리에게 그 진리는 율이나 글귀가 아니라, 손으로 만지고 함께 살아갈 수 있는 옆에 계신 예수님이라는 게 기독교의 독특함이죠.</p><figcaption>이승목 목사</figcaption></figure></div></section>
