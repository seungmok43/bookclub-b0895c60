*{box-sizing:border-box;margin:0;padding:0;}
body{background:#efe9dd;color:var(--ink);font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;line-height:1.7;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;padding-bottom:70px;}

.hero .meta{display:flex;flex-wrap:wrap;gap:6px 8px;justify-content:center;font-size:.83rem;color:var(--sub);margin-top:6px;}
.hero .meta span{background:#fff;border:1px solid var(--line);border-radius:20px;padding:3px 13px;}
.lead{max-width:680px;margin:24px auto 0;background:var(--brown);color:#f4ead7;border-radius:16px;padding:28px 32px;font-size:1.3rem;font-weight:700;line-height:1.65;word-break:keep-all;overflow-wrap:break-word;text-wrap:pretty;position:relative;}

<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-11-12 (수요 오전)</span><span>📖 3회 · 2부 「그리스도인이 믿는 것」</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>회개란 자기를 버리는 작은 죽음이고, 그리스도인은 넘어질 때마다 다시 일어나는 사람 — 냉기와 온기의 싸움이 아니라 온기가 얼마나 채워지느냐의 문제다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>악은 선이 선이 되는 것과 같은 방식으로 악이 될 수 없다. 잔인함조차 자신에게 쾌락을 주거나 유용하기 때문에 그렇게 하는 것일 뿐이다.</p><figcaption>악은 선의 왜곡</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>회개한다는 것은 수천 년간 익혀온 자기만족과 자기 의지를 버린다는 뜻이고, 여러분 자신의 일부를 죽이는 것, 일종의 죽음을 겪는 것을 뜻합니다.</p><figcaption>회개</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리가 선하기 때문에 하나님이 우리를 사랑하시는 게 아니라, 하나님이 먼저 우리를 사랑하시기 때문에 우리를 선하게 만드십니다.</p><figcaption>은혜의 우선성</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>그리스도인이란 넘어질 때마다 회개하고 다시 일어나 몇 번이고 새롭게 시작할 수 있는 사람입니다.</p><figcaption>새로운 시작</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>얼음이 어는 것은 냉기와 온기의 싸움이 아니라 온기가 다 빠져나가 얼어버리는 것이다. 얼어붙은 냉기 자체는 존재하지 않는다.</p><figcaption>부재로서의 악</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>완전한 회개라는 게 있을 수 있나 궁금했어요. 매일 죄를 짓고 또 짓는데 어떻게 완전하게 회개할 수가 있지, 그게 뭘까 싶었어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>이 책을 읽으면서 나는 이 회개조차 제대로 할 수 없는 인간이구나 깨닫는 것 자체가, 하나님이 살려주지 않으면 나는 오늘을 살 수 없는 존재구나를 아는 게 회개인 것 같았어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>이 사람은 똑똑한데도 '이건 내가 아는 것이고 나머지는 네가 직접 읽어보고 알면 좋겠다'는 겸손한 태도로 써요. 나이 들수록 못돼가고 잔소리만 하는 내 모습이 부끄러워, 이 문체 자체에서 겸손을 배워야겠다 싶었어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>몸이 아프면서 내 규칙적인 기도가 그냥 율법적인 행위였나 너무 괴로웠는데, 이유는 모르지만 선하신 하나님이 알 수 없는 선한 길로 인도하시겠지 생각하니 마음이 편해지더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>말씀과 기도가 정답인 건 알지만 그 결론이 늘 답답했어요. 그런데 이 책을 읽으며 진리는 단순하지 않다는 것, 내 권면도 여러 갈래 중 한 가지일 뿐임을 받아들이게 됐어요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">3</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>목사님, 그럼 죄는 뭔가요? 교회도 더러워질 수 있나요? — 교회도 깨끗해질 수 있고 더러워질 수도 있습니다. 너의 종착지는 천국으로 정해졌지만, 아직 회색 가운데 있기에 네가 가는 모든 영역에 회복이 일어나야 한다.</p><figcaption>진행자(이승목 목사)가 아이들과 나눈 기독교 세계관 문답을 회고</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>모든 고대 신화와 설화를 다 가져와도 그 이야기들의 궁극적 답을 예수 그리스도로 내릴 수 있다. 복음 이야기만은 막힘이 없다.</p><figcaption>신화·문학을 전공한 루이스가 회심에 이른 통찰을 진행자가 소개</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>안 믿는 사람은 창조를 믿지 않으니 성악설부터 얘기할 수밖에 없죠. 우리는 성선설이지만 사람들이 말하는 그 시점이 다른 거예요.</p><figcaption>성악설과 성선설의 긴장을 참석자들이 함께 정리</figcaption></figure></div></section>
