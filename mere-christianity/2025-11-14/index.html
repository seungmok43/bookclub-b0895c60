<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-11-14 (금요 저녁)</span><span>📖 4회 · 2부 「그리스도인이 믿는 것」</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>무엇을 믿느냐보다 왜 믿느냐가 우리를 붙든다 — 낭패감에서 시작해 날마다 자신을 죽이는 회개로, 하나님을 알아가는 끝없는 항해.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">7</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>예수님은 신 아니면 정신병자다. 좋은 교사로 평가할 여지조차 주지 않았다. 자기가 신이라 하고 죄를 용서한다 하니, 신이 아니면 미치광이인 것이다.</p><figcaption>삼도논법</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>인간이 현명해질수록 사물을 선과 악으로 구분하지 않게 되며, 그 어떤 것도 서로 다를 수 없고 모든 것은 관점의 문제라고 여기게 된다.</p><figcaption>악의 보편성</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>회개하지 않고 '당신께 돌아가게 해주세요'라고 구하는 것은, 돌아가지 않으면서도 돌아가게 해달라고 구하는 것이나 다름없다.</p><figcaption>회개</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>그리스도의 죽음이 어떤 방식으로든 우리로 하여금 하나님과 바른 관계를 맺게 해주며 새 출발을 하게 해주었다.</p><figcaption>대속</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>그리스도인은 절대 잘못을 저지르지 않는 사람이 아니라, 넘어질 때마다 회개하고 다시 일어나 몇 번이고 새롭게 시작할 수 있는 사람이다.</p><figcaption>실제적 결론</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>무신론도 무지한 철학이지만, 하늘에 선한 하나님이 계시니 만사형통이라 말하는 물탄 기독교도 무지한 철학이다.</p><figcaption>물탄 기독교</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>기독교는 낭패감에서 시작하는 종교다 — 내가 답이 없구나, 나는 죽을 수밖에 없구나 하는 낭패감에서.</p><figcaption>낭패감</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>제일 마음에 와닿은 건 예수님은 신 아니면 정신병자라는 말이었어요. 세상 사람들이 4대 성인으로 좋아한다는 게 모순이구나 싶었고, 이런 질문 하는 사람이 제 주변에 유독 많아서 저에게 참 감사한 책이에요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>내가 진짜 죽을 수밖에 없는 존재고 죄인이구나가 확 올 때가 있어요. 장례식장에서나 말씀 앞에 설 때, 그럴 때 믿음이 확 진해지는 것 같아요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>최근 몸이 아프면서 내가 하나님의 능력을 믿었나 존재를 믿었나 혼란이 왔어요. 잠시 아파서 신앙생활을 못 하니 꼬꾸라지는 걸 보며, 내가 율법적으로만 믿어온 건 아닌가 돌아보게 됐어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>많고 많은 사람 중에 왜 하필 나일까, 굳이 이 아픔을 깨고 나가야 하는 나를 왜 고쳐 쓰시려 할까. 이 부클럽을 통해 내 연약함과 낮음을 깨닫게 하시는 게 오히려 너무 감사했어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>철저히 깨지고 내 안에 소망이 완전히 없어졌을 때, 이런 바닥 같은 나를 위해 예수님이 매달리셨구나가 그제야 와닿았어요. 바닥을 칠수록 좌절이 아니라 힐링이 되더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>후원을 하며 늘 내가 돕는다고만 생각했는데, 누군가의 가난이 오히려 내 영혼을 살리고 있구나 느끼니 감사하더라고요. 일방적인 도움이 아니라 서로가 서로를 살리는 거였어요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>회(悔)는 마음을 매일, 개(改)는 몸을 날마다 치는 것 — 마음을 매일 죽이고 몸을 날마다 친다는 뜻이니 회개라는 단어 자체가 참 성경적이에요.</p><figcaption>한 참석자가 '회개'의 한자 풀이로 매일의 죽음을 설명</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>겸손은 '나는 아닙니다' 하는 게 아니라, 이승목 머릿속에서 이승목이 사라지는 것이에요. 큰 이야기에 나를 던지는 순간 나는 작아지고 하나님 이야기에 사로잡히는 거죠.</p><figcaption>진행자가 농구 시절의 '어깨 힘 빼기'를 겸손에 빗대어 나눔</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>대항해 시대처럼 우리는 하나님이라는 지도를 평생 그려가는 거예요. 고난이라는 낯선 항로를 지날수록 하나님과 나에 대한 시야가 점점 넓어지죠.</p><figcaption>진행자가 영생을 '신적 생명', 신앙을 미지의 항해에 비유</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>그럼 예수님이 좋은 교사이긴 하죠? — 좋은 교사는 아니에요. 자기가 신이라 하는데 좋은 교사일 수는 없죠.</p><figcaption>예수의 정체를 두고 참석자와 진행자가 주고받은 대목</figcaption></figure></div></section>
