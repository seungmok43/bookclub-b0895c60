<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-11-21 (금요 저녁)</span><span>📖 5회 · 3부 「그리스도인의 행동」 전반</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>사랑도 용서도 결혼도 감정이 아니라 의지의 선택이며, 그 진리는 머리로만이 아니라 몸에 새겨질 때 비로소 살아난다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>기독교는 배고픈 사람에게 먹을 것을 주라고 할 뿐 그 조리법을 알려주지 않습니다. 성경을 읽으라고 할 뿐 히브리어나 헬라어는 고사하고 우리말 문법도 알려주지 않습니다.</p><figcaption>사회 도덕</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리 대부분에게 자선의 가장 큰 장애물은 사치스러운 생활이나 돈 욕심보다 두려움입니다. 생활의 안정이 흔들릴지도 모른다는 두려움이 유혹이 될 때가 자주 있습니다.</p><figcaption>자선과 두려움</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>저는 하나님을 사랑하기를 배우지 않는 한 내 이웃을 내 몸과 같이 사랑할 수 없다고 생각합니다. 가장 멀리 돌아가는 길이 가장 빨리 집에 가는 길입니다.</p><figcaption>황금률</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>사랑은 느끼는 것이 아니라 하는 것이고, 용서는 감정이 아니라 의지의 선택이며, 결혼은 감정이 아니라 의지와 언약의 문제입니다.</p><figcaption>의지</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>절제는 음주에만 국한되지 않습니다. 오토바이, 카드 놀이, 넷플릭스, 심지어 탐독까지도 사랑을 실천하지 않으면 무절제의 영역일 수 있습니다.</p><figcaption>절제</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>가르쳐야 할 때가 아니라 기억시켜야 할 때가 많습니다.</p><figcaption>기억</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>결혼 초반에 '결혼은 노력이다'라는 말이 도무지 와닿지 않았어요. 그런데 감정에 이끌려 사는 게 아니라 감정이 어그러질 때 그것을 노력으로 전환시켜야 하는 것이 결혼이라는 걸 이제야 알겠더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>가장 큰 죄악이 교만이라는 대목에서 제 자신을 바라보니 교만함이 보였어요. 하나님이 저를 곁에 두시려고 많이 낮추기도 하셨구나 싶었습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>어떤 일을 겪고 나서 제가 그분을 판단하는 자리에 섰나 봐요. 무거운 마음으로 묵상하는데 하나님이 '너의 약자는 누구냐'고 물으셨고, 딱 제 아이가 떠올랐어요. 정말 하나님의 자녀인데 제가 이례적으로 화를 냈던 걸 회개했습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>아이가 성경 암송을 준비하는데 저도 모르게 닦달을 하게 됐어요. 그 불안을 파고들어 보니, 결국 '내 아이가 못하면 쪽팔리면 어떡하지'라는 제 욕망이 밑에 있더라고요. 그걸 자각하는 순간 시선이 틀렸다는 걸 알았고 마음이 편안해졌습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>후원 아동을 도우면서 처음엔 제가 일방적으로 돕는다고 생각했어요. 그런데 가난한 사람이 있기에 제가 부에 얽매이지 않고 흘려보낼 수 있는 거더라고요. 내가 돕는 게 아니라 이 아이가 제 영혼을 돕고 있었습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>예술과 학문이 기독교를 대신 차지하는 게 아니라 그 뜻에 따를 때 새로운 생명을 공급하는 에너지의 원천이 된다는 말이 와닿았어요. 배워서 남 주자, 내가 배운 이 전공으로 하나님 나라에 어떻게 기여할까를 구체적으로 생각하게 됐습니다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>모든 영성은 물질성이 있습니다. 멍하니 떠도는 게 아니라 근육이에요. 영적인 근육. 그래서 기억하게 만들어야죠. 예배도 은혜도 기도도 큐티도 다 몸에 새기는 겁니다.</p><figcaption>이승목 목사가 신앙이 습관과 몸에 새겨지는 것임을 강조하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>제일 중요한 건 이 자식은 하나님의 자식이지 내 자식이 아니라는 거예요. 그래서 하나님께 맡기고, 부모는 그저 자녀를 위해 기도해 주는 겁니다.</p><figcaption>자녀 양육을 놓고 나눈 대화 중 한 참석자의 고백</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>제가 만약 하나님이라면, 하나님 안에서 이렇게 근심 걱정을 드리는 것 자체를 오히려 좋게 보실 것 같아요. 안 믿는 제 조카들을 볼 때 드는 걱정과는 결이 다르니까요.</p><figcaption>믿음의 가정을 부러워하던 한 미혼 참석자의 시각</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>코로나 이후로 다들 알아서 신앙생활 잘하겠거니 자유롭게 뒀는데 사실은 다 쓰러졌어요. 그래서 복음의 자유와 함께 결단으로 밀어붙이는 것, 그 원 투 펀치가 둘 다 필요하더라고요.</p><figcaption>이승목 목사가 목회 방향을 나누며</figcaption></figure></div></section>
