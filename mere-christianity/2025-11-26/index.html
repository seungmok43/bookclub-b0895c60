<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-11-26 (수요 오전)</span><span>📖 6회 · 3부 「그리스도인의 행동」 통독</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>가장 큰 죄가 교만임을 깨닫는 그 자리에서, 나를 향한 시선을 내려놓을 때 비로소 복음이 주는 무한한 자유가 열린다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">7</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>겸손의 첫걸음은 자신이 교만하다는 것을 깨닫는 것입니다. 교만하지 않다고 생각하는 것이야말로 진짜 교만입니다.</p><figcaption>교만</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>교만하게 만드는 것은 남과의 비교입니다. 교만과 자만은 가장 궁극적인 악이고 온갖 악으로 이어집니다.</p><figcaption>교만</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리는 믿는 바를 지속적으로 상기할 필요가 있습니다. 가만히 내버려 두어도 정신 속에 저절로 살아남는 신념은 없습니다.</p><figcaption>믿음</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>절대 금주해야 한다는 것은 잘못된 생각입니다. 무절제한 사람은 겉으로 드러나지 않지만, 하나님은 겉모습에 속지 않고 나를 보고 계십니다.</p><figcaption>절제</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>하나님은 우리가 타고난 원재료를 가지고 무엇을 했느냐를 보고 판단하십니다. 고양이에게 병적 공포를 느끼는 사람이 꾹 참고 고양이를 집어들 때, 건강한 사람의 용감한 행동보다 더 대단하게 보실 수 있습니다.</p><figcaption>하나님의 판단</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>그런 특질이 내면에서 싹트지 못한 사람에게는 아무리 외부 조건이 좋아도 천국이 될 수 없습니다. 그들은 하나님이 주시려는 그 흔들리지 않는 행복을 행복으로 느끼지 못합니다.</p><figcaption>내면</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>교만하기 짝이 없으면서 아주 신앙적으로 행세하는 사람은 상상 속의 하나님을 섬기는 것입니다. 이론적으로는 하나님 앞에서 아무것도 아니라 인정하면서, 실제로는 헛깨비 하나님이 자신을 남들보다 낫게 여긴다고 늘 생각합니다.</p><figcaption>교만</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>이번 파트가 요즘 제 삶과 겹쳐져서 너무 버거웠어요. '당신이 이 일을 하셔야 합니다, 저는 못합니다'라고 고백하게 되는 중대한 순간까지만 우리가 노력할 수 있다는데, 저는 그 노력까지 가는 게 지금 너무 힘든 상태입니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>술 마시는 것에 죄책감을 가지고 있었는데 이 대목에서 위안을 얻었어요. 대신 골프에, 요새는 옷에 꽂혀서 소비하는 게 너무 무절제했다는 데서 크게 찔렸습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>저는 남과 비교하지 않으니 교만한 사람은 아닌가 했는데, 그렇게 생각하는 것 자체가 교만이더라고요. 겸손의 첫걸음이 교만을 깨닫는 거라는데, 저는 제가 교만한 걸 깨닫지 못하고 있었습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>엄마가 아프기 시작하면서 늘 가족 구원을 위한 기도가 컸어요. 그런데 기간이 길어지고 점점 지쳐서, 하나님 앞에 서는 게 힘들고 꺼려졌습니다. 잘 포장된 겉모습보다 제 내면을 들여다보는 게 훨씬 어려웠어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>아이가 찬양팀 섬김에 대해 하나님께 분명한 응답을 받았는데, 저는 본당 은혜의 자리를 놓치고 싶지 않아 예배를 제가 선별하고 구별했어요. 하나님이 찬양 예배를 기뻐 받으신다는데 왜 내가 정하느냐, 정말 교만했구나 회개했습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>남편이 요즘 저더러 똑똑해지라는 게 속상했는데, 여기서 게으른 사람을 하나님이 더 좋아하지 않으신다는 말을 보고 이해가 됐어요. 세상 지식이 아니라 말씀을 깊이 묵상해 분별력 있게 선택하는 똑똑함이라 생각하니 그 말이 용서가 되더라고요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>어느 시점 이후로 누가 저에게 돌을 던져도 타격감이 사라졌어요. 얼굴은 여전히 빨개지지만 제 중심은 별로 타격이 없더라고요. 나를 향한 집중을 내려놓는 순간 오는 무한한 자유를 이 시대가 누리길 바랍니다.</p><figcaption>이승목 목사가 겸손과 복음이 주는 자유를 나누며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>다 불쌍해요. 돈 많아도 불쌍하고 없어도 불쌍하고, 예수님을 빼는 순간 인생이 참 비참한데 예수님이 있으면 다 뒤집어져요. 영원히 사라질 수 없는 소망이 된 인생, 그 비참함과 기쁨을 다 안고 사는 겁니다.</p><figcaption>이승목 목사가 복음의 역설을 이야기하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>결혼은 내 행복을 위해서 하는 게 아니에요. 참된 이승목이라는 사람이 아내를 통해 없던 감각이 발현되고 피어나는 것, 그게 결혼이고 예수님과의 만남의 신비입니다.</p><figcaption>이승목 목사가 결혼과 복음을 연결하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>아이가 '엄마, 소름 돋아' 하는 거예요. 초등학교 때 섬김이 맞다면 새벽에 화장실에 가게 해달라 기도했었는데, 어젯밤 꿈에서 그때 새벽에 화장실 가던 자기 모습을 봤다는 거예요.</p><figcaption>자녀가 받은 응답을 나누던 한 참석자의 이야기</figcaption></figure></div></section>
