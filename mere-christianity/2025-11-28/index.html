<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-11-28 (금요 저녁)</span><span>📖 7회 · 3부 「성·결혼·용서·교만·사랑」</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>사랑도 절제도 공감도 결국 감정이 아니라 의지의 선택이며, T도 F도 저 홀로는 소망이 없고 오직 주님 안에서 서로를 보완하며 함께 거듭난다.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>사랑을 느끼지 않게 됐다는 것이 사랑하지 않는다는 건 아니다. 설레임이 없다고 해서 사랑이 없는 게 아니다.</p><figcaption>두 번째 사랑</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>성에 대해 꽤 길게 얘기했음에도 여기에 기독교 도덕의 중심이 있는 것은 아니다. 육체의 죄는 악하지만 다른 죄에 비하면 가장 미미하다.</p><figcaption>순결</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>사실을 그대로 전달했음에도 도리어 상황을 악화시킨다. 사실 그대로를 던지는 것이 오히려 더 더럽고 치하게 만든다.</p><figcaption>진실과 사랑</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>덮개로 가린 접시를 무대에 들고 나와 사람들이 볼 수 있도록 베이컨 한 조각을 보여주는 쇼에 관객이 몰려든다면, 그 사회는 식욕이 망가진 사회다.</p><figcaption>탐식</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>교만하려면 전제 조건이 딱 하나 있다. 세상에 나 말고 다른 누군가가 있어야 한다. 나밖에 없으면 교만할 수가 없다.</p><figcaption>교만</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>T는 F에게 안정감을 선물로 줄 수 있지만, 그냥 주면 안 되고 포장지에 싸서 줘야 한다. 안정감도 포장지에 안 싸서 주면 폭력적일 수 있다.</p><figcaption>T와 F</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>요새 남편과 다투는 일이 많아졌지만, 우리가 주의 은혜 아래서 단단해지는 것은 그냥 말씀의 테두리밖에 없는 것 같아요. 아침마다 서로 큐티를 보내고 저녁에 나누다 보니 그게 우리를 단단하게 하는 힘이 됩니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>감정은 시험의 서류 전형 같은 거예요. 최소한 그건 통과해야 하지만, 그다음부터는 인내든 절제든 온유든 성품의 열매를 그냥 선택하는 겁니다. 결혼 서약을 매년 떠올리며 그걸 맨날 선택하는 거죠.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>저는 1도 공감이 안 되는데, 공감되는 척하는 제 자신이 또 싫어요. 그게 참 괴로운 거죠.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>제 F 기질 때문에 하나님의 뜻을 못 이루겠다는 생각이 들었어요. 그런데 반대로, F는 마음이 넓어서 다 품고 다 이해할 수 있는 게 달란트더라고요. 다만 그 감정이 널뛰면 리더로서 앞으로 나아가지 못하게 붙잡기도 하죠.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>제 돈 내서 상담을 받았어요. 공감을 못하겠다고 하니, 의지를 다해 끄덕끄덕 행동으로라도 보이라고, 그렇게 하지 않으면 사회성 떨어져 보인다고 하시더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>스트레스를 왜 먹는 걸로 풀지, 커피 한 잔이 삶의 낙이지 하니 우울해지더라고요. 지금 먹는 것이 우상이 안 되고 이 식욕도 제대로 회복되게 해달라는 기도를 하게 됩니다. 먹방이 유행하는 것도 우리 식욕 본능이 망가진 거구나 싶었어요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>우리 T도 소망이 없고 F도 소망이 없어요. 오직 주만. 하나님은 F이면서 T이시고, 우리는 서로 보완하듯 함께 지어져 가는 거죠.</p><figcaption>이승목 목사 — T도 거듭나야 하고 F도 거듭나야 한다</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>신학 시작할 때 담당 목사님께 '저는 소시오패스인가 그런 생각이 든다'고 이실직고했어요. 그분이 '너는 소시오패스가 아니다, 잘한다'고 딱 정리해 주시더라고요.</p><figcaption>이승목 목사 — 목회하며 없던 공감 감각이 되살아남</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>자유의지로 준 용서라면 저는 절대 용서 못할 것 같아서 영화 밀양의 그 여자가 생각났어요. 그런데 하나님이 이끄시는 용서는 이렇게 작은 데서 시작되는구나 싶었어요.</p><figcaption>한 참석자 — 용서와 자유의지</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>뇌과학에서는 T가 인지적 공감, F가 감정적 공감이 발달한 거라고 해요. 하나님이 각 지체에게 다른 기능을 주신 것처럼, 좋고 나쁨이 아니라 둘 다 필요한 거죠.</p><figcaption>한 참석자 — 두 종류의 공감</figcaption></figure></div></section>
