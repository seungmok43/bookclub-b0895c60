<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-12-03 (수요 오전)</span><span>📖 8회 · 4부 「인격을 넘어서」</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>신학은 감정이 아니라 지도이며, 시간을 초월한 삼위일체 하나님은 어제도 오늘도 내일도 '지금'으로 이 자리에서 우리를 작은 그리스도로 빚어가신다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">7</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>3차원 정육면체는 정육면체이면서 동시에 정사각형 여섯 개다. 삼위일체 하나님은 우리가 아직 이해할 수 없는 고차원적 연합으로 존재하신다.</p><figcaption>삼위일체</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>하나님께는 언제나 현재만 있다. 그래서 어제도 오늘도 내일도 하나님께는 지금이다. 당신이 행동하는 순간 하나님께는 이미 지금이 된다.</p><figcaption>시간 초월</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>하나님은 사랑이시라는 그 표현 안에 두 가지 이상의 인격이 있다. 사랑은 혼자 할 수 없고, 창조 이전에 이미 서로 사랑하시는 활동이 있었다.</p><figcaption>사랑과 삼위일체</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>해변을 거니는 데 만족한다면 지도보다 직접 바다를 보는 편이 재미있겠지만, 대서양을 건너 미국에 가고 싶다면 지도를 보는 편이 훨씬 유용하다.</p><figcaption>신학은 지도</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>막연한 종교나 꽃이나 음악에서 하나님의 존재를 느끼는 것만으로는 영원한 생명을 얻을 수 없다. 종교는 흥분만 있을 뿐 결과가 없다.</p><figcaption>감정 너머</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리는 창조된 존재이고 그리스도는 낳으신 존재다. 창조된 존재에서 태어난 존재로, 생물학적 생명에서 시간을 초월한 영적 생명으로 바뀌는 것, 그것이 구원을 내 것으로 삼는 것이다.</p><figcaption>창조와 낳음</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>고집 센 양철 병정에 생명을 불어넣어 살아있는 사람으로 만든다면 얼마나 괴기할까. 우리가 믿지 않는 이에게 생명을 전하는 것도 그렇게 살을 붙이는 일이다.</p><figcaption>생명</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>누수가 터지기 전날 아침, 아이와 싸우고 대성통곡하며 인생을 사는 게 벌인가 생각했어요. 그런데 하나님이 원하시는 건 '네 하던 자리를 지켜라, 그러다 보면 내가 널 붙들고 있다'는 것 같아서, 힘들어도 이 자리를 지키려 합니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>하나님처럼 원수를 사랑하라는 그 사랑이 너무 어렵게 다가와요. 내가 원수의 발을 씻겨줄 수 있나, 같이 책상 머리에 앉아 있기도 힘들 것 같은데. 평생 그렇게 할 수 있을까 싶어 참 힘들었어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>예수님의 생명이 백만 명에게 백만 분의 일씩 나뉜다고 생각한 적이 있었어요. 그런데 햇빛이 나에게 백만 분의 일만큼만 비추지 않듯, 그 온전한 생명이 내가 유일한 인간인 양 나를 위해 오셨더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>늘 부정적인 것을 막아달라고만 기도했어요. '중독에 빠지지 않게, 나쁜 것을 막아주시고' 하는 식으로요. 그런데 좋은 것을 보고 좋은 것으로 기도해야 한다는 걸 깨닫고 그렇게 하지 않으려 합니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>저는 하나님을 늘 제 감정으로 판단하고 대입했어요. 예배에서 은혜받았다 느꼈다가 주차장에서 한 번 싸우면 은혜가 깎였다고 생각하는 식으로요. 신학이라는 지도가 넓어져야 그 소용돌이에서 벗어날 수 있더라고요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>아이가 안 믿는 친구에게 삼위일체를 어떻게 설명하냐고 물어서, '남편의 아내, 아빠의 딸' 식으로 하다 막혔어요. 그런데 이 책의 차원 비유로 풀리니 '아, 하나님과 나의 관계는 차원을 넘어선 관계구나' 싶었어요.</p><figcaption>아이의 질문에서 시작된 삼위일체 나눔</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>하나님이 아담이 타락할 줄 아셨을까요, 모르셨을까요? 우리 교단도 두 입장을 다 가지고 있고, 답을 명쾌하게 '모른다'로 내려놓습니다. 예수님도 기어다니셨듯, 하나님이 자기를 제한하심을 그렇게 표현한 것 같아요.</p><figcaption>이승목 목사 — CS 루이스가 '행동하기 전까지 모르신다'고 쓴 대목 해설</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이승목이라는 지도가 있었는데 여기 한 자매님이라는 지도가 또 올라온 거죠. 그게 쌓일수록 풍성해집니다. 심지어 꼴 보기 싫은 사람의 지도일 수도 있지만, 그를 통해 없던 걸 보게 되거든요.</p><figcaption>이승목 목사 — 공동체가 서로에게 지도가 된다</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>타 교회 리더가 우리 사랑방에 와서, 은혜롭게 다 마치고 나가면서 '너희는 다 부자고 어려운 일 한 번도 없었으니 전쟁 같은 현실에서 기도하는 것 같지 않다'고 한마디 하는데 너무 충격이었어요.</p><figcaption>한 참석자 — 자극적 기도와 기도자의 진정성</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>똑같이 기도해도 기도자가 중요한 거예요. 우리 교회는 자극적인 대적 기도 문화도 있고 CS 루이스식 긍정 기도도 있는데, 한쪽으로 쏠리지 않도록 균형을 잡아 가는 과정이죠.</p><figcaption>이승목 목사 — 부정을 막는 기도와 좋은 것을 구하는 기도의 균형</figcaption></figure></div></section>
