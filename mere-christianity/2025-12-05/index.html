<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-12-05 (금요 저녁)</span><span>📖 9회 · 3부 후반 「소망·믿음」</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>소망은 아직 오지 않은 천국을 기다릴 줄 아는 힘이고, 믿음과 사랑은 요동치는 감정이 아니라 하나님을 향한 의지와 충성이라는 것.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>제 믿음은 이성에 근거해 있습니다. 정작 제 믿음을 무너뜨리는 것은 저의 상상력과 감정입니다. 믿음과 이성이 한 편이 되고, 감정과 상상력이 다른 편이 되어 싸움을 벌이는 거죠.</p><figcaption>믿음과 이성</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>믿음은 감정이 아니라 충성이고, 사랑도 감정이 아니라 의지입니다. 순종하고, 맡기고, 따르는 것이죠.</p><figcaption>믿음·의지</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>모든 악덕의 뿌리는 교만입니다. 분노조차도 결국 내가 모든 것을 아는 최종 심판자의 자리에 서 있기 때문에 터져 나오는 것이죠.</p><figcaption>교만</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>교만한 사람을 못 견디는 사람은 대개 교만한 사람이다.</p><figcaption>교만의 투영</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>세상은 우리가 바라는 것을 바로바로 주겠다고 약속하지만, 결코 그 약속을 지키지 못합니다.</p><figcaption>헛된 소망</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>천국을 지향하면 세상은 덤으로 얻을 것입니다.</p><figcaption>소망의 방향</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>한 주간 억울한 갈등으로 마음이 부글부글 끓었는데, 마침 들었던 설교가 부딪히며 소화가 안 됐어요. 그러다 '심판은 내가 할 테니 너는 손에 피 묻히지 말고 그냥 섬기고 사랑하기만 해라' 하는 한마디에 마음이 확 수그러졌습니다. 그 여자를 이겨서 대체 무엇 하나 싶어지더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>신앙생활을 할수록 내 안에 사랑이 없구나를 가장 많이 경험해요. 유독 포용이 안 되는, 사랑하기 힘든 유형의 사람이 저에게는 분명히 있습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>위선적으로 보이는 사람을 속으로 비판하다가, 그걸 위선이라 판단하는 제 안에도 똑같은 교만이 있다는 걸 봤어요. 결국 남을 심판하면서 정작 저 자신은 사랑하지 못하고 있더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>저는 소망이 없다고 여기며 사는 2번 유형 같아요. 여행도 즐거움도 시들해지고, 덕질하는 사람을 한심하게 내려다봤던 그 오만한 마음이 아직도 한켠에 남아 있는 것 같습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>자기가 하나님인 것처럼 '내가 옳고 네가 틀렸다'며 심판자 자리에 서는 사람을 보면 그렇게 꼴 보기가 싫어요. 다윗은 사울을 죽일 수 있었는데도 심판의 칼자루를 하나님께 맡겼잖아요. 그 모습이 늘 떠오릅니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>운전할 때나, 자기 객관화가 안 되면서 가르치려 드는 사람을 만나면 분노가 치밀어요. 사랑할 수 없는 사람이 제게도 분명히 있다는 걸 인정하게 됩니다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>재미나이가 그 묵상 시간을 줄여줘 버리는 거예요. 이성은 복음의 씨앗을 수납하는 그릇인데, 그 사고하는 것 자체를 본능적으로 기피하기 시작하면 나중엔 구원마저 컴퓨터의 지배 아래 종속될 수 있죠.</p><figcaption>AI 시대에 묵상과 이성의 자리를 걱정하는 진행자(이승목 목사)의 우려</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>저는 오히려 반대예요. 다윗이 그렇게 부글부글 끓으면서도 참았기 때문에 그 자손으로 예수 그리스도의 축복이 온 거지, 스스로 심판의 자리에 섰으면 그렇게 안 됐을 것 같아요. — 다윗이 사울을 죽이지 않은 건 겸손한 포지션이었기 때문이고, 밧세바 앞에서 무너진 건 교만이 극에 달할 수 있는 왕의 자리였기 때문이죠.</p><figcaption>절제와 교만을 놓고 다윗과 사울을 다시 읽다</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>수용돼 본 경험이 없는 아이들이 많아요. 얘기를 하게 하고 몇 번 끄덕이며 공감만 해줘도 우는 아이들을 여러 번 봤습니다.</p><figcaption>경청과 수용의 귀함 — 이 시대에 듣는 귀가 얼마나 드문지</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>책은 C.S. 루이스를 읽지만 사실 우리는 서로를 독서하는 거죠. 그 사람이 소화해낸 루이스를 그 사람의 입술을 통해 다시 읽어가는 겁니다.</p><figcaption>함께 읽는다는 것의 의미</figcaption></figure></div></section>
