<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-12-24 (수요 오전)</span><span>📖 11회 · 4부 완독 「가장합시다~새로운 사람들」</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>온전함은 더 나은 사람이 되는 개선이 아니라 나를 온전히 내어드려 그리스도로 변형되는 일 — 그리고 이미 사랑에 빠진 이에게 그 길은 결코 어렵지 않았다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">7</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>세 사람이 되는 일은 단순한 개선이 아니라 변형임을 강조하기 위해서였습니다.</p><figcaption>개선이 아니라 변형</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>자신을 포기하십시오. 그러면 진정한 자아를 발견할 것입니다. 생명을 버리십시오. 그러면 생명을 얻을 것입니다. 죽음을 받아들이십시오.</p><figcaption>자기 포기</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>너의 시간이나 돈을 원하지 않는다. 나는 너를 원한다. 자연적인 자아를 괴롭히러 온 것이 아니라 죽이러 왔다.</p><figcaption>전부를 드림</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>매일 아침 가장 먼저 해야 할 일은, 눈을 뜨는 순간 짐승처럼 달려드는 그날의 모든 소원과 희망을 뒤로 밀어내고 그 조용한 목소리에 귀 기울이는 것입니다.</p><figcaption>매일 아침의 싸움</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>너희도 온전하라 하신 그 말씀은, 온전히 치료받을 마음을 먹으라는 것입니다.</p><figcaption>온전함</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리에게 일어나는 일, 그 모든 일을 실제로 하시는 분은 하나님이십니다. 우리가 하는 일이란 기껏해야 그 일이 일어나도록 허용하는 것뿐입니다.</p><figcaption>허용하는 자</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>두 그리스도인이 함께 그리스도를 따를 때 기독교는 두 배가 아니라 열여섯 배로 커진다.</p><figcaption>함께 걷는 힘</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>저는 늘 적당히 편하게 신앙 지키며 살다가 하나님 나라 가고 싶었어요. 이런 고난까지 겪어야 하나 매번 생각했는데, 단추가 처음부터 잘못 끼워져 자꾸 부대낀 거였구나 싶었어요. 지은 목적 자체가 다른 거였죠.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>내가 쥐고 있는 게 내 게 되는 게 아니라, 내려놓고 포기한 것만 비로소 내 것이 된다는 말이 맞더라고요. 아는 지식과 실제 행동이 부딪히는 이 모든 과정에 늘 서 있는 것 같아요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나를 만드신 목적이 뭘까, 왜 만드셨을까 계속 궁금했어요. 드려야 한다는 건 알겠는데 어떻게 드리는지, 나 자신을 포기하는 방법을 모르겠어서 누가 좀 알려줬으면 했어요. 다음 책에서라도 답을 주시길 기도했어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나는 겉으로는 하나님의 영광을 위한다고 하면서 속으로는 인정받고 싶은 마음도 있었던 것 같아요. 그런데 가장하는 삶이 좋은 방향의 과정이 될 수 있다는 걸 보며 한편으로 위로가 됐어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>누군가는 제게 가식적이라고, 힘들게 산다고 했어요. 그 말에 가면을 벗으려 애썼는데 잘 안 되더라고요. 그런데 그리스도인으로 분장하며 아들인 것처럼 살아가다 보면 어느 순간 아빠, 아빠 하며 나아가는 게 잘못된 방향이 아니구나 깨달으니 마음이 너무 편해졌어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>자연적으로 내게 있는 호감 주는 성향조차 하나님께로부터 왔음을 인정하고, 그 작은 돌아섬과 회개를 하나님이 기뻐하신다는 대목이 참 와닿았어요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>하나님은 우리가 없어도 잘 하십니다. 우리를 만드신 건 뭘 해보고 싶어서가 아니라, 성부·성자·성령의 사랑이 흘러넘쳐 만드신 거예요. 우리의 첫 번째 목적은 하나님을 영원히 즐거워하며 기뻐하는 것입니다.</p><figcaption>'왜 나를 만드셨을까'라는 참석자의 물음에 이승목 목사가 답하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>율법 지키기가 왜 이리 힘드냐고 하나님께 따질 때 루이스가 기막힌 말을 했죠. 사랑에 빠진 이들에게는 쉽다. 아내가 다섯 가지를 말해주면 사랑에 빠진 사람은 기뻐서 다 해요. 안 빠진 사람은 내가 왜 이걸 해야 하냐 하고요.</p><figcaption>이승목 목사가 '드리는 방법을 모르겠다'는 나눔에 응답하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>가톨릭은 이걸 하면 몇 번, 저걸 하면 몇 번 하며 답지처럼 만들어 놓지만, 우리는 그렇지 않죠. 아무것도 안 해도 주님이 기뻐하시는 하루를 살 수 있어요. 이미 그 마음이 있다는 것 자체가 사실은 완전히 시작됐다는 뜻이에요.</p><figcaption>이승목 목사가 개신교와 가톨릭의 '단계' 차이를 설명하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>하나님이 예수님께 우리처럼 가장해서 사람으로 한번 살아봐라 하셨다고 생각하니, 갑자기 입장이 바뀌며 확 와닿더라고요.</p><figcaption>'가장합시다'를 성육신의 관점으로 뒤집어 읽은 한 참석자의 나눔</figcaption></figure></div></section>
