<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-12-24 (수요 오전)</span><span>📖 완독 · 인격을 넘어서</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>인격을 넘어서 — 개선이 아니라 변형이고, 드린 것만 내 것이 된다. 방법을 몰라 헤매는 그 물음 자체가 이미 사랑이 시작됐다는 증거다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">7</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>세 사람이 되는 일은 단순한 개선이 아니라 변형이다. 핸드폰을 업그레이드하듯 고치는 게 아니라, 아예 다른 존재로 바뀌는 것이다.</p><figcaption>변형</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>너의 시간이나 돈을 원하지 않는다. 나는 너를 원한다. 자연적인 자아를 괴롭히러 온 것이 아니라 죽이러 왔다.</p><figcaption>전부를 드림</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>자신을 포기하십시오. 그러면 진정한 자아를 발견할 것입니다. 생명을 버리십시오. 그러면 생명을 얻을 것입니다.</p><figcaption>자기포기</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>내가 움켜쥔 것은 잃고, 하나님께 드린 것만 비로소 내 것이 된다. 나의 좋은 성품조차 그분의 선물임을 인정하고 바칠 때 그것이 내 것이 되기 시작한다.</p><figcaption>드림</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>많이 받은 자에게 많이 요구하신다. 하나님이 주신 선물을 자기 장점으로 착각하고 호감 주는 사람이라는 데 만족한다면, 당신은 여전히 반역자의 자리에 있다.</p><figcaption>책임</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>온전하라는 것은 온전히 치료받을 마음을 먹으라는 것이다. 조금 나아지라가 아니라 완벽하게 고쳐지라는 명령이다.</p><figcaption>온전함</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>매일 아침 눈을 뜨는 순간, 그날의 온갖 소원과 희망이 짐승처럼 달려든다. 가장 먼저 할 일은 그것들을 옆으로 밀어내고 그분의 음성이 들어오게 하는 것이다.</p><figcaption>매일 아침의 싸움</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>솔직히 저는 그렇게 크게 멋지게 살고 싶지도 않았어요. 적당히 신앙 지키며 살다 천국 가면 되지, 이 고난까지 겪어야 하나 싶었죠. 그런데 이 단추가 처음부터 잘못 끼워져서 내가 자꾸 부대꼈구나, 지어진 목적이 다른 거였구나 처음 깨달았어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나를 만드신 목적이 뭘까, 드려야 하는 건 알겠는데 어떻게 드리는지 방법을 모르겠어요. 자기를 포기하라는데 그 방법을 누가 좀 알려줬으면. 온통 궁금한 것 투성이였어요.</p><figcaption>— 다른 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>죽인다 죽인다 하지만 무의식에선 늘 하나님보다 내가 먼저가 돼요. 그럼 나는 안 되는 건가, 내 자아를 정말 죽일 수는 있는 건가 계속 고민이 됐어요.</p><figcaption>— 다른 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>부모로서 아이에게 좋은 걸 다 채워주고 싶었는데, 많이 받은 만큼 하나님이 그만큼 책임을 물으시는 거더라고요. 모태신앙으로 잘 크는 게 마냥 행복할 일만은 아니겠구나, 오히려 좀 무섭다는 생각이 들었어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>내 믿음과 감정을 내 거라고 착각하고 남을 정죄했어요. 사실 다 하나님이 이 공동체를 통해 얻게 해주신 건데. 그게 교만이었구나, 이제 그것도 내려놔야겠다 싶었어요.</p><figcaption>— 다른 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>누군가 제 노력을 가식적이라 했어요. 그런데 그리스도인으로 분장하며 사는 삶이 괜찮은 거였구나 하니 마음이 편해졌어요. 가면을 쓰고도 아빠 아빠 부르다 보면 진짜 아들이 되어가는 거였어요.</p><figcaption>— 다른 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>하나님은 우리 없어도 잘 하십니다. 그런데도 성부·성자·성령의 풍성한 사랑이 흘러넘쳐 우리를 지으셨어요. 우리의 첫 목적은 그분을 영원히 즐거워하는 겁니다.</p><figcaption>'왜 나를 만드셨을까'라는 물음에</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>사랑에 빠진 이에게는 쉽다. 안 빠진 사람은 '내가 왜 이걸 해야 돼?' 합니다. 방법을 몰라 헤매는 그 물음 자체가, 이미 사랑이 시작됐다는 증거예요.</p><figcaption>'드리는 방법을 모르겠다'는 고백에</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>하나님은 당신께 딱 맞는 귤 하나를 주신 거예요. 옆 사람은 왜 티라미수를 받나 비교하지만, 맡겨진 걸 신실하게 하면 주님이 심판대에서 공의로 판단하십니다.</p><figcaption>'책임감'을 자유로 뒤집는 대목</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>세상은 잘하라고 하지만, 잘하진 못해도 자라고 있잖아요. 심긴 생명의 씨앗은 영원 세세토록 자랍니다. 우리 아이들도 주님 안에서 계속 자라가고 있어요.</p><figcaption>완독을 매듭짓는 씨앗 비유</figcaption></figure></div></section>
