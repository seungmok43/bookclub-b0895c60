<h1>순전한 기독교</h1>
<div class="meta"><span>🗓 2025-12-26 (금요 저녁)</span><span>📖 12회 · 완독 · 전체 총평</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>복음은 더 잘 뛰는 말을 만드는 게 아니라 날개 없는 우리에게 날개를 다는 일 — 그 변형은 비판하는 자가 아니라 끝까지 끌어안는 공동체를 통해 자란다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>그리스도께서는 옛사람을 좀 더 낫게 개선시키려 오신 게 아니라 완전히 새로운 종류의 인간을 만들려 오셨습니다. 말에게 더 높이 뛰는 법을 가르치는 게 아니라, 그 말을 아예 날개 달린 동물로 바꾸시는 것입니다.</p><figcaption>변형</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>이제 막 날개가 돋기 시작한 터라, 어깨가 부어오르는 바람에 — 그리고 아무도 그것이 장차 날개가 되리라는 것을 알아보지 못하는 바람에 — 모양새만 더 사나워 보이고 힘들 수 있습니다.</p><figcaption>성장의 진통</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>겸손한 말의 대가는 목숨이요, 겸손한 삶의 대가는 말이다.</p><figcaption>겸손의 값</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>문제는 방향입니다. 끊임없이 주님과 멀어지고 있으면서도 뉘우침조차 없다면, 그것은 다시 돌아보아야 할 일입니다.</p><figcaption>방향</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>저는 완벽주의가 아닌데 완벽주의를 지향하다 보니 온갖 잡음이 나와요. 하나님은 저기 계신데 나는 여기 있으니 그 갭이 있겠구나, 자꾸 여기까지만 하자며 하향하는 내 마음을 보게 됐어요. 이제는 하나님 입장에서, 또 나 스스로에게도 조금은 너그럽게 보는 연습이 필요하겠다 싶었어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>진리가 자유롭게 한다는데 저는 진리가 자유롭지 않고 오히려 구속되는 것 같고, 이 작은 것도 못 넘는구나 좌절할 때가 많아요. 그런데 아직 날개가 돋는 중이라 모양새만 사나워 보이는 단계라는 말에, 내가 그 단계였나 싶었어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>쏟아지는 하나님의 사랑을 충분히 느끼면 이런 결핍과 모난 모습이 안 보일 텐데, 여전히 누군가를 품지 못하는 걸 보면 아직 그 사랑을 못 느껴 하나님의 품격이 안 드러나는구나 싶어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>예전엔 엇나가는 사람이나 범죄자를 너무 혐오했는데, 어떤 환경이 저 사람을 저렇게 만들었을까, 내가 똑같은 환경이면 안 그랬을까 생각하게 됐어요. 하나님이 저를 겸손하게 하시고 함부로 판단하지 않게 하신 것 같아요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>복음 없이도 거의 100점짜리 인성을 가진 분들이 있잖아요. 그런데 복음은 10점짜리 인간을 90점까지 끌어올려요. 비포와 애프터가 달라지는 그 힘이 복음에 있지 않나 싶어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>예수님을 전혀 모르는데 도덕적으로 정말 훌륭한 분을 만나면, 나는 신앙생활 한다면서 이분만 못하다는 느낌을 받을 때가 있어요. 그러다 내린 결론은, 나는 가는 과정이고 이 새 창조는 내가 하는 게 아니라 주님이 하시는 일이라는 거였어요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>저는 날개 단 적이 없습니다. 없다고 생각했는데 살면서 날아오르면 다행이지만, 날개가 있는 줄 알고 뛰었다가 없으면 그게 제일 위험해요. 목회자의 기쁨은 내가 날개 다는 게 아니라, 진짜 날개 달린 분들을 만날 확률이 높다는 거예요.</p><figcaption>'교육자들은 날개를 달지 않았냐'는 물음에 이승목 목사가 답하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이 세상을 비판하는 자가 필요한 게 아니에요. 그건 누구나 다 할 수 있죠. 이 시대에 필요한 건 피스메이커예요. 100명이 있으면 칼자루 들이댈 100가지가 다 보이지만, 그걸 포용하고 조화를 이루는 사람이 필요한 거죠.</p><figcaption>교회를 향한 비판만 쌓아가는 지인 이야기 끝에 한 참석자가</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>교만이 가장 큰 죄라잖아요. 들어갈 공간이 없으니까요. 곤조도 깊이 들어가면 결국 고집이고 교만이에요. 나이 들수록 다른 사람 생각을 수용하는 폭이 넓어지면 방향은 제대로 가고 있는 거죠.</p><figcaption>이견을 배척당해 마음의 벽을 쌓은 지인을 두고 나눈 대화</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>다윗에게 사울의 갑옷을 입힌 격이면 곤란하죠. 방향은 탕자를 다 끌어안는 게 맞지만, 우리 몸에 그 근육이 있는지 없는지 봐야 알아요. 잘못 들면 근육이 찢겨 너덜너덜해지니까요. 결국 다 같이 근육을 키우는 게 목적이에요.</p><figcaption>문제아·연약한 지체를 교회가 어디까지 받아야 하나를 두고 이승목 목사가</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>저도 개떡 같은데 하나님이 끌어안아 주셔서 여기 있는 거잖아요. 우리도 주님처럼 끌어안는 게 마지막 종착지예요. 다만 그 타이밍을 결정하고 책임지는 건 리더의 몫이죠.</p><figcaption>이민자·난민, 죄인을 품는 공동체의 부담을 나누며 이승목 목사가</figcaption></figure></div></section>
