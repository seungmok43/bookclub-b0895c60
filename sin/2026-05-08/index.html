<h1>팀 켈러, 죄를 말하다</h1>
<div class="meta"><span>🗓 2026-05-08 (금요 저녁)</span><span>📖 1회 · 죄의 해부학 도입 — 죄론·우상·교회 현장</span><span>✍ 팀 켈러</span></div>
<div class="lead"><span class="qm">“</span>'도대체 어디까지를 죄로 봐야 하나'라는 물음 앞에서, 통제하려는 마음의 찝찝함마저 과녁을 빗나간 자리임을 함께 더듬어간 첫 밤.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>죄론은 결국 구원론이다. 나는 썩어 빠지고 소망이 없기에, 그래서 예수님이 필요하다.</p><figcaption>죄와 구원</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리 마음은 우상 공장이다. 이 우상을 하나님이 주시는 기쁨으로 극복해야 한다.</p><figcaption>우상</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>죄의 해부학의 가장 근본은 회개다. 날마다 자기 전에 죄 문제를 해결하지 않으면 복리처럼 누적되어 어려워진다.</p><figcaption>회개</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>죄는 원어로 과녁을 빗나가는 것이다. 초점이 하나님께 딱 맞으면 평안하고, 빗나가 있으니 불편함이 든다.</p><figcaption>죄의 정의</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>죄는 누룩이다, 죄는 불신이다, 죄는 나병이다 — 이름을 붙이면 다 죄가 된다.</p><figcaption>죄의 여러 얼굴</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>빵을 아이에게만 놔두라 하거나, 아이가 내 스케줄을 안 따르면 소리를 지르고 나서 드는 찝찝함이 다 죄와 관련된 것 같다. 하나님은 내 자유의지를 십몇 년 인내로 존중해 주셨는데, 나는 안 되면 힘으로 윽박지른다. 그런데 2주 된 막내를 보는 기쁨에 다른 게 다 용서되듯이, 복음이 주는 기쁨으로 우상을 극복하는 것이 아닌가 싶다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>내 안의 불편함은 두고 남의 재는 잘 본다. 잣대를 들이대고 싶은 걸 참는다. '저런 말을 내가 듣는 건 내 죄 때문이구나' 하면서도 너무 자책하나 했는데, 이 책이 '자책이 아니라 네가 전진하고 성장하고 있는 것'이라고 해줘서 감사했다. 아이 셋을 낳고 내 죄를 더 많이 본다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>허리를 크게 다쳐 1년을 굽히지도 못하던 시절, 살기 위해 해부학을 공부하니 살 길이 보였다. 압통점을 눌러도 진짜 원인은 다른 데 있듯, 결국 내 안의 가장 근원적인 불편함은 하나님과 나의 관계에서 해결되지 않으면 안 된다는 걸 깨달았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나는 큰 그림을 못 보고 작은 부분만 붙드는 사람이라, 늘 왜 이런 일밖에 못하나 자책했다. 그런데 이 자리는 잘하고 못하고가 없고, 서로 다른 시각과 관점을 나누러 오는 것이라는 말에 위로를 받았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>꽃 전도에서 젊은 사람에게만 나눠주다 거부당해 기분이 나빴다. 그런데 한 청년이 '그건 너를 거부하는 게 아니라 예수님을 거부하는 것'이라고 하니, 내가 상처받은 건 나를 거부한다고 느껴서였구나 싶었다. 전도도 결국 훈련이더라.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>이승목 목사: '피스 메이커는 반드시 트러블 메이커입니다. 이 땅에 하늘의 평화를 가져오려면 반드시 불화가 생깁니다.'</p><figcaption>모든 사람에게 좋다고 평가받는 이가 좋은 목회자가 아님을 짚으며, 무언가를 바로 세우면 갈등이 따름을 나눔.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>한 참석자: '죄에서 자유할 수는… 죽어야 되는 건가요?' — 이승목 목사: '칭의로 의롭다 함을 받았고, 지금 이 분투는 현재적 성화입니다. 천국은 잘 차려입지 못하고 잘못 들어온 시상식장 같아, 누가 메이크업 해주고 제일 좋은 자리에 앉혀 주는 것과 같죠.'</p><figcaption>칭의와 성화의 구분을 시상식장 비유로 풀어 설명.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>한 참석자: '죄라고 하면 범위가 너무 넓은데, 도대체 어디까지를 죄로 봐야 하나요?'</p><figcaption>일상의 통제·섭섭함·불편함까지 죄와 연결되는지를 묻는 실질적 질문으로 나눔이 열림.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이승목 목사: '지금은 온 세대를 다 붙들어야 할 때입니다. 교회 오면 그냥 귀하게 여기고, 어른도 3040도 청년도 다 데리고 가야 하는 시대예요.'</p><figcaption>'우리한테 뭐 해주냐'는 세대 갈등을 넘어, 서로를 귀히 여기는 목양의 방향을 제시.</figcaption></figure></div></section>
