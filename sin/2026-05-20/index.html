<h1>팀 켈러, 죄를 말하다</h1>
<div class="meta"><span>🗓 2026-05-20 (수요 오전)</span><span>📖 2회 · 「죄를 말하다」 도입 — 죄는 맹수·자기기만·누룩</span><span>✍ 팀 켈러</span></div>
<div class="lead"><span class="qm">“</span>죄를 과소평가하지 않되 나 자신도 과대평가하지 않을 때, 비로소 은혜 앞에 얇아진 나를 마주한다.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>평범한 인간의 마음 한복판에 낯선 괴물이 숨어 산다. 저 깊은 퇴적층 밑에 괴수 중의 괴수가 살아 숨어 있다.</p><figcaption>죄의 실체</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>죄가 문에 엎드려 너를 원하지만, 너는 죄를 다스리라. 맹수에게 쓰는 그 표현이 우리 마음을 요리조리 움직여 자기 보호를 하게 한다.</p><figcaption>죄는 맹수</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>죄는 자기 기만이다. 초라한 실존을 가리려는 자아의 몸부림이다. 불순종은 선행으로 덮을 수 없다.</p><figcaption>자기 기만</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>죄는 누룩이다. 인생의 단맛을 미끼 삼아 파고드는 강력한 침투다. 단맛을 쫓다 어느 순간 그 단맛이 나를 억누르는 짐이 된다.</p><figcaption>누룩</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>당신이 스스로를 작게 여길 때에 하나님께서 당신을 세우셨다. 복음적 겸손은 나에 대한 관심이 사라져 비로소 상대가 보이는 것이다.</p><figcaption>겸손</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>동생이 매장에서 '누나는 아무것도 하지 마, 초심으로 돌아가라'고 했어요. 나를 드러내려 한 적 없다 생각했는데, 내가 낮아져야 다른 사람이 세워진다는 걸 그제야 배웠습니다. 자식에게 아는 걸 계속 주입하려 했던 것도 마찬가지였어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>힘든 일이 생길 때마다 '하나님 어떻게 나한테 이럴 수 있어요' 원망했는데, 남편이 '너는 기복 신앙이야'라고 한 말에 찔렸어요. '이게 왜 일어났죠'에서 '무엇을 보길 원하세요'로 시선을 옮기는 훈련을 인생 내내 해오고 있었더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>큰 모임에 다녀와 '나는 하나님 믿는데 왜 이렇게 형편없나' 주눅이 들었어요. 그런데 하나님을 중심에 모시지 않는 가인의 건성적인 태도가 바로 내 본질이었구나, 내가 내 중심에서 내려와야겠구나 싶었습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>'이거 너무 부끄러워, 그냥 없는 사실로 만들고 싶어' 하는 마음, 드러내고 하나님께 가져가고 싶지 않은 그 마음 자체가 자기 기만이더라고요. 여기서 정말 찔렸어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>맹수의 목표가 다름 아닌 나 자신인데, 나는 눈에 보이는 사건만 맹수인 줄 알았어요. 큐티하며 '오늘도 회개했어' 하고 쓱 지나가는 사이 오히려 무뎌지고, 다 해결했다고 착각하는 부분이 꽤 많았겠구나 싶어 책이 불편했습니다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">3</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>고춧가루 낀 걸 말해줄 수 있는 공동체, 죄를 공론장에 꺼내놓고 '같이 기도하자' 할 수 있는 건강한 공동체가 이미 형성돼 있는 거죠. 다만 내가 그 은혜의 깊이가 안 되는 사람에게 꺼내면 오히려 실족할 수도 있어요.</p><figcaption>죄를 꺼내놓을 수 있는 공동체를 두고 나눈 대화</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>원래 너는 가시덤불이었고, 예수님이 그 가시를 가져가시고 우리에게 꽃을 달아주신 거지. '왜 나한테 가시를 주셨습니까' 물을 게 아니라, 가시덤불인데 꽃이 달렸네 하며 그 여정을 사는 거예요.</p><figcaption>이승목 목사가 죄의 본질과 은혜를 장미 비유로 정리</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>무거워서 천국에 못 올라가요, 깃털처럼 가벼워져야 천사와 함께 올라간다 — 세상 드라마조차 '내가 얇아진다'고 말하죠. 복음을 경험하면 나에 대한 관심이 줄어 비로소 하나님이 크게 보입니다.</p><figcaption>이승목 목사가 복음이 주는 겸손을 설명</figcaption></figure></div></section>
