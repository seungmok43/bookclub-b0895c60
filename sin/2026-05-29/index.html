<h1>팀 켈러, 죄를 말하다</h1>
<div class="meta"><span>🗓 2026-05-29 (수요 오전)</span><span>📖 3회 · 「죄를 말하다」 마무리 — 회개와 대가, 다윗·밀양</span><span>✍ 팀 켈러</span></div>
<div class="lead"><span class="qm">“</span>죄를 묵상하다 죄에 갇히지 말고, 마지막에는 나를 이만큼 사랑하신 예수님을 바라볼 것.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>회개할 때 우리가 필요한 건 죄가 아니라 예수님이다. 죄를 묵상하면 죄만 묵상하다 간다. 마지막에 바라봐야 할 분은 예수님이다.</p><figcaption>회개</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>회개는 벌을 모면하기 위한 행위가 아니라 하나님께로 방향을 돌이키는 것이다.</p><figcaption>회개의 정의</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>죄를 미워하는 단계까지 가려면, 하나님이 나를 얼마나 사랑하시는지를 먼저 더 깊이 알아야 한다.</p><figcaption>성화의 단계</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>천국과 지옥, 구원과 멸망은 흑백이다. 그러나 남겨진 삶은 회색이다.</p><figcaption>회색의 삶</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>죄가 작은 것 같아도, 그 죄가 영원히 자란다고 생각해 보라. 반대로 우리 안엔 생명의 씨앗이 있어 그 빛이 영원히 자라 하나님의 형상으로 회복된다.</p><figcaption>영원한 성화</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>죄에 대해 너무 깊이 생각하니 힘들면서도, 오히려 나의 죄인 됨이 너무 선명해져 어떤 변명이나 포장지도 소용없더라고요. 그런데 회개 기도를 해도 평안이 없어요. 이게 진짜 회개가 맞나, 겉으로만 반성처럼 하고 넘어간 건 아닌가 싶어 불편했습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>합격시켜 주신 회사에서 기고만장하게 다니다 정직원이 안 됐어요. 백수가 되는 대가를 치르고 나서야, 하나님이 치신 게 아니라 내 교만이 자초한 일이었구나, 그 힘듦 속에 깨달음과 은혜를 주셨구나 알게 됐습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>벌을 모면하려고 회개한다는 생각은 나는 아니라고 여겼는데, 곰곰이 보니 제가 이틀 동안 한 게 대부분 그거였어요. 누구를 같이 흉보다가 '이러다 벌 주시나' 싶어 사과 카톡을 보내는 식이었죠.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>설교를 들으며 '저 사람이 이 말을 들었어야 되는데' 하지, 나한테는 적용을 안 시켜요. 저 사람이 먼저 회개했으면 싶고요. 죄에 대해서 유독 나한테만 너그럽게 보는 것 같습니다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">3</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>다윗은 그날로 끝났어요. 성경이니까 그를 계속 이야기해 준 거지, 우리 중에 그런 일이 있었다면 그날부로 매장됐을 겁니다. 그런데도 하나님은 마지막까지 다윗을 붙드셨죠.</p><figcaption>이승목 목사가 죄의 대가와 하나님의 사랑을 다윗으로 설명</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>팔복 중 피스메이커에는 반드시 트러블메이커라는 전제가 있어요. 땅의 평화가 아니라 하늘의 평화를 이루려면 트러블이 생깁니다. 갈등은 나쁜 게 아니라, 나쁘게 푸는 게 나쁜 겁니다.</p><figcaption>이승목 목사가 갈등을 선용하는 목회 원칙을 나눔</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>선택권이 많은 게 좋냐, 저는 좋지 않다고 봅니다. 우리가 선택하고 후폭풍은 책임지면 돼요. 선택권을 너무 많이 주면 뇌가 소진되고 아무도 책임지지 않게 됩니다.</p><figcaption>선택 과잉의 시대를 두고 나눈 대화</figcaption></figure></div></section>
