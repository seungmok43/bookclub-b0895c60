<h1>팀 켈러, 죄를 말하다</h1>
<div class="meta"><span>🗓 2026-06-17 (수요 오전)</span><span>📖 4회 · 「죄를 말하다」 후반 — 죄는 불신, 요나·나병·자기 의</span><span>✍ 팀 켈러</span></div>
<div class="lead"><span class="qm">“</span>죄는 결국 내가 어디에 뿌리를 내렸느냐의 문제, 한 번은 생명의 근원으로 옮겨 심겨져야 한다.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>죄는 불신이다. 사람의 힘에 의지하는 자는 사막의 떨기나무 같고, 여호와를 의지하는 자는 물가에 자라는 건강한 나무 같다.</p><figcaption>불신</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>그 자리에 가만히 있는다고 회복되는 것이 아니다. 우리는 생명의 가장 가까이로 이동해야 하고 뻗어 나가야 한다.</p><figcaption>뿌리내림</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>선의 얼굴로 위장한 뒤틀린 열심 — 그것이 자기 의다. 섬김도 열심도 다 내 것일 때 위험하다.</p><figcaption>자기 의</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>너를 위해 준비하신 하나님의 은혜를 볼 때에야 자기 의가 치료된다.</p><figcaption>은혜</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>까닭 없이 하나님을 경외하는 것 — 사탄은 결코 까닭 없이 하나님을 경외할 수 없다. 그 사랑의 넓이와 깊이를 안다면 우리는 까닭 없이 경외할 수 있다.</p><figcaption>욥기</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>요나의 영적 무관심이 지금 내 삶 아닌가 싶었어요. 전쟁에서 죽어가는 사람은 마음 아파하면서, 정작 내 옆에서 힘들어하는 내 아이에게는 긍휼을 잃고 '오늘도 힘들다' 하고 있더라고요. 내가 하나님 앞에서 너무 메말라 가고 있나 돌아봤습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>4~5년 전 제자반에서 '늘 공기 같은 하나님과 함께여서 회심의 터닝포인트를 못 짚겠다'고 결론 내렸었어요. 그런데 그 이후로도 여전히 불안과 염려에 요동한다면, 내 거듭남의 시점을 다시 한 번 점검해 볼 필요가 있지 않나 싶었습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>자기 의의 증상이 다 제 것이더라고요. 너무 놀랐어요. 변명을 먼저 하는 것이 자기 의를 감추기 위한 죄의 증상이라는데, 실패한 이유를 대는 아이는 실패를 계속하고 잘못을 찾는 아이는 성공한다는 말이 겹쳐 떠올랐습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>늘 나와 하나님의 관계, 가족 돌보는 일에만 집중했는데, 한 발 더 나아간 배타적인 사랑의 열망이 나에겐 부족했구나 싶었어요. 복음이 이타적이라는 말이 이제야 신선하게 다가왔습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>내 마음이 뾰족해지면 어떤 상황에서도 누군가를 찌르게 되는데, 그건 내가 받은 상처 때문에 '너는 완전한 걸작품'이라 하신 하나님의 말씀을 부정하는 거더라고요. 상처를 핑계 삼은 변명이 죄로 연결될 수 있다는 게 크게 다가왔습니다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">3</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>이주민을 사역의 대상으로 대하는 것 자체가 불편하다는 겁니다. 겸손한 마음으로, 진짜 사람 대 사람으로 마주 앉아 '우리는 같은 사람이구나'를 경험하게 해 주는 것, 그게 복음적 관계죠.</p><figcaption>이승목 목사가 친구 목회자의 환대 이야기로 나눔</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>책에 밑줄을 긋고 표시를 하는 건 애들한테 물려주려는 거예요. '우리 엄마가 이런 생각을 했더라' 하고 언젠가 발견하며 전율하는 날이 옵니다.</p><figcaption>책에 흔적을 남기는 이유를 두고 나눈 대화</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>한 번 옮겨 심긴 나무는 상해도 자생력이 있어 다시 솟아나지만, 사막에 그대로 있는 나무는 아파도 스스로 일어설 수 없어요. 그래서 결론은 한 번은 옮겨 심겨져야 한다 — 그걸 거듭남이라 하더라고요.</p><figcaption>옮겨 심긴 나무 비유로 거듭남을 나눔</figcaption></figure></div></section>
