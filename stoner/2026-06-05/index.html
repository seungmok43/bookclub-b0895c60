<h1>스토너</h1>
<div class="meta"><span>🗓 2026-06-05 (금요 저녁)</span><span>📖 1회 · 「스토너」 도입 — 부르심과 평범한 삶의 의미</span><span>✍ 존 윌리엄스 · 소설</span></div>
<div class="lead"><span class="qm">“</span>세속의 잣대로는 루저의 삶일지라도, 부르심으로 받아들인 자리에서 묵묵히 견디는 것 자체가 성공한 인생일 수 있다.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>뉴욕타임스는 이 책을 두고 '위대한 소설이 아니라 완벽한 소설이다'라고 했다.</p><figcaption>작품 평</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>세속의 잣대로 보면 루저이자 실패한 인생이지만, 그 실패해 보이는 삶 속에서도 자기가 사랑하는 것을 붙들고 묵묵히 버텨내는 것 — 그게 인생이고 그 자체로 의미가 있다.</p><figcaption>평범한 삶</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>세상은 끊임없이 영웅을 원한다. 그러나 대부분의 삶은 영웅이 아닌 채로 스스로를 견뎌내며 살아가는 것이다.</p><figcaption>무가치함과의 싸움</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>기독교에는 '쓸데없는 창조'라는 교리가 있다. 인간은 쓸모를 위해 창조되지 않았다 — 사랑이 흘러넘쳐 사랑의 대상이 늘어난 것이다.</p><figcaption>쓸데없는 창조</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>간장 종지로 받은 사람, 대접으로 받은 사람, 바다처럼 받은 사람이 있다. 분량이 다를 뿐 저마다 역할이 다르다.</p><figcaption>은혜의 분량</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>저는 일을 너무 사랑해서 관에 묻히기 전까지 이 일을 하다 죽겠다고 입버릇처럼 말했어요. 새벽 두세 시에 퇴근해도 즐거웠죠. 그런데 하나님을 만나고 그 좋아하던 일과 하나님 사이에서 큰 딜레마에 빠졌고, 결국 방향을 다음 세대 아이들 쪽으로 바꿨습니다. 옛 동료들이 TV에 나오면 배가 아프기도 하지만요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>너무 두려워 그 자리를 뛰쳐나가다 붙들려 다시 들어갔고, 그날 하나님을 인격적으로 만났어요. 만약 끝까지 도망쳤다면 그 계기가 됐을까 싶습니다. 받고 안 받고는 제 선택이었지만, 그 자리에 세우신 건 하나님이셨어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>자유의지가 뭔지 잘 모르겠고 너무 카오스적으로 느껴져요. 수학 같은 개념은 하나님 없이도 존재한다고 생각하는데, 하나님도 스스로 존재하는 분이니 결국 그런 믿음의 영역은 논리로 검증할 수 없는 것 같습니다. 그게 저한테는 좀 서운합니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>저는 하고 싶은 것보다 늘 해야 하는 것, 옳고 안정된 쪽을 선택하며 살아왔어요. 결과적으로는 좋았지만, 보상을 뒤로 미루는 게 습관으로 굳어져서 죽을 때쯤 '그때 그걸 했어야 했는데' 후회하지 않을까 하는 딜레마가 있습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>잘나가는 친구들과 비교하며 특별하지 못한 나에 대한 아쉬움이 은근히 있었어요. 그런데 비교는 기준이 상대방일 뿐이더라고요. 말씀이 기준이 되면, 부르심이 작든 크든 그 안에서 만족하는 인생이 성공한 인생이겠구나 싶었습니다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">3</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>사랑은 자유의지를 전제해요. 성부·성자·성령도 숙명론적으로 정해진 게 아니라 사랑의 관계죠. 성경이 말하는 자유의지는 논리 이전에 사랑입니다.</p><figcaption>자유의지와 창조를 두고 이승목 목사와 한 참석자가 나눈 1:1 신학 대화</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>특별한 부름이라는 질문 자체가 어떻게 보면 모순이에요. 20살 때 주님 만난 자리도 부르심이지만, 오늘 갑자기 북클럽에 온 것도 부르심입니다. 모든 순간이 부르심이죠.</p><figcaption>이승목 목사가 부르심의 정의를 정리</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>천사가 하지 말라 해서 평생 참고 살던 노인이 죽을 때 천사의 목을 조르며 '너 때문에 내 인생이 이랬다'고 하는 만화를 친구가 보내줬어요. 그때 저는 '그다음 세상이 있다'고 답장했습니다.</p><figcaption>해야 할 것과 하고 싶은 것의 선택을 두고 나눈 대화</figcaption></figure></div></section>
<footer>BooKLove · 제작 · 수영로교회 이승목 목사<div class="priv">이 페이지는 검색에 노출되지 않으며, 링크를 아는 분만 열람할 수 있습니다.</div></footer>
