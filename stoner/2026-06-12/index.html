<h1>스토너</h1>
<div class="meta"><span>🗓 2026-06-12 (금요 저녁)</span><span>📖 2회 · 「스토너」 완독·전체 총평 — 노동·쓸모·삶의 의미</span><span>✍ 존 윌리엄스 · 소설</span></div>
<div class="lead"><span class="qm">“</span>무언가를 이뤄야 쓸모 있다는 세상의 회로 앞에서, 하나님은 쓸모가 아니라 사랑이 흘러넘쳐 우리를 지으셨다는 복음이 스토너의 공허를 비춘다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>아버지가 죽었을 때 나온 그 말, 나는 즐거움이 없는 노동에 평생을 바쳤다는 것에 조금 공감이 되었다. 우리 부모 세대만 그런 건가, 나의 세대도 그런가.</p><figcaption>노동</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>사랑은 여기 목적이 아니라 과정이었다. 이 한 문장이 전체 주제인 것 같다.</p><figcaption>삶의 의미</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>가정이 화목하고 자녀들과 잘 지냈을지라도 이것을 이루지 못했다면 자기 인생은 실패한 인생이라 여긴다. 스토너에게는 학문적 정점이 곧 우상이었다.</p><figcaption>우상</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>사람은 잘 안 변한다. 어떤 자극이 가해지면 비슷한 패턴으로 반응한다. 작가가 스토너라는 캐릭터를 일관성 있게 잘 그렸다.</p><figcaption>인간 본성</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>스토너가 순응하지 않았던 경우는 위로를 받았을 때뿐이었다. 셰익스피어를 읽고 위로를 받아 문학을 전공하게 되었다.</p><figcaption>위로</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>어제까지도 책을 못 읽었다. 우선순위에서 자꾸 밀리더라. 결국 오디오북과 부부의 도움 덕분에 완독을 지었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>두 번째 읽으며 죄의 관점으로 보니 아예 다르게 읽혔다. 이 사람이 일을 우상처럼 대하며 일로 대피하고, 진정으로 사랑했다는 여자도 일 때문에 포기했더라.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>하나님을 믿고 이 책을 읽으니 스토너만이 아니라 그 부인도 자녀도 위로가 필요했던 사람으로 보였다. 안 믿었으면 그냥 스토너 중심으로만 보고 말았을 것이다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>저번 주엔 작가에게 기독교 성향이 있을 거라 기대했는데, 다 읽고 나니 그 성향은 빼고 철저히 세상적인 관점에서 쓴 글이었다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>우리는 쓸모가 없습니다. 하나님이 쓸모를 위해서 우리를 만들지 않았어요. 성부 성자 성령의 사랑이 흘러넘쳐서 만든 겁니다. 그러니 우리의 존재는 쓸모로 존재하는 게 아니라 여호와를 영원히 즐거이 기뻐하도록 지음받은 거예요.</p><figcaption>진행자(이승목 목사)가 스토너의 '내 삶은 의미가 있었나'라는 물음에 답하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>쓸모가 있느냐 물었을 때 기독교의 대답은, 쓸모가 없어도 된다는 것입니다. 우리는 쓸모 때문에 지음받지 않았으니까요.</p><figcaption>세상의 비교 회로(노동 소득)와 존재의 근거를 대비</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>스토너처럼 열심히 살아 마지막에 자신이 만족할 것을 남기는 것이 아니라, 하나님을 영원히 기뻐하고 즐거워하는 삶을 경험하게 하소서.</p><figcaption>완독 후 마무리 기도 — 소설의 물음을 복음으로 되받음</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>다 읽고 나니 스토너가 불쌍한 게 아니라 그 부인과 자녀가 불쌍하더라. 스토너는 자기 할 건 다 한 것 같다.</p><figcaption>한 참석자가 스토너 중심 서술의 관점을 뒤집으며</figcaption></figure></div></section>
