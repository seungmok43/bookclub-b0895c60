<h1>예기치 못한 기쁨</h1>
<div class="meta"><span>🗓 2026-04-10 (금요 저녁)</span><span>📖 1회 · 「예기치 못한 기쁨」 완독(마지막) — 루이스의 회심과 불가항력적 은혜</span><span>✍ C.S. 루이스</span></div>
<div class="lead"><span class="qm">“</span>싫다고 발버둥 쳐도 밀려오는 은혜 — 회심은 가장 맥 빠졌으나 가장 거부할 수 없는 기쁨이었다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>그날 밤의 회심은 온 영국을 통틀어 가장 맥 빠진, 내키지 않는 회심이었을 것이다.</p><figcaption>맥빠진 회심</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>어떻게 내가 기독교와 정반대되는 통설로 나아가지 않았는지 신기하다. 그렇게 될 만한 조건은 다 갖추고 있었던 것 같은데 말이다.</p><figcaption>신기한 은혜</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>조지 맥도날드를 통해 나의 상상력이 세례를 받았다.</p><figcaption>상상력의 세례</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>하나님이 준엄한 명령으로 발버둥 치는 나를 끌고 와, 나를 해방시키셨다.</p><figcaption>해방시키는 명령</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>생각하면 할수록 커져만 가는 존경과 경탄으로 내 마음을 채우는 두 가지가 있으니, 별이 빛나는 밤하늘이요 내 안의 도덕 법칙이다.</p><figcaption>칸트의 두 별</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>예수님을 안 믿으려 발버둥 쳤는데, 마음이 가난해지니 어느 순간 믿기 싫은 게 자꾸 믿기더라. 밀려오는 그것이 예기치 못한 기쁨이었고, 지금도 그 기억으로 살아간다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>셋째 임신 소식에 처음엔 당황했지만 결국 기쁨이 제일 컸다. 거부하는데도 그냥 너무 기쁜 것 — 처음 예수님을 만났을 때의 그 감정과 똑같더라.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>대학 시절 실존주의 교수님과 논쟁하며 늘 '그 끝이 허무하지 않냐'고 물었다. 지식을 많이 아는 사람일수록 자기 세계에 빠져 하나님 없는 삶으로 가는데, 내가 그 길로 안 간 건 극소수에게 주신 은혜였다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>고등학교 땐 하늘로 올라갈 듯한 신앙이었는데 지금 내 신앙을 보면 거할 게 별로 없다. 아는 걸 실천 못 하니 정말 좁은 길로 못 가는 건 아닐까, 두렵고 죄책감이 든다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>정보 위주의 책들만 접하다가 이런 책을 읽으며 하나님이 느끼게 하시는 게 있더라. 내 발로 걸어왔지만 결국 하나님 인도 하에 여기까지 온 것이었다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>나중에 주님 오시면 말머리 성운에서 커피 한잔하며 북클럽을 할 수도 있다 — 주님이 지으신 온 천지만물을 우리에게 주셨으니.</p><figcaption>이승목 목사가 성도가 누릴 상상력을 이야기하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이성으로 천 년을 씨름하고 천재가 해도 답 없는 뿌연 상태인데, 기독교는 하나님이 그 빛을 비춰주신 것이다.</p><figcaption>셰퍼 '이성에서의 도피'를 빌려 루이스의 회심을 설명하며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>과거적 칭의는 하나님이 옷을 입히시는 것이라 막을 수가 없다. 성화가 안 되는 걸 어려워하는 것 자체가 이미 칭의받았다는 증거일 수 있다.</p><figcaption>이승목 목사가 구원의 두려움을 나눈 참석자에게</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이미 승리한 경기를 재방송으로 보는 것 같아도, 결과가 정해졌기에 오히려 오늘 하루의 장면들을 더 깊이 만끽할 수 있다.</p><figcaption>해피엔딩을 아는 성도의 삶을 미술 감상에 비유하며</figcaption></figure></div></section>
