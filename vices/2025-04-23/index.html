<style>
:root{--ink:#232019;--sub:#6b6357;--line:#e7e1d6;--paper:#faf7f1;--gold:#a9803f;--gold-soft:#f3ead9;--card:#fffdf9;--brown:#2a2018;--teal:#2f6f6a;--teal-bg:#e9f2f0;--dia:#8a6d1f;--dia-bg:#f5efdc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#efe9dd;color:var(--ink);font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;line-height:1.7;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;padding-bottom:70px;}
.wrap{max-width:1000px;margin:0 auto;padding:0 20px;}
.top{padding:22px 0 0;}
.back{display:inline-flex;gap:6px;font-size:.84rem;color:var(--sub);text-decoration:none;border:1px solid var(--line);background:#fff;padding:6px 14px;border-radius:20px;}
.back:hover{color:var(--gold);border-color:var(--gold);}
.hero{text-align:center;padding:40px 16px 30px;}
.hero .eyebrow{font-size:.76rem;letter-spacing:.24em;color:var(--gold);font-weight:800;text-transform:uppercase;}
.hero h1{font-size:2.2rem;font-weight:800;margin:.5rem 0 .3rem;letter-spacing:-.02em;text-wrap:balance;}
.hero .meta{display:flex;flex-wrap:wrap;gap:6px 8px;justify-content:center;font-size:.83rem;color:var(--sub);margin-top:6px;}
.hero .meta span{background:#fff;border:1px solid var(--line);border-radius:20px;padding:3px 13px;}
.lead{max-width:680px;margin:24px auto 0;background:var(--brown);color:#f4ead7;border-radius:16px;padding:28px 32px;font-size:1.3rem;font-weight:700;line-height:1.65;word-break:keep-all;overflow-wrap:break-word;text-wrap:pretty;position:relative;}
.lead .qm{color:var(--gold);font-family:Georgia,serif;font-size:2.4rem;line-height:0;position:relative;top:8px;margin-right:4px;}
section{margin-top:44px;}
.slabel{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:20px;}
.slabel h2{font-size:1.15rem;font-weight:800;}
.slabel .cnt{font-size:.78rem;color:var(--sub);background:#fff;border:1px solid var(--line);border-radius:20px;padding:2px 10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.hc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 24px 18px;position:relative;box-shadow:0 3px 16px rgba(120,100,60,.06);display:flex;flex-direction:column;}
.hc .qm{font-family:Georgia,"Times New Roman",serif;font-size:3rem;line-height:.6;color:var(--gold);opacity:.42;margin-bottom:8px;}
.hc p{font-size:1.19rem;font-weight:600;line-height:1.68;color:#2c2619;flex:1;word-break:keep-all;overflow-wrap:break-word;text-wrap:pretty;}
.hc figcaption{margin-top:15px;font-size:.86rem;font-weight:700;letter-spacing:.02em;word-break:keep-all;}
.hc.bookq{border-top:3px solid var(--gold);}
.hc.bookq figcaption{color:var(--gold);}
.hc.conf{background:var(--teal-bg);border-color:#d4e6e2;border-top:3px solid var(--teal);}
.hc.conf .qm{color:var(--teal);opacity:.4;}
.hc.conf figcaption{color:var(--teal);}
.hc.dia{background:var(--dia-bg);border-color:#e6dcc0;border-top:3px solid var(--dia);}
.hc.dia .qm{color:var(--dia);opacity:.4;}
.hc.dia figcaption{color:#7a5f18;font-weight:600;}
.storybox{max-width:720px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:36px 38px;box-shadow:0 3px 16px rgba(120,100,60,.06);}
.ovtext{font-size:1.06rem;line-height:1.85;color:#3a3428;word-break:keep-all;text-wrap:pretty;padding-bottom:18px;border-bottom:1px dashed var(--line);margin-bottom:8px;font-style:normal;}
.topic{margin-top:26px;}
.topic h3{font-size:1.08rem;font-weight:800;color:var(--gold);margin-bottom:10px;word-break:keep-all;}
.topic p{font-size:1rem;line-height:1.85;color:#3a3428;word-break:keep-all;text-wrap:pretty;margin-bottom:12px;}
.topic p:last-child{margin-bottom:0;}
.hldivider{display:flex;align-items:center;gap:14px;margin-top:56px;color:var(--sub);}
.hldivider::before,.hldivider::after{content:"";flex:1;height:1px;background:var(--line);}
.hldivider span{font-size:.85rem;font-weight:800;letter-spacing:.12em;}
footer{margin-top:52px;text-align:center;font-size:.85rem;color:var(--sub);}
.priv{margin-top:8px;font-size:.75rem;color:#9a9488;}
@media(max-width:560px){.hero h1{font-size:1.7rem;}.lead{font-size:1.15rem;padding:22px;}.hc p{font-size:1.1rem;}.grid{grid-template-columns:1fr;}}
</style></head><body>

<h1>매혹적인 악덕들</h1>
<div class="meta"><span>🗓 2025-04-23 (수요 오전)</span><span>📖 1회 · 교만과 허영 — 목표가 나인가 하늘인가</span><span>✍ 리베카 드영</span></div>
<div class="lead"><span class="qm">“</span>촘촘한 그물 같은 허영과 교만에 걸리지 않을 사람이 없다 — 다만 영광을 사랑하는 자는 그 자리를 즉시 떠난다.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>교만한 사람은 그 유혹에 솔깃하지만, 영광을 사랑하는 사람은 즉시 그 자리를 떠날 것이다.</p><figcaption>허영</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리는 하나님의 형상을 지닌 자로 살기보다, 오히려 우리 자신의 형상을 만들고 관리한다.</p><figcaption>자기 이미지</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>교만은 자신이 뛰어나다고 믿는 마음이고, 허영은 그 뛰어남을 다른 사람에게 인정받고 싶어 하는 마음이다.</p><figcaption>교만과 허영</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>두려움, 곧 자신의 행복을 통제하려는 욕구가 허영의 뿌리다.</p><figcaption>허영의 뿌리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>사랑의 반대는 나태함이다. 떠나는 것이 나태함이고, 떠나지 않고 그 자리를 지키는 것이 사랑이다.</p><figcaption>사랑</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>시험을 앞두고 불안해하는 아이에게 '아는 만큼만 풀게 해달라고 기도하라'고 가르치면서도, 속으로는 잘 쳤으면 하는 내 마음이 있었다. 이 책으로 그 마음을 절제하게 되어 감사했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나는 뛰어나다고 믿는 마음은 없는데 인정은 받고 싶다 — 이 마음은 무엇일까. 책을 읽는 내내 답은 없고 무릎 꿇을 물음만 자꾸 생겼다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>교회를 40년 다녀 큰 죄의 덩어리는 벗었지만, 이 촘촘한 그물 같은 악덕에는 나 역시 어디선가 걸릴 수밖에 없는 죄인임을 절감했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>좋은 일로, 사랑으로 시작했어도 결과의 열매가 아름다울수록 주변의 칭찬이 과해지며 교만이 하늘을 찌를 수 있다는 것을, 교회 안에서 경험한다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>하나님이 다 하셨기에 오히려 교만할 수 없었고, 누가 나를 칭찬하면 그것은 정말 하나님이 하신 일임을 강조하고 싶어진다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">3</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>천국에 가고 싶은 이유는 거기 금이 깔리고 다이아몬드가 있어서가 아니라 주님이 그곳에 계시기 때문이다. 주님과 함께 걷는 시간이 좋으면, 사람들이 박수쳐줘도 또 주님께로 향하게 된다.</p><figcaption>이승목 목사, 허영의 자리를 떠나는 법</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>우리 담임 목사님은 외부 활동을 거의 안 하시고 오전엔 설교 준비, 양떼의 말씀 준비에만 집중하신다. 허영을 이길 수 있는 롤 모델이 곁에 있다.</p><figcaption>이승목 목사, 인정 욕구를 두고</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>허영이든 시기든 다 내 얘기 아닙니까? 인생이 허영이지 않습니까?</p><figcaption>이승목 목사가 웃으며 던지자 한 참석자가 '목사님하고 저만 그렇게 생각하나 봐요'라고 화답</figcaption></figure></div></section>
