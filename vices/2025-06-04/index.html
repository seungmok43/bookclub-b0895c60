body{background:#efe9dd;color:var(--ink);font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;line-height:1.7;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;padding-bottom:70px;}

.hero .meta{display:flex;flex-wrap:wrap;gap:6px 8px;justify-content:center;font-size:.83rem;color:var(--sub);margin-top:6px;}
.hero .meta span{background:#fff;border:1px solid var(--line);border-radius:20px;padding:3px 13px;}
.lead{max-width:680px;margin:24px auto 0;background:var(--brown);color:#f4ead7;border-radius:16px;padding:28px 32px;font-size:1.3rem;font-weight:700;line-height:1.65;word-break:keep-all;overflow-wrap:break-word;text-wrap:pretty;position:relative;}

.hldivider{display:flex;align-items:center;gap:14px;margin-top:56px;color:var(--sub);}

<h1>매혹적인 악덕들</h1>
<div class="meta"><span>🗓 2025-06-04 (수요 오전)</span><span>📖 3회 · 나태 — 게으름 뒤에 숨은 사랑의 결핍</span><span>✍ 리베카 드영</span></div>
<div class="lead"><span class="qm">“</span>나태는 눕는 것이 아니라 하나님의 부르심을 회피하는 것 — 그 자리를 떠나지 않고 매일 사랑하기로 결심하는 것이 반대편의 길이다.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>나태는 단순히 게으르기 때문이 아니라, 게으름 뒤에 숨어 있는 사랑의 결핍 때문에 죄로 규정되어야 한다.</p><figcaption>나태의 정의</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>사랑은 저절로 샘솟는 것이 아니라 노력이 필요하며, 그 노력이 우리를 변화시킨다. 사랑은 매일 사랑하겠다는 결심으로 나타나는 헌신이다.</p><figcaption>사랑은 노력</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>나태의 반대는, 있는 자리에서 끈기를 가지고 무언가가 몸에 밸 때까지 하던 것을 계속하는 것이다.</p><figcaption>끈기</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>분주함과 일 중독마저도 진정한 사랑과 성숙과 헌신을 외면하는 도피 방식, 곧 영적 낙태일 수 있다.</p><figcaption>분주함</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>나태는 단순한 게으름이 아니라, 자기중심적 회피를 통해 하나님의 임재와 소명을 거부하는 하나님에 대한 저항이다.</p><figcaption>하나님에 대한 저항</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>연이은 어려움과 관계의 상처로 교회를 옮기고 싶을 만큼 영적 탈진에 빠졌는데, '어디 계세요' 부르짖던 그 순간에도 하나님이 지켜주셨음을 공동체를 통해 깨달았다. 그 자리를 지키게 하심이 나태를 깨뜨릴 좋은 방법이었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>'사랑의 결핍'이라는 말이 도무지 와닿지 않아 책이 이해가 안 됐는데, 부모가 나를 사랑하지 않는다고 느껴본 적이 없어서였음을 나중에 깨달았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>아버지에게 사랑받으려 끊임없이 애쓰던 것이 습관이 되어 지금의 나를 만들었다. 기도할 때는 '육신의 아버지'라 부르며, 무조건 사랑하시는 하나님 아버지와 구별했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>한동안 아무것도 안 하고 끝까지 숨어 '이래도 안 찾으시나' 버텼지만, 사랑방과 공동체가 집처럼 있어 더 도망가지 못하고 다시 그 자리로 돌아왔다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>예전엔 '나 아니면 안 된다'며 화내듯 섬겼는데, 이제는 내가 아니어도 하나님이 다 돌아가게 하심을 알아 짜증 대신 감사로 섬긴다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>하루 종일 아무것도 안 하고 그냥 누워 있고 싶다는 생각을 365일 중 364일 합니다. 그런 나를 하나님이 계속 이끌어내시니, 없던 감각까지 드러나더라.</p><figcaption>이승목 목사의 솔직한 나태 고백</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>기도하기 싫을 때가 있어요. 기도하면 결국 마음이 녹아 다 품고 변화되어 돌아올 걸 아니까요.</p><figcaption>이승목 목사, 나태의 솔직한 결</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>예수님은 제일 밑바닥에 사셨는데, 하나님이 판을 딱 뒤집어 막판에 1등 하는 순간 부활이 일어났다. 우리도 그 하나님 1등을 꿈꾸며 산다.</p><figcaption>이승목 목사, 이기고 지는 개념을 뒤집으며</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>운동해도 살이 안 빠져 낙심했는데 트레이너가 '근육의 질이 좋아지고 있다'고 하더라. 양이 아니라 질이 중요하다고.</p><figcaption>이승목 목사와 참석자들이 나눈 마무리 대화</figcaption></figure></div></section>
