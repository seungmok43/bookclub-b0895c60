body{background:#efe9dd;color:var(--ink);font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;line-height:1.7;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;padding-bottom:70px;}

<h1>매혹적인 악덕들</h1>
<div class="meta"><span>🗓 2025-06-11 (수요 오전)</span><span>📖 4회 · 「탐욕」 — 마음의 집착과 물질, 그리고 십일조</span><span>✍ 리베카 드영</span></div>
<div class="lead"><span class="qm">“</span>탐욕스러운 게 당연해진 시대에, '이대로 10년을 살면 나는 어떤 사람이 될까'를 함께 물었다.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>탐욕은 하나님이 우리에게 주시는 좋은 것에 만족하고 그분의 공급하심에 감사하는 대신, 스스로 행복을 찾으려 하는 방식으로 표현된다.</p><figcaption>탐욕의 정의</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>십일조는 우리의 소유물이 무엇보다도 하나님의 것임을 습관적으로 상기시켜준다.</p><figcaption>십일조</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리가 돈을 어떻게 취급하는지를 보면 우리 마음속에 있는 답이 드러난다.</p><figcaption>돈과 마음</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>온전한 인간다운 삶의 필요를 존중하는 행위는, 물질에 대한 욕망의 지배를 받지 않고 자유롭게 의미 있고 아름다운 삶을 사는 것을 가리킨다.</p><figcaption>자유</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>하나님의 모양을 한 우리 안의 구멍은 하나님이 들어오셔야만 채워진다. 그 빈자리를 이상한 것으로 막으려 하니 끊임없이 채워지지 않는다.</p><figcaption>마음의 빈자리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>웬만하면 우리는 탐욕스럽다. 탐욕스러운데 아무렇지도 않은 시대를 살고 있기 때문이다.</p><figcaption>시대</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>'내가 앞으로 10년 20년 이런 재산을 계속 소유한다면 나는 어떤 성품을 갖게 될 것이며 어떤 사람이 될 것인가'—한 번도 생각해보지 않았던 질문에 궁금증이 일었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>하루 24시간 중 내가 하나님께 얼마의 시간을 기쁘게 올려드리는가 생각하니 너무 반성이 되었다. 여전히 내가 즐길 수 있는 것이 우선시되더라.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>내가 죽고 난 뒤에도 끝없이 도착할 택배가 얼마나 부끄러울까—그게 제일 두렵다. 박스는 많은데 정작 남는 건 없고, 뜯으면서 '또 많이 시켰구나' 허무했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>섬기는 자리에서 '영수증 제출할 게 없다'며 느끼는 나의 뿌듯함조차 교만이었다. 커피 한 잔이면 될 걸 열 잔 해놓고 혼자 뿌듯해했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>다들 찔렸다는데 나는 하나도 안 찔렸다. '이게 무슨 말이지' 하며 읽었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>채워지지 않는 마음의 블랙홀을 이기적인 마음으로 채우려다 보니 이웃을 바라보지 못하고 나만 바라보게 되더라.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>하나님의 사람으로 지음받았다가 처음 악을 보면 놀랄 텐데, 그게 계속 우리를 물들인다. 냄비 속 개구리처럼 슬슬 끓여서 죽이는 것이다.</p><figcaption>진행자 이승목 목사 — 시대가 탐욕을 인지 못하게 만든다는 비유</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>은퇴하며 전 재산을 기부한 부모를 보며 자녀는 반감이 든다 했고, 진행자는 '메르켈처럼 나는 늘 이렇게 살았을 뿐 이건 내 게 아니라고 사는 게 아름다운데, 한국은 역사적으로 그걸 배운 적이 없다'고 되짚었다.</p><figcaption>청부·청빈과 내려놓음</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>각자 집에서 읽을 땐 대화가 안 되는데, 부부가 같이 앉아 이 책을 나누니 '이 사람이 이렇게 생각하는구나' 그 자리에서 처음 알게 되더라.</p><figcaption>함께 읽는 독서의 유익</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이 책 아주 거슬리는 책이라 다 읽고 구석에 던져놔야 할 책이지만, 이렇게 돌아볼 수 있다는 것 자체가 이미 성령이 우리 안에 계신 것이다.</p><figcaption>진행자 이승목 목사의 총평</figcaption></figure></div></section>
