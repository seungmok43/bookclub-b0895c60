*{box-sizing:border-box;margin:0;padding:0;}
body{background:#efe9dd;color:var(--ink);font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;line-height:1.7;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;padding-bottom:70px;}

.hero h1{font-size:2.2rem;font-weight:800;margin:.5rem 0 .3rem;letter-spacing:-.02em;text-wrap:balance;}
.hero .meta{display:flex;flex-wrap:wrap;gap:6px 8px;justify-content:center;font-size:.83rem;color:var(--sub);margin-top:6px;}
.hero .meta span{background:#fff;border:1px solid var(--line);border-radius:20px;padding:3px 13px;}
.lead{max-width:680px;margin:24px auto 0;background:var(--brown);color:#f4ead7;border-radius:16px;padding:28px 32px;font-size:1.3rem;font-weight:700;line-height:1.65;word-break:keep-all;overflow-wrap:break-word;text-wrap:pretty;position:relative;}

.slabel h2{font-size:1.15rem;font-weight:800;}
.slabel .cnt{font-size:.78rem;color:var(--sub);background:#fff;border:1px solid var(--line);border-radius:20px;padding:2px 10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.hc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 24px 18px;position:relative;box-shadow:0 3px 16px rgba(120,100,60,.06);display:flex;flex-direction:column;}

.hc.conf .qm{color:var(--teal);opacity:.4;}
.hc.conf figcaption{color:var(--teal);}
.hc.dia{background:var(--dia-bg);border-color:#e6dcc0;border-top:3px solid var(--dia);}
.hc.dia .qm{color:var(--dia);opacity:.4;}

<h1>매혹적인 악덕들</h1>
<div class="meta"><span>🗓 2025-07-23 (수요 오전)</span><span>📖 6회 · 「탐식」과 금식 — 마음의 습관과 즉각적 쾌락</span><span>✍ 리베카 드영</span></div>
<div class="lead"><span class="qm">“</span>빠른 쾌락에 길든 시대에, 더디지만 함께 앉아 있는 시간이 주는 힘을 발견했다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>탐식이 습관이 되면 우리는 영적 굶주림보다 육체적 욕구의 충족을 더 중요하게 여기게 된다.</p><figcaption>영적 굶주림</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>탐식의 악덕은 마음의 습관이라고 할 수 있다. 마음과 생각의 습관은 볼 수 없지만 행동으로 드러난다.</p><figcaption>마음의 습관</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>탐식에 빠진 사람들은 피로나 공허함을 느낄 때 하나님을 의지하거나 하나님이 채워주실 때까지 기다리는 것을 원치 않는다.</p><figcaption>기다림</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>금식은 쾌락이라는 우상을 내려놓고, 대신 그것을 선물로 받는 법을 배우는 훈련이다.</p><figcaption>금식의 의미</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리는 쾌락을 추구할 때, 그 소명을 함께 이루어 가는 사람들에게도 관심을 가져야 한다. 음식은 관계 안에 있는 것이다.</p><figcaption>식탁과 관계</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>빠름을 성경은 가르치지 않는다. 즉각적인 보상에 길들면 우리는 진리와 멀어진다.</p><figcaption>빠른 보상</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>일부러 배가 불러도 먹는 연습을 해서 위를 늘렸다. 탐식엔 걸릴 게 없다 생각했는데, 마음의 습관이 곧 내 행동이 되고 내 모습이 되는구나 깨달았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>다이어트 중이라 못 먹으니 먹방 유튜브를 보며 대리만족을 느낀다. 이것도 내가 나 스스로에게 쾌락을 제공하는 것이더라.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>'커피 없이는 못 산다'던 나에게 하나님이 그 커피를 역하게 만드셨다. 감정이 안 좋을 때 하나님이 아니라 먹는 것에 의지하고 있었구나 싶었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>식탐이 별로 없는데도 금식은 못하겠다. '금식이다' 생각하면 뭘 먹어야 할 것 같고, 나를 생각하면 금식을 선택 못한다—결국 내가 있는 것이다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>비우려고 건강식을 찾는데, 정작 안 먹는 채소와 과일을 냉장고에 가득 쌓아두게 되더라. 그것조차 나의 만족이었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>혼자서는 균형을 못 잡는다. 결국 하나님이 원하시는 것은 공동체라, 균형은 함께 잡아가는 것이더라.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>육퇴하고 빨리 오는 쾌락보다, 아내와 그냥 잠깐 앉아 있던 더딘 시간이 훨씬 더 오래, 영원히 나에게 유익하게 남더라.</p><figcaption>진행자 이승목 목사 — 즉각적 보상 대 관계의 힘</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>자극도 스펙터클도 없이 그냥 말씀 듣고 얼굴 보고 헤어지는 교회 이야기—막 팍팍 되는 게 아니라 20~30년 함께 자라가는 세월이 주는 힘이 있더라.</p><figcaption>자극 없는 신앙의 무게</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>다들 아무것도 없는 상태에서 그냥 멍하니 있고 싶어 한다는 '멍때림 채플' 이야기가 오갔다.</p><figcaption>자극에 지친 시대의 갈망</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>'금식하면 영이 맑아진다는 그 경지가 궁금하다, 나는 배만 고팠다'는 물음에, 진행자는 '먹음과 죄가 성경적으로 가까이 있고 성찬도 먹음과 관련되니, 분명히 알 수 없는 비밀이 있다'고 답했다.</p><figcaption>금식의 신비</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>내가 딸을 조금 통통해도 사랑스럽게 보듯, 하나님도 나를 그렇게 보시지 않을까—과하면 걱정하시겠지만.</p><figcaption>균형의 기준을 자녀를 보는 시선에서 찾다</figcaption></figure></div></section>
