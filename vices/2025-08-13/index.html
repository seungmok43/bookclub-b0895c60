body{background:#efe9dd;color:var(--ink);font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;line-height:1.7;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;padding-bottom:70px;}

<h1>매혹적인 악덕들</h1>
<div class="meta"><span>🗓 2025-08-13 (수요 오전)</span><span>📖 7회 · 「정욕」과 완독 총평 — 순결, 그리고 모든 악덕의 뿌리 교만</span><span>✍ 리베카 드영</span></div>
<div class="lead"><span class="qm">“</span>절벽에 매달리는 대신 도시를 건설하기로—여섯 악덕을 지나 결국 교만의 뿌리와 하나님의 기다림 앞에 섰다.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>순결은 벼랑 끝자락에 매달리는 대신, 도시를 건설하는 편을 선택하는 것이다.</p><figcaption>순결</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>악덕은 하나님만이 채울 수 있는 마음의 빈자리를 이 좋은 것들로 채우려 할 때, 그리고 그것들을 기준으로 행복을 정의할 때 생겨난다.</p><figcaption>악덕의 정의</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>교만은 나무의 뿌리와 몸통 역할을 하며, 다른 일곱 악덕의 가지가 자라나는 주된 원천이 된다.</p><figcaption>교만의 뿌리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>정욕을 억제하는 가장 좋은 방법은 좋은 인터넷 필터를 설치하는 것이 아니라, 아름다운 정을 쌓는 것이다.</p><figcaption>순결의 길</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>안 먹으면 자유할 줄 알았는데, 이 사소한 부분을 하나님께 맡기니 나의 모든 일정과 계획을 맡길 수밖에 없더라—그것이 금식의 훈련이다.</p><figcaption>금식은 맡김</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>예수님은 단순히 일을 하라고 부르신 것이 아니라, 그분처럼 사랑이 넘치는 사람이 되라고 우리를 부르신다.</p><figcaption>부르심</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>모든 죄에서 내가 하나님보다 나를 우선시했기에, 이 책을 볼 때마다 늘 걸리는 뿌리가 교만이었음을 이제 이해하게 됐다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>죄성이 드러나면 하나님 앞에 납작 엎드리기보다 뒷걸음질 쳐졌다. '모든 것이 끝날 때까지 나를 기다리라'는 말씀이 오늘 내게 꼭 필요한 말씀이었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>성을 감춰야 하는 부끄러운 것으로만 배웠는데, 하나님이 주신 좋은 것을 건강하게 표현하고 이야기하는 게 더 건강한 신앙이 아닐까 싶었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>기준이 하나님이 되어야 하는데 그 기준이 나였다. 금식도 '하루 굶어야 하는데 어떡하지'가 아니라 하나님과 만나는 시간으로 보니 오히려 기다려지더라.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>하나님은 나를 천천히 알게 하시고 기다려 주시고 사랑으로 말씀하시는데, 나는 아이에게 좋은 습관과 목표만 요구하는 성취 지향적인 엄마가 아니었나.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>옛 자아와 새 자아 사이의 간극이 정말 괴로웠는데, 그 힘들었던 부분마저 다 하나님이 하심이었고 앞으로도 하나님이 하실 일임을 깨달았다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>세상에 겸손한 사람은 존재하지 않습니다. 다 교만으로 가득 차 있어요—그걸 아셔야 합니다.</p><figcaption>진행자 이승목 목사 — 교만의 보편성</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>사랑에 빠지면 다른 게 안 보이듯, 하나님과 사랑에 빠지면 다른 기준이 사라진다. 그런데 그게 안 되니 마지막에는 늘 성령님이 등장하셔야 한다.</p><figcaption>변화의 유일한 동력</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>성은 곧 생명이라는 것, 부모가 성교육 캠프에 함께 들어가 자녀에게 자신의 이야기를 들려주는 것—성은 사회가 아니라 가정에서 책임지고 가르쳐야 한다는 나눔이 오갔다.</p><figcaption>성과 생명, 그리고 가정</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>아이를 이만큼 키우니 이제 저절로 주님께 맡겨진다. 내 말이 안 먹히니 기도밖에, 하나님밖에 없더라.</p><figcaption>양육과 내려놓음</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>한 사람이 헌신하다 지쳐 쓰러지는데 옆에서는 다 그것을 누리며 '대단하다' 칭찬만 한다—공동체가 그 지친 이를 지켜줘야 한다는 이야기가 무겁게 나눠졌다.</p><figcaption>몸 된 교회와 서로를 지키는 사랑</figcaption></figure></div></section>
<footer>BooKLove · 제작 · 수영로교회 이승목 목사<div class="priv">이 페이지는 검색에 노출되지 않으며, 링크를 아는 분만 열람할 수 있습니다.</div></footer>
