<h1>매혹적인 악덕들</h1>
<div class="meta"><span>🗓 2025-08-27 (수요 오전)</span><span>📖 8회 · 「매혹적인 악덕들」 완독 후 공동체 금식 나눔</span><span>✍ 리베카 드영</span></div>
<div class="lead"><span class="qm">“</span>먹지 않는 그 하루가 '배고픔을 참는 날'이 아니라 '하나님을 만나는 날'이 될 때, 작은 몸의 절제가 온 마음을 그분께로 돌려놓았다.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>금식하면 안 먹고 배고픈 걸 참는 거라 생각하는데, 그것 외에 진짜 책 내용처럼 엄청나게 큰 것이 그 안에 포함되어 있었다.</p><figcaption>금식의 의미</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>어떤 남자는 3일을 굶어도 쌩쌩한데 어떤 여인은 한 끼를 굶어도 비틀거린다. 그건 물리적인 양의 차이가 아니라 형편과 사람에 따라 다른 것이다.</p><figcaption>금식과 연약함</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>금식이라는 것 자체가 기독교 전통에서 성도에게 반드시 필요하다는 것이지, 큰일이 있을 때는 곡기를 끊고 배고픔을 넘어 하나님의 뜻을 구하는 것이고 정기적으로 하는 것은 신앙의 유익이 있다.</p><figcaption>금식 전통</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>'그래 그렇지' 하며 교만한 마음으로 스르르 넘어가는 책이 있는가 하면, 오히려 이 금식은 '맞네' 하면서 깨닫게 되는 시간이었다.</p><figcaption>책의 깨달음</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리가 낭비하고 허비하는 것, 잔반을 남기는 것, 유한한 인생인데 다 할 수 있는 것처럼 사는 것까지 다 연결되어 보였다.</p><figcaption>절제와 유한함</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>누워서 배고픈 걸 참는 게 문제가 아니라 이 고통을 참는 게 정말 힘들었는데, 그러면서 하루 종일 '하나님을 더 기억해야지' 생각하니 나의 작은 행동 하나하나가 보이더라. 시선을 나의 연약함보다 하나님께 두어야겠다는 생각이 많이 들었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>금식하는 날이라고 생각하기보다 '오늘은 하나님 만나는 날'이라고 생각하니 마음가짐부터 달라서 그날 하루가 힘들지 않게 지나갔다. 먹어야 된다는 생각을 아예 안 하고 하나님 만난다고만 생각하니 오히려 수월했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>두통으로 누워 있으면서 기도실에 갔는데 내가 들어간 방은 임마누엘이었지만 옆 7번 방에는 '거룩'이라고 적혀 있었다. 내가 먹지 않고 몸을 복종시키는 이 일을 통해 하나님이 이 시간을 보여주시는구나 싶었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>금식 다음 날 아이에게 한마디 했더니 아이가 '엄마가 그렇게 하는 거 보고 다시 정신 차렸다'고 했다. 그때 하나님 앞에서 이 아이한테 하는 것도 예배구나 하는 마음으로 다시 정신을 차렸다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>똑같이 말씀과 찬양으로 아침을 시작했지만 '금식'이라는 의식을 통해 '이 시간은 하나님과 친밀하게 보내야 해' 하는 다짐이 숨어 있어서, 똑같이 힘든 일이 있어도 계속 하나님을 더 생각했던 시간이었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>금식으로 하나님께 집중했던 유익보다, 내가 계속해서 그러지 못한다는 것에 좀 눌렸던 것 같다. 그러다 하나님께 다 맡기고 자니 오랜만에 푹 잤다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>교회까지 걸어갈 때 앞이 새카맸는데, 링티를 딱 먹는 순간 눈이 번쩍 뜨이면서 '아, 물이 성경에 나오는 생명의 물이구나' 싶었다.</p><figcaption>금식 중 두통으로 탈진했던 두 참석자가 전해질 음료로 회복한 나눔</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>저는 약은 먹어도 된다고 봅니다. 빈속에 먹으면 몸이 더 안 좋아지니 간단하게 바나나라도 먹어도 된다고 생각합니다.</p><figcaption>지병 약을 먹는 참석자의 금식 질문에 대한 진행자 이승목 목사의 답</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>금식을 막무가내로 해서는 안 됩니다. 몸에 이상이 있을 수도 있으니, 정기적으로 하려면 사실은 의사 선생님이 필요합니다.</p><figcaption>안전한 금식에 대한 진행자의 당부 — 보수적이되 고민하는 입장</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이번에 종말 얘기가 나왔는데, 우리 다음엔 종말론 한번 읽어볼까요?</p><figcaption>다음 책으로 종말론을 정하는 대목 — 무천년설·휴거 등을 짚어줌</figcaption></figure></div></section>
