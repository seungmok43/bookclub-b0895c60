<h1>지혜가 필요한 시간</h1>
<div class="meta"><span>🗓 2025-09-17 (수요 오전)</span><span>📖 1회 · 「지혜가 필요한 시간」 도입 — 양극화 시대와 진리</span><span>✍ 프랜시스 콜린스</span></div>
<div class="lead"><span class="qm">“</span>분열과 극단의 시대, 진리는 이기는 게 아니라 더 큰 진리 안에 함께 서는 것 — 그래서 지금이 지혜가 필요한 시간이다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>진리는 특정 집단의 관심사에 불과하고, 과학은 정치 문제, 신앙은 단순히 한 팀의 브랜드가 되어 맹목적인 집단 충성심을 통해서만 보장된다.</p><figcaption>진리의 파편화</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>분열과 극단의 시대를 어떻게 살아갈 것인가.</p><figcaption>책의 문제의식</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>양분된 세상에 서지 않고 더 큰 진리에 서자.</p><figcaption>진리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>지혜는 경험과 상식과 통찰을 포함하는 것이다. 그 모든 것이 하나님 안에서 이루어진다.</p><figcaption>지혜의 정의</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>기독교 세계관 공부했던 게 생각나서, 아이들을 가르치는 데 정말 분별력이 필요하구나를 다시 생각하게 됐어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>정치에 관심이 많이 없는데 이제 정치 얘기가 나오니까 좀 두렵더라고요. 뒤에 가면 어려울 수도 있겠다 싶었어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>과학자이자 의사인데 어떻게 신앙을 믿게 됐을까, 도대체 어떻게 이 신앙에 이르렀을까가 궁금했어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나이가 들수록 고집이 세지는 것 같아요. 80% 확신이 드는 것도 맞다 하면서 100%인 것처럼 강력하게 하고 싶더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>사랑방에서도 사위랑 장인, 아버지랑 아들이 정치 얘기는 절대 못 한다고 다들 그러더라고요. 그 정도로 갈라져 있어요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">3</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>데카르트가 '나는 생각한다 고로 존재한다'고 한 순간부터 진리가 아니라 내 생각이 먼저가 됐어요. 거기서 유명론과 경험주의를 거쳐 결국 다 해체된 게 지금의 포스트모던입니다.</p><figcaption>목사가 포스트모던의 뿌리를 설명</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>집에서 계속 가르치죠. 아빠 엄마 위의 권위에 하나님이 계신다고. 그 권위를 따르는 연습을 해야 위에 계신 하나님을 따를 수 있어요.</p><figcaption>권위로 자녀를 양육하는 이유</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>아이가 '엄마 나 오늘은 안 졸았어' 하는 거예요. 말씀이 그렇게 아이에게 들어가는 게 참 신기하더라고요.</p><figcaption>전달력 있는 설교에 반응한 아이 이야기</figcaption></figure></div></section>
