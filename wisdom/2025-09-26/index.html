<h1>지혜가 필요한 시간</h1>
<div class="meta"><span>🗓 2025-09-26 (금요 저녁)</span><span>📖 2회 · 「진리」 나눔 — 토론·환대·인격이신 진리</span><span>✍ 프랜시스 콜린스</span></div>
<div class="lead"><span class="qm">“</span>진리는 붙잡아야 할 문장이 아니라 우리를 먼저 끌어안으신 인격, 그래서 토론의 끝에도 손잡고 함께 기도할 수 있다.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>토론은 누가 이기는 게임이 아니에요. 서로 그 지점을 같이 찾아가면서 지혜로 함께 가는 겁니다. 관철시키려 할수록 역화 효과가 일어나 서로 더 멀어져요.</p><figcaption>역화 효과</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>기독교의 진리는 관념이 아니에요. 어떤 문장이 아니에요. 기독교의 진리는 인격적인 예수 그리스도입니다.</p><figcaption>인격이신 진리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리는 진리를 만져볼 수 있어요. 진리와 대화할 수 있고, 진리와 교제할 수 있고, 진리의 품에 안길 수도 있어요.</p><figcaption>진리와의 교제</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>내가 하는 말 중에 3분의 1만 내가 생각해서 소화한 것이고, 3분의 2 이상은 어디서 주워들은 말을 그냥 할 뿐이다.</p><figcaption>말의 출처</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>푸코는 결국 진리는 권력 놀음이라고 했죠. 그래서 우리도 어느 시점엔 권력을 욕망해야 해요 — 그 권력이 진리를 만나면 얼마나 아름다워지는지 그리스도인만큼 드러낼 수 있는 이가 없으니까.</p><figcaption>권력과 진리</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>정보의 신뢰성이나 언론에 대한 개인적 불신이 컸는데 이 책이 그 마음을 잘 긁어줬어요. 역화 효과를 보고 '결국 사랑이구나, 그 관점으로 대화해야겠다' 생각했습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>우리 세대는 건강한 토론 문화가 훈련되지 않았잖아요. '나도 틀릴 수 있다'는 전제를 놓고 토론하지 않는 것 같아요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>모든 시선이 내 안에만 있어요. 주변을 보고 하나님을 보지 못하고, 나 혼자 갇혀서도 행복하다는 그런 문화가 극단으로 치닫는 것 같아 아쉬워요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>각자 다른 신앙을 가진 사람들이 한데 모인 자리에 있어 봤는데, 서로 다름만 얘기하고 다른 것을 받아들이지 않는 그 공간이 정말 충격이었어요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">3</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>세대 갈등도 교회 말고는 소망이 없습니다. 손주와 할아버지 세대가 한 사람 듣고 끄덕이며 차 안에서 대화를 나누는 건 교회밖에 없어요.</p><figcaption>세대를 잇는 자리로서의 교회</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>'치고 들어온다', '구걸한다' — 그 말을 하는 순간 그 언어가 우리를 잠식해요. 교회가 전쟁터도 아닌데, 같이 살려고 도모하는 거지 구걸이 아닙니다.</p><figcaption>장소 갈등에서 언어가 공동체를 물들이는 문제</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>이 저자도 별거 없구나 싶었어요. 어릴 때부터 대단했던 게 아니라 수없이 실패하다가 하나님이 기회를 열어주셔서 이 자리에 올랐을 뿐이더라고요.</p><figcaption>겸손한 저자에 대한 인상</figcaption></figure></div></section>
