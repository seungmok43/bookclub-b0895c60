<h1>지혜가 필요한 시간</h1>
<div class="meta"><span>🗓 2025-10-01 (수요 오전)</span><span>📖 3회 · 「과학」 나눔 — 과학 만능주의와 겸손</span><span>✍ 프랜시스 콜린스</span></div>
<div class="lead"><span class="qm">“</span>과학도 겸손 앞에 무릎 꿇을 때, 그 광대한 창조의 경이는 결국 인격이신 진리를 가리킨다.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>과학이 항상 옳은 결론에 도달하는 건 아니지만, 스스로 교정하는 특성을 통해 객관적 진리에 이르게 하며 우리 공동의 미래를 위한 중요한 토대를 제공한다.</p><figcaption>과학의 자기 교정</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>양자역학이 처음 나왔을 때 사람들이 던진 질문이 '우리가 안다는 것은 도대체 무엇인가'였어요. 그 시대에도 앎의 한계를 아는 지성인들이 있었던 거죠.</p><figcaption>앎의 한계</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>인류가 15만 년 전 아프리카의 한 공통 조상에서 왔다는 것을 유전자가 밝혀주니, 우리가 아담의 후손이구나 하는 과학적 근거처럼 다가왔어요.</p><figcaption>공통 조상</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>하나님이 만드셨다는 것도 신앙이고, 진화가 했다는 것도 사실은 신앙이에요. 데이터가 있고, 그것을 어떻게 해석하느냐가 각자의 믿음이죠.</p><figcaption>진화도 신앙</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>창조주가 성경과 자연을 주셨죠. 자연은 일반 계시, 성경은 특별 계시. 둘 다 성령의 조명 아래에서 읽는 겁니다.</p><figcaption>두 책</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>양자역학하고 게놈이 나오는데 너무 재밌어서 옛날 배운 걸 다시 찾아봤어요. 이 모든 게 있어서 참 감사하다는 생각이 들더라고요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>선택해서 아기를 낳을 수 있다는 대목에서, 이게 정말 윤리적일까, 그 아이가 그렇게 태어나면 '내가 만들었다'는 마음이 더 크지 않을까 생각하게 됐어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>코로나 백신도, 아이 접종도, 안 좋다는 얘기를 듣고도 결국 선택해야 하잖아요. 그런 걸 잘 분별할 수 있는 지혜가 정말 필요하구나 싶었어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>'하나님이 창조하셨다'고 했더니 '그런 과학적 증거는 어디에도 없다'는 답이 돌아와 당황스러웠어요. 사랑을 과학으로 증명할 수 없듯, 믿음도 경험하며 느끼는 거잖아요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>표지가 인상적이었어요. 과학 만능주의는 벽을 세우고 하늘의 한 조각만 보지만, 말씀을 베이스로 삼으면 그 벽을 넘어 온전한 하늘을 볼 수 있겠다 싶었어요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>결국엔 논리가 아닙니다. 설득도, 말빨도 아니에요. 진리는 예수 그리스도의 인격이기 때문입니다.</p><figcaption>논쟁이 아니라 인격이신 진리</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>'사랑을 과학으로 한번 증명해 봐라' 한마디만 던져도 사람들이 고민을 시작해요. 자기 세계관을 그냥 막연히 붙들고 있었던 걸 처음 돌아보게 되는 거죠.</p><figcaption>지혜로운 대화의 한 방식</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>감사 열 개 적기는 데이터가 아니에요. 창조주와 피조물의 관계를 계속 기억하는 감각을 키우는 훈련이지, 안 적으면 응답 안 되는 그런 게 아닙니다.</p><figcaption>기도의 본질에 대한 나눔</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>우종학 교수님 강의 끝에, 한 목사님이 숙소까지 쫓아가 문을 두드리며 '아니라고 말해라, 그렇게 가르치면 학생들이 혼란스러워진다'고 끝까지 따라갔대요.</p><figcaption>과학과 신학의 대화를 둘러싼 논쟁</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>풍선을 불면 멀수록 더 빨리 팽창하죠. 시간을 거꾸로 돌리면 시작점이 있어요. 그 시작점이 하나님이냐, 알 수 없는 물질이냐 — 여기서 세계관이 갈립니다.</p><figcaption>빅뱅과 창조의 시작점</figcaption></figure></div></section>
