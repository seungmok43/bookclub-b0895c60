<h1>지혜가 필요한 시간</h1>
<div class="meta"><span>🗓 2025-10-10 (금요 저녁)</span><span>📖 4회 · 「과학」 마무리 — 양극화의 현장과 사랑이라는 진리</span><span>✍ 프랜시스 콜린스</span></div>
<div class="lead"><span class="qm">“</span>모든 과학과 질서의 핵심으로 파고들면 거기 사랑이 있고, 사랑만이 갈라진 세대와 시대를 잇는다.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>나는 생명의 화학, 즉 모든 생명체의 유전 정보를 담고 있는 DNA의 경이로움에 감탄했다.</p><figcaption>DNA의 경이</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>건물에 설계도가 있듯 우리 몸에도 설계도가 있어요. DNA는 컴퓨터의 0과 1처럼 염기의 조합으로 인간의 질서를 만들어내는데, 하나만 삐끗해도 병이 될 만큼 정교하죠.</p><figcaption>인간이라는 설계도</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>과학은 오류가 발생하면 다 같이 '이건 아니다' 인정하고 새로 나아가요. 자기를 정화하는 겸손이 과학의 근본입니다.</p><figcaption>과학의 자기 교정</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>칸트는 과학으로 설명할 수 없는 도덕의 세계 앞에서, 그것을 설명하기 위해 신이라는 존재를 요청했어요. 크리스천은 아니었지만요.</p><figcaption>도덕과 신 요청</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>니체는 '신은 죽었다'며 절대적인 것 자체를 거부했죠. 진리라는 것을 싫어하고 각자의 생각이 진리인 쪽으로 시대가 흘러가고 있어요.</p><figcaption>상대주의</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>저는 문과라 과학을 잘 모르는데, DNA 설계도의 정교함을 보니 객관적으로 과학을 알면 하나님을 경탄할 수밖에 없겠더라고요. 열역학으로는 종말도 납득이 됐어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>명절에 아기 처음 데려간 자리에서, 신앙을 두고 '모태 세뇌다', '그런 걸 믿는 건 정신병'이라는 말을 들으니 마음이 많이 상했어요. 가정 안의 양극화를 실감했습니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>여든 넘은 어른은 생각이 안 바뀌시지만, 누구보다 교회를 위해 헌신하고 사랑을 전하신 분이에요. 생각이 다르더라도 사랑이니까, 그건 존중하게 됩니다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>몇 년 전 포기했던 아버지를 위한 기도를 하나님이 다시 주셨어요. 어머니께 '아버지가 어머니의 면류관이 될 거예요' 하는 말이 제 입에서 나오는데, 하나님이 시작하셨다 믿어요.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>과학 책과는 거리가 먼 제가 왜 이 자리에 앉아 있을까 생각했어요. 세대 간 갈등을 깨야 한다는 말을 자꾸 듣게 하시는 걸 보니, 제가 들어야 할 말을 하시는 것 같아요.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>로이드 존스는 그런 사람과 앉아 토론하라고 예수님이 말씀하지 않았다고 해요. 선포하라고 하셨지. 진리는 타협하고 과학적으로 설명하는 문제가 아니라는 거죠.</p><figcaption>권위와 선포에 대한 나눔</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>어른 세대의 귀함을 끌어안고 다음 세대의 손을 잡는 게 지금 이 세대의 사명이에요. 부흥이 다시 온다면 그 주역은 이 세대밖에 없습니다.</p><figcaption>세대를 잇는 사명</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>창조의 시작은 사랑이에요. 아무리 과학으로 플라스틱을 만들어도 그 핵심에는 사랑이 있어서, 결국 사랑이 이길 수밖에 없습니다.</p><figcaption>사랑이 진리의 핵심</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>천국에 AI가 있을까요? 저는 있을 거라고 생각해요. 하나님 나라를 위해 무한히 일하며 그 영광을 드러내는 AI가요. AI가 나와도 기독교 세계관은 두렵지 않아요.</p><figcaption>AI를 기독교 세계관으로 바라보기</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>예수님도 사람에 따라 다르게 대하셨어요. 새신자는 창문 다 깨고 다녀도 괜찮지만, 리더와 중직자에게는 진리로 분명하게 하는 거죠.</p><figcaption>사람에 따라 달라지는 목양</figcaption></figure></div></section>
