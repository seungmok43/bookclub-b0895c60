<h1>지혜가 필요한 시간</h1>
<div class="meta"><span>🗓 2025-10-15 (수요 오전)</span><span>📖 5회 · 「신앙」·「신뢰」 — 진화적 창조론과 세계관</span><span>✍ 프랜시스 콜린스</span></div>
<div class="lead"><span class="qm">“</span>창조와 진화로 오래 다투던 마음들이, 결국 붙잡을 것은 복음이라는 단 하나의 실임을 함께 확인한 밤.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>진화는 하나님께서 창조의 목적을 실현하기 위해 사용하신 방법일 뿐이다.</p><figcaption>진화적 창조론</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>의심은 신앙의 반대가 아니라 신앙의 한 요소다. 그 고민이 하나님과의 관계를 더 배우게 하고, 결과적으로 더 강한 신앙으로 나아가는 기회가 된다.</p><figcaption>의심</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>대규모의 제도적 변화가 필요할 수 있지만, 기도하는 개인의 내면에서부터 변화가 시작되어야 진정한 변혁을 이룰 수 있다.</p><figcaption>기도와 변혁</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>신뢰를 판단하는 네 가지 기준은 정직성, 역량, 겸손, 그리고 공유된 가치관이다.</p><figcaption>신뢰의 기준</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>결국 개인의 행동이 변화를 만드는 유일한 방법이다.</p><figcaption>행동</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>이제는 강하게 밀어붙이던 옛 무신론이 아니라, 문화와 미디어를 통해 경계를 서서히 허무는 새로운 뉴 웨이브 무신론자들이 등장하고 있다.</p><figcaption>문화적 무신론</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>필수 양육 파수 교육 때 창조론은 창조론대로, 진화론은 진화론대로 본다고 답했다가 강사에게 강하게 붙들려 기도를 받고 너무 부담스러웠던 기억이 있다. '진화는 창조의 목적을 실현하기 위한 방법일 뿐'이라는 문장을 그때 알았더라면 그런 상처는 없었을 것 같다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>결혼 초에 남편과 외계인이 있느냐 없느냐로 몇 달을 심하게 다퉜다. 어릴 때부터 박힌 절대적 창조론이 깨지는 데는 정말 오랜 시간이 걸린다는 걸 그때 알았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>과학자는 가설이 틀리면 언제든 버리는데, 나는 '왜 안 돼, 왜 안 돼' 하며 붙들고만 있었다. 믿는다는 것은 결국 누구에게나 선물로 주어지는 것임을 깨달았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>어떤 책을 읽어도 나는 늘 '나라는 기준'에 대입하게 된다. 신뢰도 신앙도 결국 내 기준이어서, 이 책을 읽으며 내가 제일 문제구나, 나밖에 없구나를 다시 들여다보게 됐다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>아이를 간절히 원해 4년간 기도하고 치료하며 기한을 정해두었는데 다행히 그 안에 주셨다. 지금 이렇게 살아 있는 것 자체가, 원래 신뢰할 것 하나 없던 내게 주어진 기적이었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>정주행한 드라마에서 사탄이 너무 매력적이고 사람과 공존하는 존재로 그려져 소름이 돋았다. 문화가 신앙의 경계를 조금씩 허무는 이 시대에, 교회는 우리에게 어떻게 싸워야 하는지 가르쳐 주어야 하지 않느냐고 묻고 싶었다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>공유할 수 있는 가치는 복음 말고는 없습니다.</p><figcaption>건강한 공동체의 '공유된 가치관'을 두고 이승목 목사가 정리한 한마디.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>목회자는 고래잡이배의 작살꾼과 같습니다. 평소엔 그냥 작살만 들고 가만히 있다가, 고래가 떠오르는 그 찰나에 딱 던지는 것이지요.</p><figcaption>이승목 목사가 전도의 '때'를 기다리는 자세를 비유로 풀며.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>시냇가에 심긴 나무도 처음엔 내가 뿌리를 내리려 애쓰지만, 어느 순간이 지나면 땅이 도리어 뿌리를 붙잡고 있습니다.</p><figcaption>구원받은 인생을 나무와 땅의 비유로 마무리하며.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>유럽 종교개혁 비전트립에 아이가 갑자기 꽂혀서 '내가 직접 보고 알아야겠다'고 했다.</p><figcaption>자녀의 의심이 도리어 진리로 바뀔 기회가 되기를 바란 나눔.</figcaption></figure></div></section>
