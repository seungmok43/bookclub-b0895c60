<h1>지혜가 필요한 시간</h1>
<div class="meta"><span>🗓 2025-10-17 (금요 저녁)</span><span>📖 6회 · 「신앙」 — 과학과 신앙의 간극을 은혜로 메우다</span><span>✍ 프랜시스 콜린스</span></div>
<div class="lead"><span class="qm">“</span>노력과 보상의 인과율로 설명되지 않는 삶의 간극을, 저마다 '은혜'라 부르며 건너온 이야기들이 흘러넘친 시간.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>신앙은 진리와 손잡고, 또 과학·신뢰와 나란히 작동한다.</p><figcaption>신앙과 과학</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>한밤중에 놀란 아이를 달래며 엄마가 '괜찮아'라고 말할 때, 그것이 애정 어린 거짓말이 아님을 우리는 안다. 그래서 우리의 진실한 직관을 거스르는 수많은 현실에도 불구하고, 실제는 우리 편이다.</p><figcaption>우주와 직관</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>우리는 무심한 우주에 홀로 존재하고 있는 것이 아닙니다. 무한한 우주는 우리의 집입니다.</p><figcaption>우주는 우리의 집</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>지금은 비주류인 이런 지성적 신앙 고백이, 나중에는 얼마든지 주류가 될 수 있다.</p><figcaption>비주류 신앙</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>완벽한 자연 법칙을 만든 창조주가 있다면, 그분은 그 법칙을 잠시 중단시켜 물을 포도주로 바꾸거나 동정녀 잉태를 이루실 수도 있다.</p><figcaption>기적의 논리</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>부활이 역사적 사실로 믿어지면, 물이 포도주로 바뀌는 것도 오병이어로 수천 명을 먹인 것도 다 가능해진다.</p><figcaption>부활</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>시험에 간절히 매달렸다가 불합격한 뒤, 오히려 그때 예수님을 영접했다. 노력하고 성과가 나오고 보상받는 인과율에 정면으로 반하는, 은혜라고밖에 부를 수 없는 경험이었다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>집이 다 불교인데 3개월만 외국에 다녀오려다 거기서 하나님을 인격적으로 만났다. 보이는 것만 믿던 사람이라 신적 존재가 있는가로 계속 부딪혔지만, 그 문화적 충격을 다 견디게 해 주셨다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>모태신앙이지만 20대 내내 '내가 세뇌당해 이걸 믿는 것 아닌가' 오래 씨름했다. 지금은 이 힘든 하루하루를 그냥 버티고 있는 것 자체가 예수님이 살아 계신 증거처럼 느껴진다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>나는 영성보다 지성을 파던 사람이라 의심이 많았는데, 삶이 한 번 꺾여 엎드려졌을 때 지성으로 해결된 게 아니라 하나님이 부으신 사랑으로 일어서게 됐다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>몸이 아파 큐티도 기도도 거의 못 하는 자신을 보며 '이게 진짜 신앙이 맞나' 스트레스를 받았다. 체력이라는 가장 연약한 지점에서 신앙이 와르르 무너지는 것 같았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>예수 없이는 나는 그저 자기중심적으로 판단하고 분노만 쌓았을 것이다. 발버둥치듯 복음을 붙든 그 과정이 결국 내 모든 관계에 평화를 유지하게 해 주었다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>나는 아직도 목사지만, 예수님이 진리가 아니라면 갈아탈 겁니다.</p><figcaption>이승목 목사가 신앙의 솔직한 심정을 드러내며.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>내일은 잘 모르겠지만, 분명한 사실 하나는 수영로에 오기 전보다 지금 주님과 더 가까워졌다는 것입니다. 그래서 그 시절로 돌아가고 싶지 않습니다.</p><figcaption>이승목 목사가 삶의 간극을 은혜로 메운 경험을 나누며.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>아내가 그러더군요. 약을 처방받으면 하루도 거르지 않듯, 기도도 매일 같은 시간에 하자고. 그분은 마지막에 '더 기도할 걸 그랬다'고 했습니다.</p><figcaption>이승목 목사가 팀 켈러 부부의 일화로 기도의 필요를 전하며.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>큰 틀에서는 원칙을 단호히 고수하되, 일상의 사소한 것들은 연민으로 살아가라.</p><figcaption>억척스러운 이들조차 '귀하다'로 품는 태도로 이어진 인용.</figcaption></figure></div></section>
<footer>BooKLove · 제작 · 수영로교회 이승목 목사<div class="priv">이 페이지는 검색에 노출되지 않으며, 링크를 아는 분만 열람할 수 있습니다.</div></footer>
