<h1>지혜가 필요한 시간</h1>
<div class="meta"><span>🗓 2025-10-22 (수요 오전)</span><span>📖 7회 · 완독·종강 — AI 시대와 양극화 속에서 지혜를 찾다</span><span>✍ 프랜시스 콜린스</span></div>
<div class="lead"><span class="qm">“</span>AI가 사람의 쓸모를 흔드는 시대, 결국 지혜는 내 마음과 생각에서 시작된다는 말로 한 권을 덮은 종강.</div>
</div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>미래의 희망은 결국 우리 각자에게 달려 있고, 지혜로 향하는 길은 우리 마음과 생각에서 시작된다.</p><figcaption>지혜의 출발</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>말을 들을 때는 상대가 틀렸다고 설득하려 하기보다, 그 견해가 어디서 비롯됐는지 이해하려고 들어야 한다.</p><figcaption>건강한 갈등</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>진리의 허리띠를 동이고 정의의 가슴막이로 가슴을 가리고 버티고 서라.</p><figcaption>전신 갑주</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>정신 면역력은 더해도 덜해도 문제여서, 쏟아지는 정보 속에서 그 중간을 지키기가 굉장히 어렵다.</p><figcaption>정신 면역력</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>긍정적인 마음을 유지하고, 혼란스러운 정보 속에서 지혜를 찾는 사람들의 모임에 참여해 구체적인 서약을 하라.</p><figcaption>실천</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>인생은 가까이서 보면 비극이지만, 멀리서 보면 희극이다.</p><figcaption>관점</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>아이가 눈을 뜨자마자 안아달라고 오는 게 아니라 핸드폰을 들고 도망간다. 몸은 씻기고 챙겨도 생각은 이미 기계에 다 빼앗긴 아이를 매일 직면하고 있다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>밖에서 사역하고 오면 화나고 아프고, 알아주지 않는 것까지 서러워 몸이 풀리지 않는다. 그런데 교회 사역은 힘들어도 자고 일어나면 아무렇지 않게 회복되는 게 신기하다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>사춘기 아이와 학원·비전트립 문제로 대판 싸운 뒤, 처음으로 '하나님, 이 일이 커지기 전에 제 마음을 좀 만져주세요' 하고 기도했다. 그랬더니 아이가 먼저 '아침엔 내가 잘못했어'라고 했다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>내가 제일 못하는 게 대화다. 대화를 하자면서도 결론은 늘 정해져 있어서, 아이에게 '차라리 끝말잇기가 낫다'는 말을 듣는다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>남에게는 오지랖이 넘칠 만큼 관대하면서, 정작 가까운 가족과 친구 사이에서는 말도 못하고 혼자 상처받는다. 나이 들수록 그게 나를 보호한다는 핑계로 관계를 좁혀 왔다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>하나님의 전신 갑주가 집에 모셔져만 있고, 정작 나올 때는 세상 색깔에 맞춰 다른 걸 입고 나갔다가 돌아와서야 포장을 한다. 그나마 공동체와 말씀과 예배 덕에 혼자라도 치유가 된다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">4</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>초등학생 아이가 그러더군요. '엄마, 이제 코딩은 끝났어. AI가 1초 만에 다 할 텐데 우리가 그걸 왜 배워.'</p><figcaption>AI 시대에 사람의 쓸모와 직업이 급변하는 이야기를 나누며.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>신체적 역병을 교회가 감당했듯이, 지금은 정신적 역병의 시대입니다. 결국 이 병든 세대를 감당해야 할 곳은 교회지요.</p><figcaption>이승목 목사가 단절과 AI의 시대를 위기이자 기회로 보며.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>정신과 문진표 마지막에 '교회 공동체 생활을 하고 있는지'를 묻는 항목이 있어 놀랐다. 세상도 공동체가 필요하다는 건 아는데, 정작 오지는 않는다.</p><figcaption>공동체의 가치를 새삼 확인한 나눔.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>다음 책은 아주 쉬운 책, 영국 문학으로 십계명을 풀어낸 책을 한번 읽어봅시다.</p><figcaption>이승목 목사가 완독을 마치며 다음 시즌을 예고.</figcaption></figure></div></section>
