<h1>지혜가 필요한 시간</h1>
<div class="meta"><span>🗓 2025-10-24 (금요 저녁)</span><span>📖 8회 · 「신뢰」 — 정직성·역량·겸손·공유된 가치관</span><span>✍ 프랜시스 콜린스</span></div>
<div class="lead"><span class="qm">“</span>누구도 온전히 믿을 수 없는 시대에, 결국 신뢰할 분은 하나님뿐이며 그 신뢰가 교회에서 풍성히 피어나야 한다는 확인.</div>
</div>

<div class="hldivider"><span>✨ 하이라이트 카드</span></div>
<section><div class="slabel"><h2>📖 책의 문장</h2><span class="cnt">6</span></div><div class="grid"><figure class="hc bookq"><span class="qm">“</span><p>신뢰를 판단하는 네 가지 기준은 정직성, 역량, 겸손, 그리고 공유된 가치관이다.</p><figcaption>신뢰의 네 기준</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>신뢰를 쌓는 데는 오랜 시간이 걸리지만, 정말 한순간에 무너진다.</p><figcaption>신뢰의 속성</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>신뢰는 사회 협력의 기반이며, 신뢰가 없으면 협력이 무너진다.</p><figcaption>협력의 기반</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>사람들이 자기를 낳은 부모나 목사보다, 한 번도 만난 적 없는 유튜버를 더 신뢰한다.</p><figcaption>뒤바뀐 신뢰</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>공유된 가치관은 편안하지만, 동시에 우리의 시야를 좁게 만든다.</p><figcaption>공유된 가치관의 함정</figcaption></figure><figure class="hc bookq"><span class="qm">“</span><p>지혜는 진리와 과학과 신앙이 함께 뭉쳐졌을 때 비로소 얻어진다.</p><figcaption>지혜의 종합</figcaption></figure></div></section>
<section><div class="slabel"><h2>🕊 고백과 나눔</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc conf"><span class="qm">“</span><p>암 투병 중인 장인 때문에 집안이 큰 병원은 신뢰하면서도 지역 병원은 신뢰하지 못해 매주 먼 길을 오간다. 결국 삶의 거의 모든 것이 신뢰의 문제라는 걸 절감한다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>크게 신뢰하던 분에게 실망하는 사건을 겪고 기도하다가, 사람은 사랑의 대상이지 신뢰의 대상이 아니며 진짜 신뢰할 분은 하나님뿐이라는 마음을 받았다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>부정선거 논란이 너무 궁금해 직접 개표 사무원으로 참여해 검증해 봤다. 구조적으로 결과를 뒤엎을 조작은 불가능하다는 확신이 들었고, 그렇게 믿는 이들에게도 어리석다는 판단 대신 긍휼의 마음이 생겼다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>이민 교회에서 이유 없이 사랑과 신뢰를 받은 것이 내 신앙의 첫 기준이 됐다. 수영로에 와서는 조장도 등록도 없이 1년을 버텼지만, 그때 받은 사랑을 그저 흘려보내라던 말이 이제야 이해된다.</p><figcaption>— 한 참석자</figcaption></figure><figure class="hc conf"><span class="qm">“</span><p>아이가 인싸 친구에게 밀려 속상해할 때, 세상에 나가 남의 사랑을 구걸하지 않도록 먼저 교회 안에서 풍성한 신뢰의 관계를 맛보게 해줘야 한다고 생각했다.</p><figcaption>— 한 참석자</figcaption></figure></div></section>
<section><div class="slabel"><h2>💬 대화</h2><span class="cnt">5</span></div><div class="grid"><figure class="hc dia"><span class="qm">“</span><p>저자가 스스로는 중도라고 하지만, 읽을수록 은근히 한쪽 정치 성향이 배어 있는 것 같다. 그래서 오히려 신뢰라는 주제 자체를 더 파고들고 싶어진다.</p><figcaption>저자에 대한 무조건적 신뢰를 내려놓은 한 참석자의 솔직한 평.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>성부·성자·성령의 완벽한 신뢰 관계가 교회에서 구현되고 확장되어, 이 동네 전체의 신뢰 지수가 올라가는 것이 교회의 목적입니다.</p><figcaption>이승목 목사가 신뢰를 삼위일체와 교회론으로 풀며.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>인디아나 존스 마지막 관문의 보이지 않는 투명 다리처럼, 신뢰는 결국 모험입니다.</p><figcaption>하나님과의 관계에서 신뢰의 본질을 비유로 정리하며.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>조선왕조실록보다 성경의 사본 신뢰도가 더 높습니다. 사본 수가 훨씬 많고, 간격이 짧고, 오차가 작으니까요.</p><figcaption>이승목 목사가 '성경을 믿을 만하냐'는 공격에 대한 변증으로.</figcaption></figure><figure class="hc dia"><span class="qm">“</span><p>오직 은혜로만 구원받았다면, 하나님이 내게 요구하지 못할 것이 하나도 없는 셈이지요.</p><figcaption>이승목 목사가 전적 은혜(칼빈주의)와 신인협력(웨슬리안)을 견주며 신뢰를 구원론으로 확장.</figcaption></figure></div></section>
